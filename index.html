<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LR Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./lr-suite-config.js"></script>
    <style>
      :root {
        --ink: #0f172a;
        --muted: #475569;
        --subtle: #64748b;
        --soft: #f8fafc;
        --surface-subtle: #f1f5f9;
        --line: #dce3ef;
        --line-soft: #e2e8f0;
        --green: #2563eb;
        --green-700: #1d4ed8;
        --green-soft: #eff6ff;
        --green-line: #bfdbfe;
        --sky: #0ea5e9;
        --sky-soft: #f0f9ff;
        --amber: #d97706;
        --amber-soft: #fffbeb;
        --rose: #e11d48;
        --rose-soft: #fff1f2;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--soft);
      }

      body {
        margin: 0;
        background: var(--soft);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: 288px;
        border-right: 1px solid var(--line);
        background: var(--white);
        padding: 24px 22px 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
      }

      .logo {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 8px;
        background: #172033;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
      }

      .brand-title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      .small {
        margin: 0;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.5;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--subtle);
        font-size: 13px;
        font-weight: 500;
      }

      .panel-title {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .nav {
        display: grid;
        gap: 9px;
      }

      .nav-button {
        width: 100%;
        min-height: 66px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        color: var(--ink);
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr) 14px;
        gap: 12px;
        align-items: center;
        padding: 10px;
        text-align: left;
        transition:
          background 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease;
      }

      .nav-button:hover,
      .nav-button.active {
        border-color: var(--green-line);
        background: var(--green-soft);
        box-shadow: 0 6px 16px rgba(16, 185, 129, 0.08);
      }

      .nav-icon {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--soft);
        color: var(--subtle);
      }

      .nav-button.active .nav-icon {
        border-color: var(--green-line);
        background: #fff;
        color: var(--green);
      }

      .nav-name,
      .nav-desc {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-name {
        color: var(--ink);
        font-size: 14px;
        font-weight: 500;
      }

      .nav-button.active .nav-name {
        color: var(--green-700);
      }

      .nav-desc {
        margin-top: 4px;
        color: var(--subtle);
        font-size: 12px;
      }

      .chevron {
        color: #94a3b8;
        font-size: 22px;
        line-height: 1;
      }

      .active-box {
        margin-top: auto;
        border: 1px solid var(--green-line);
        border-radius: 8px;
        background: var(--green-soft);
        padding: 14px;
      }

      .active-box .label {
        margin: 0 0 8px;
        color: var(--green-700);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .active-box strong {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        font-weight: 600;
      }

      .content {
        margin-left: 288px;
        min-height: 100vh;
        padding: 32px 56px;
      }

      .module {
        max-width: 1480px;
        margin: 0 auto;
        display: grid;
        gap: 22px;
      }

      .header-card,
      .compare-card,
      .month-track,
      .metric-card,
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.04);
      }

      .header-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 22px 20px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: max-content;
        border: 1px solid var(--green-line);
        border-radius: 7px;
        background: var(--green-soft);
        color: var(--green-700);
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
      }

      h1 {
        margin: 12px 0 0;
        color: var(--ink);
        font-size: 30px;
        line-height: 1.1;
        letter-spacing: 0;
        font-weight: 600;
      }

      .lead {
        max-width: 900px;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .control {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 240px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        padding: 11px 12px;
        color: var(--subtle);
      }

      .control input,
      .control select {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--ink);
        font-weight: 500;
        outline: 0;
      }

      .month-period strong {
        display: block;
        color: var(--ink);
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .compare-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 16px;
        padding: 16px 18px;
      }

      .compare-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .compare-icon {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 8px;
        background: var(--amber-soft);
        color: var(--amber);
      }

      .compare-title {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }

      .compare-grid {
        display: grid;
        grid-template-columns: repeat(4, max-content);
        gap: 26px;
        color: var(--subtle);
        font-size: 12px;
      }

      .compare-grid strong {
        display: block;
        margin-top: 3px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .compare-grid .up {
        color: var(--green);
      }

      .compare-grid .negative {
        color: var(--rose);
      }

      .month-track {
        display: grid;
        gap: 14px;
        padding: 16px 18px;
      }

      .month-track-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .month-track-head strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }

      .month-chip {
        display: inline-flex;
        align-items: center;
        width: max-content;
        border: 1px solid var(--green-line);
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--green-700);
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 600;
      }

      .month-tabs {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 9px;
      }

      .month-tab {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        color: var(--ink);
        font-size: 13px;
        font-weight: 600;
        transition:
          background 0.18s ease,
          border-color 0.18s ease,
          color 0.18s ease;
      }

      .month-tab:hover:not(:disabled),
      .month-tab.active {
        border-color: var(--green-line);
        background: var(--green-soft);
        color: var(--green-700);
      }

      .month-tab:disabled {
        cursor: not-allowed;
        color: #94a3b8;
        background: #f8fafc;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .metric-card {
        min-height: 126px;
        padding: 18px;
        position: relative;
      }

      .metric-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .metric-label {
        margin: 0;
        color: var(--subtle);
        font-size: 13px;
        font-weight: 500;
        text-transform: uppercase;
      }

      .trend {
        display: inline-flex;
        align-items: center;
        border-radius: 6px;
        background: var(--green-soft);
        color: var(--green);
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .trend.bad {
        background: var(--rose-soft);
        color: var(--rose);
      }

      .metric-value {
        margin: 22px 0 0;
        color: var(--ink);
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
      }

      .metric-detail {
        margin: 9px 0 0;
        color: var(--subtle);
        font-size: 12px;
      }

      .split {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(420px, 0.85fr);
        gap: 22px;
        align-items: start;
      }

      .panel-head {
        border-bottom: 1px solid var(--line);
        padding: 17px 18px;
      }

      .panel-head strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line-soft);
        padding: 13px 18px;
        vertical-align: middle;
      }

      th {
        background: #f8fafc;
        color: var(--subtle);
        font-size: 12px;
        font-weight: 500;
        text-align: left;
        text-transform: uppercase;
      }

      .right {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .muted {
        color: var(--subtle);
      }

      .section-row td {
        background: #fff;
        color: var(--ink);
        font-weight: 600;
      }

      .section-row .negative {
        color: var(--rose);
      }

      .final-row td {
        background: #172033;
        color: #fff;
        font-weight: 600;
      }

      .chart-panel {
        padding: 18px;
      }

      .chart-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 12px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--subtle);
        font-size: 12px;
      }

      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        margin-right: 6px;
        border-radius: 3px;
        vertical-align: -1px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        border-bottom: 1px solid var(--line);
        padding: 17px 18px;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .quote-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .quote-import-input {
        display: none;
      }

      .badge {
        display: inline-flex;
        width: max-content;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f8fafc;
        color: #475569;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 500;
      }

      .badge.green {
        border-color: var(--green-line);
        background: var(--green-soft);
        color: var(--green-700);
      }

      .badge.sky {
        border-color: #bae6fd;
        background: var(--sky-soft);
        color: #0369a1;
      }

      .badge.amber {
        border-color: #fde68a;
        background: var(--amber-soft);
        color: #b45309;
      }

      .badge.rose {
        border-color: #fecdd3;
        background: var(--rose-soft);
        color: #be123c;
      }

      .badge.process-active {
        border-color: var(--rose);
        background: var(--rose);
        color: #fff;
        font-weight: 800;
        box-shadow: 0 6px 14px rgba(225, 29, 72, 0.18);
      }

      button.badge {
        cursor: pointer;
        font: inherit;
        line-height: 1;
      }

      button.badge:hover,
      button.badge:focus {
        border-color: var(--green-line);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        outline: 0;
      }

      .badge-select {
        height: 30px;
        min-width: 110px;
        border: 1px solid var(--green-line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 0 8px;
        font-size: 12px;
        font-weight: 600;
        outline: 0;
      }

      .badge-select:focus {
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .quote-service {
        min-width: 280px;
        font-weight: 600;
      }

      .quote-client {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      .quote-email {
        display: inline-flex;
        margin: 3px 0 0;
        border: 0;
        background: transparent;
        color: var(--green-700);
        padding: 0;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        text-align: left;
      }

      .quote-email:hover,
      .quote-email:focus {
        color: var(--green);
        text-decoration: underline;
        outline: 0;
      }

      .quote-pill {
        display: inline-flex;
        min-width: 38px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--green-line);
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--green-700);
        padding: 5px 11px;
        font-size: 12px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .quote-pill:hover,
      .quote-pill:focus {
        border-color: var(--green);
        background: #dbeafe;
        outline: 0;
      }

      .quote-link {
        display: inline-grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--green-700);
        font-size: 17px;
        text-decoration: none;
      }

      .quote-link:hover,
      .quote-link:focus {
        border-color: var(--green-line);
        background: var(--green-soft);
        outline: 0;
      }

      .drawer-backdrop {
        position: fixed;
        inset: 0;
        z-index: 80;
        border: 0;
        background: rgba(15, 23, 42, 0.36);
      }

      .quote-drawer {
        position: fixed;
        z-index: 81;
        inset: 0 0 0 auto;
        display: flex;
        width: min(460px, 100vw);
        flex-direction: column;
        border-left: 1px solid var(--line);
        background: #fff;
        box-shadow: -24px 0 60px rgba(15, 23, 42, 0.16);
      }

      .drawer-header {
        border-bottom: 1px solid var(--line);
        padding: 22px;
      }

      .drawer-title-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 40px;
        gap: 14px;
        align-items: start;
      }

      .drawer-title-row h2 {
        margin: 8px 0 0;
        font-size: 19px;
        line-height: 1.25;
      }

      .drawer-total {
        margin: 8px 0 0;
        color: var(--green-700);
        font-size: 15px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .drawer-close {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--subtle);
        font-size: 22px;
      }

      .drawer-close:hover,
      .drawer-close:focus {
        border-color: var(--green-line);
        background: var(--green-soft);
        color: var(--green-700);
        outline: 0;
      }

      .drawer-summary {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .drawer-summary div {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        padding: 10px 12px;
      }

      .drawer-summary strong {
        display: block;
        margin-top: 4px;
        font-size: 13px;
      }

      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 22px;
      }

      .contact-timeline {
        position: relative;
        display: grid;
        gap: 0;
      }

      .contact-item {
        position: relative;
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 12px;
        padding-bottom: 18px;
      }

      .contact-item:not(:last-child)::before {
        content: "";
        position: absolute;
        left: 18px;
        top: 38px;
        bottom: 0;
        width: 1px;
        background: var(--line-soft);
      }

      .contact-icon {
        position: relative;
        z-index: 1;
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        font-size: 17px;
      }

      .contact-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 13px 14px;
        box-shadow: 0 10px 32px rgba(15, 23, 42, 0.05);
      }

      .contact-card-head {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }

      .contact-note {
        margin: 11px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .tasks {
        display: grid;
      }

      .task-owner-group {
        display: grid;
      }

      .task-owner-heading {
        margin: 0;
        border-bottom: 1px solid var(--line-soft);
        background: #f8fafc;
        padding: 12px 18px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .task {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid var(--line-soft);
        padding: 12px 18px;
        position: relative;
        transition:
          background 0.18s ease,
          opacity 0.18s ease,
          box-shadow 0.18s ease;
      }

      .task.locked-by-other {
        overflow: hidden;
      }

      .task.locked-by-other > :not(.task-lock-overlay) {
        pointer-events: none;
      }

      .task.locked-by-other .drag-handle,
      .task.locked-by-other .task-main,
      .task.locked-by-other .task-actions {
        opacity: 0.62;
      }

      .task-lock-overlay {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(100, 116, 139, 0.24);
        background: linear-gradient(90deg, rgba(241, 245, 249, 0.28), rgba(241, 245, 249, 0.72));
        padding: 14px 18px;
        backdrop-filter: blur(1px);
      }

      .task-lock-message {
        justify-self: end;
        width: min(320px, 28vw);
        min-width: 220px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        padding: 8px 10px;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      }

      .task-lock-title {
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .task-lock-detail {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      .task-lock-timer {
        display: inline-grid;
        grid-template-columns: auto auto;
        align-items: stretch;
        overflow: hidden;
        border: 1px solid var(--rose);
        border-radius: 8px;
        background: #fff;
      }

      .task-lock-timer strong {
        display: grid;
        min-width: 86px;
        place-items: center;
        background: var(--rose);
        color: #fff;
        font-variant-numeric: tabular-nums;
        padding: 10px 14px;
      }

      .task-lock-timer span {
        display: grid;
        min-width: 130px;

      function normalizeMetricoolText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function parseMetricoolNumber(value) {
        const normalized = String(value || "")
          .trim()
          .replace(/\s/g, "")
          .replace(/,/g, "");
        const match = normalized.match(/^([+-]?\d+(?:\.\d+)?)([KM])?$/i);
        if (!match) return null;

        const base = Number(match[1]);
        if (!Number.isFinite(base)) return null;
        if (match[2]?.toUpperCase() === "K") return Math.round(base * 1000);
        if (match[2]?.toUpperCase() === "M") return Math.round(base * 1000000);
        return base;
      }

      function parseMetricoolPercent(value) {
        const match = String(value || "").trim().match(/^([+-]?\d+(?:\.\d+)?)%$/);
        return match ? Number(match[1]) : null;
      }

      function metricoolPairAfter(lines, label) {
        const startIndex = lines.findIndex((line) =>
          normalizeMetricoolText(line).includes(normalizeMetricoolText(label))
        );
        if (startIndex < 0) return null;

        let value = null;
        let change = null;
        for (let index = startIndex + 1; index < Math.min(lines.length, startIndex + 6); index += 1) {
          if (value === null) value = parseMetricoolNumber(lines[index]);
          if (change === null) change = parseMetricoolPercent(lines[index]);
          if (value !== null && change !== null) break;
        }

        return value === null ? null : { change, value };
      }

      function metricoolFirstPair(lines) {
        let value = null;
        let change = null;
        for (let index = 1; index < Math.min(lines.length, 8); index += 1) {
          if (value === null) value = parseMetricoolNumber(lines[index]);
          if (change === null) change = parseMetricoolPercent(lines[index]);
          if (value !== null && change !== null) break;
        }
        return value === null ? null : { change, value };
      }

      function metricoolAverage(values) {
        const valid = values.filter((value) => typeof value === "number" && Number.isFinite(value));
        return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : 0;
      }

      function parseMetricoolDate(value) {
        const months = {
          ene: "01",
          feb: "02",
          mar: "03",
          abr: "04",
          may: "05",
          jun: "06",
          jul: "07",
          ago: "08",
          sep: "09",
          oct: "10",
          nov: "11",
          dic: "12"
        };
        const match = normalizeMetricoolText(value).match(/(\d{1,2})\s+([a-z]+)\s+(\d{2,4})/);
        if (!match) return null;

        const year = match[3].length === 2 ? `20${match[3]}` : match[3];
        return `${year}-${months[match[2].slice(0, 3)] || "01"}-${match[1].padStart(2, "0")}`;
      }

      function parseMetricoolCover(lines) {
        const text = lines.join(" ");
        const range = text.match(/(\d{1,2}\s+\w+\s+\d{2,4})\s*-\s*(\d{1,2}\s+\w+\s+\d{2,4})/i);
        const handle = lines.find((line) => /^@?[a-z0-9_.]{3,40}$/i.test(String(line).trim()));
        const brand = lines.find((line) => {
          const clean = String(line || "").trim();
          return (
            clean.length > 3 &&
            clean.length < 80 &&
            !/^social media/i.test(clean) &&
            !/^@/.test(clean) &&
            /[a-z]/i.test(clean) &&
            clean.includes(" ")
          );
        });

        return {
          brand: brand || null,
          from: range ? parseMetricoolDate(range[1]) : null,
          handle: handle ? `@${String(handle).replace(/^@/, "")}` : null,
          to: range ? parseMetricoolDate(range[2]) : null
        };
      }

      function metricoolChannel(report, name) {
        return report.channels.find((channel) => channel.name === name);

            if (postsPair && isTikTok) {
              channel.posts = postsPair.value;
              changes.posts.push(postsPair.change);
            }
          }

          if (text.includes("impresiones") && firstPair && !text.includes("historias ordenadas") && !instagramReachFromPdf) {
            instagram.reachLabel = `${fmtNumber(firstPair.value)} impresiones`;
            instagram.reach = firstPair.value;
            instagramReachFromPdf = true;
            changes.impressions.push(firstPair.change);
            foundMetrics += 1;
          }

          if (text.includes("interacciones")) {
            const interactionPair = metricoolPairAfter(lines, "Interacciones") || firstPair;
            if (interactionPair) {
              const channel = isTikTok ? tiktok : instagram;
              channel.interactions = interactionPair.value;
              changes.interactions.push(interactionPair.change);
              foundMetrics += 1;
            }
          }

          if (text.includes("engagement") && firstPair) {
            const channel = isTikTok ? tiktok : instagram;
            channel.engagement = firstPair.value;
          }
        }

        const instagram = metricoolChannel(report, "Instagram");
        const tiktok = metricoolChannel(report, "TikTok");
        const totalFollowers = (instagram.followers || 0) + (tiktok.followers || 0);
        const totalReach = (instagram.reach || 0) + (tiktok.reach || 0);
        const totalInteractions = (instagram.interactions || 0) + (tiktok.interactions || 0);
        const totalPosts = (instagram.posts || 0) + (tiktok.posts || 0);

        instagram.status = metricoolAverage(changes.impressions) < -10 ? "En caída" : "Estable";
        tiktok.status = metricoolAverage(changes.interactions) > 10 ? "Crece" : "Estable";
        report.summary = [
          ["Seguidores", totalFollowers, "IG + TikTok", metricoolAverage(changes.followers)],
          ["Impresiones", totalReach, "Visualizaciones/impr. del PDF", metricoolAverage(changes.impressions)],
          ["Interacciones", totalInteractions, "Reacciones, likes y respuestas", metricoolAverage(changes.interactions)],
          ["Publicaciones", totalPosts, "Piezas publicadas", metricoolAverage(changes.posts)]
        ];

        return { foundMetrics, report };
      }

      function loadMetricoolPdfJs() {
        if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
        if (metricoolPdfJsPromise) return metricoolPdfJsPromise;

        metricoolPdfJsPromise = new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js";
          script.onload = () => {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
              "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
            resolve(window.pdfjsLib);
          };
          script.onerror = () => reject(new Error("No se pudo cargar pdf.js para leer el PDF."));
          document.head.appendChild(script);
        });

        return metricoolPdfJsPromise;
      }

      async function extractMetricoolPdfPages(file) {
        const pdfjs = await loadMetricoolPdfJs();
        const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
        const pages = [];

        for (let index = 1; index <= pdf.numPages; index += 1) {
          const page = await pdf.getPage(index);
          const text = await page.getTextContent();
          pages.push(
            text.items
              .map((item) => String(item.str || "").trim())
              .filter(Boolean)
          );
        }

        return pages;
      }

      async function handleMetricoolPdfUpload(file) {
        if (!file || (!file.type.includes("pdf") && !file.name.toLowerCase().endsWith(".pdf"))) {
          metricoolUploadNotice = {
            detail: "Selecciona un archivo PDF exportado desde Metricool.",
            status: "Error",
            title: "Archivo no válido"
          };
          metricoolModule();
          return;
        }

        metricoolUploadNotice = {
          detail: `Leyendo ${file.name}. El procesamiento puede tardar unos segundos.`,
          status: "Procesando",
          title: "Procesando PDF"
        };
        metricoolModule();

        try {
          const pages = await extractMetricoolPdfPages(file);
          const { foundMetrics, report } = buildMetricoolReportFromPdf(pages, file.name);
          if (!foundMetrics) throw new Error("No encontré KPIs reconocibles en el PDF.");

          saveMetricoolReport(report, file.name);
          metricoolUploadNotice = {
            detail: `${foundMetrics} bloques de KPI actualizados desde ${file.name}.`,
            status: "Cargado",
            title: "Reporte cargado"
          };
        } catch (error) {
          metricoolUploadNotice = {
            detail: error instanceof Error ? error.message : "No se pudo procesar el PDF.",
            status: "Error",
            title: "No se pudo cargar el reporte"
          };
        }

        metricoolModule();
      }

        const period = financialMonths[monthIndex];

        return financialLineItems.map((row, index) => [row[0], row[1], period.values[index], previousPeriod.values[index]]);

      function sectionTotal(section, index, rows) {
        return rows
          .filter((row) => row[0] === section)
          .reduce((sum, row) => sum + row[index], 0);
      }

      function summary(index, rows) {
        const ingresos = sectionTotal("Ingresos", index, rows);
        const costos = sectionTotal("Costos", index, rows);
        const gastos = sectionTotal("Gastos operativos", index, rows);
        const otros = sectionTotal("Otros ingresos/gastos", index, rows);
        const impuestos = sectionTotal("Impuestos", index, rows);
        const utilidadBruta = ingresos + costos;
        const utilidadOperativa = utilidadBruta + gastos;
        const utilidadNeta = utilidadOperativa + otros + impuestos;
        return {
          ingresos,
          costoVentas: Math.abs(costos),
          utilidadBruta,
          gastosOperativos: Math.abs(gastos),
          utilidadOperativa,
          utilidadNeta,
          margenBruto: ingresos ? utilidadBruta / ingresos : 0,
          margenNeto: ingresos ? utilidadNeta / ingresos : 0
        };
      }

      function variation(current, previous) {
        return previous ? ((current - previous) / Math.abs(previous)) * 100 : 0;

        const positive = value >= 0;

        const gastosTotales = period.values.filter((value) => value < 0).reduce((sum, value) => sum + Math.abs(value), 0);

        return {
          month: period.short,
          costoVentas,
          gastosOperativos,
          gastosTotales
        };
      }

      function chart(activeIndex) {
        const expenseMonths = financialMonths.slice(0, activeIndex + 1).map(expenseSnapshot);
        const max = Math.max(1, ...expenseMonths.flatMap((row) => [row.costoVentas, row.gastosOperativos, row.gastosTotales]));
        const chartStart = 54;
        const chartWidth = 650;
        const xStep = chartWidth / expenseMonths.length;
        const barWidth = Math.min(24, Math.max(14, xStep / 4));
        const y = (value) => 224 - (value / max) * 178;
        const points = expenseMonths
          .map((row, index) => {
            const x = chartStart + index * xStep + xStep / 2;
            return `${x},${y(row.gastosTotales)}`;
          })
          .join(" ");
        const groups = expenseMonths
          .map((row, index) => {
            const centerX = chartStart + index * xStep + xStep / 2;
            const costHeight = (row.costoVentas / max) * 178;
            const operatingHeight = (row.gastosOperativos / max) * 178;
            return `
              <g>
                <rect x="${centerX - barWidth - 4}" y="${224 - costHeight}" width="${barWidth}" height="${costHeight}" rx="4" fill="#2563eb"></rect>
                <rect x="${centerX + 4}" y="${224 - operatingHeight}" width="${barWidth}" height="${operatingHeight}" rx="4" fill="#0ea5e9"></rect>
                <text x="${centerX}" y="264" text-anchor="middle" fill="#7a8797" font-size="11">${row.month}</text>

              <line x1="38" x2="724" y1="178" y2="178" stroke="#dbe2ea" stroke-dasharray="4 7"></line>
              ${groups}
              <polyline points="${points}" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
              ${expenseMonths
                .map((row, index) => {
                  const x = chartStart + index * xStep + xStep / 2;
                  return `<circle cx="${x}" cy="${y(row.gastosTotales)}" r="4.5" fill="#f59e0b"></circle>`;

        document.querySelectorAll("[data-financial-month]").forEach((button) => {
          button.addEventListener("click", () => {
            state.financialMonth = button.dataset.financialMonth;
            financialModule();
          });
        });
      }

      function quoteIgv(quote) {
        return Math.round(quote.montoCotizado * 18) / 100;
      }

      function quoteTotal(quote) {
        return Math.round(quote.montoCotizado * 118) / 100;
      }

      function quoteDocumentHref(quote) {
        if (!quote.archivoUrl) return "";
        return quote.archivoTipo === "file" ? quote.archivoSignedUrl || quote.archivoUrl : quote.archivoUrl;
      }

      function quoteContactMeta(type) {
        const meta = {
          mail: ["Mail", "✉️", "sky"],
          mensaje: ["Mensaje", "💬", "sky"],
          llamada: ["Llamada", "☎️", "green"],
          reunion: ["Reunión", "🎥", "amber"],
          otro: ["Otro", "•", ""]
        };
        return meta[type] || meta.otro;
      }

      function quoteDrawer(quote) {
        if (!quote) return "";
        const contacts = [...quote.contactos].sort((left, right) => left[2] - right[2]);
        const timeline = contacts.length
          ? contacts
              .map((contact) => {
                const [label, icon, tone] = quoteContactMeta(contact[0]);
                return `
                  <article class="contact-item">
                    <span class="contact-icon" aria-hidden="true">${icon}</span>
                    <div class="contact-card">
                      <div class="contact-card-head">
                        <span class="badge ${tone}">${contact[2]}. ${label}</span>
                        <time class="small">${fmtDateTime(contact[1])}</time>
                      </div>
                      ${contact[3] ? `<p class="contact-note">${escapeHtml(contact[3])}</p>` : ""}
                    </div>
                  </article>
                `;
              })
              .join("")
          : `<div class="empty">Sin contactos registrados para esta cotización.</div>`;

        return `
          <button class="drawer-backdrop" type="button" data-close-quote-drawer aria-label="Cerrar contactos"></button>
          <aside class="quote-drawer" aria-label="Detalle de contactos">
            <header class="drawer-header">
              <div class="drawer-title-row">
                <div>
                  <p class="label">Contactos</p>
                  <h2>${escapeHtml(quote.servicio)}</h2>
                  <p class="small">${escapeHtml(quote.cliente || "Cliente sin nombre")} · ${escapeHtml(quote.emailContacto || "Sin mail")}</p>
                  <p class="drawer-total">${fmtMoneyCents(quoteTotal(quote))}</p>
                </div>
                <button class="drawer-close" type="button" data-close-quote-drawer aria-label="Cerrar drawer">×</button>
              </div>
              <div class="drawer-summary">
                <div>
                  <p class="small">Fecha envío</p>
                  <strong>${fmtDate(quote.fechaEnvio)}</strong>
                </div>
                <div>
                  <p class="small">Cantidad</p>
                  <strong>${contacts.length} contactos</strong>
                </div>
              </div>
            </header>
            <div class="drawer-body">
              <div class="contact-timeline">${timeline}</div>
            </div>
          </aside>
        `;
      }

      function quoteDocumentCell(quote) {
        const href = quoteDocumentHref(quote);
        if (!href || !quote.archivoTipo) return "";
        const icon = quote.archivoTipo === "file" ? "📄" : "🔗";
        const label = quote.archivoTipo === "file" ? "Abrir archivo de cotización" : "Abrir link de cotización";
        return `<a class="quote-link" href="${escapeHtml(href)}" target="_blank" rel="noreferrer" aria-label="${label}" title="${label}">${icon}</a>`;
      }

      const quoteXlsColumns = [
        "Mes",
        "Servicio",
        "Cliente",
        "Mail contacto",
        "Monto cotizado",
        "Fecha envío",
        "Archivo tipo",
        "Archivo URL",
        "Contactos JSON"
      ];

      function quoteMonthKey(quote) {
        return quote.fechaEnvio.slice(0, 7);
      }

      function activeQuoteMonthLabel() {
        return financialMonthLabels.find((month) => month[0] === state.quoteMonth)?.[2] || state.quoteMonth;
      }

      function quoteMonthTrack() {
        return `
          <div class="month-track">
            <div class="month-track-head">

            <div class="month-tabs" role="tablist" aria-label="Meses de cotizaciones">

                .map((month) => {

                  return `<button class="month-tab ${active ? "active" : ""}" type="button" role="tab" aria-selected="${active}" data-quote-month="${month[0]}" aria-label="${month[2]}">${month[1]}</button>`;
                })
                .join("")}
            </div>
          </div>
        `;
      }

      function serializeQuoteContacts(quote) {
        return JSON.stringify(
          [...quote.contactos]
            .sort((left, right) => left[2] - right[2])
            .map((contact) => ({
              tipo: contact[0],
              fecha: contact[1],
              orden: contact[2],
              nota: contact[3] || ""
            }))
        );
      }

      function exportQuotesXls() {
        const rows = quotes
          .map((quote) => {
            const values = [
              quoteMonthKey(quote),
              quote.servicio,
              quote.cliente || "",
              quote.emailContacto || "",
              quote.montoCotizado,
              quote.fechaEnvio,
              quote.archivoTipo || "",
              quote.archivoUrl || "",
              serializeQuoteContacts(quote)
            ];
            return `<tr>${values.map((value) => `<td>${escapeHtml(value)}</td>`).join("")}</tr>`;
          })
          .join("");
        const html = `
          <html>
            <head><meta charset="utf-8" /></head>
            <body>
              <table>
                <thead><tr>${quoteXlsColumns.map((column) => `<th>${column}</th>`).join("")}</tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </body>
          </html>
        `;
        const blob = new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "cotizaciones-lr-suite.xls";
        link.click();
        URL.revokeObjectURL(url);
      }

      function parseMoneyCell(value) {
        const parsed = Number(String(value || "").replace(/[^\d.,-]/g, "").replaceAll(",", ""));
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function spreadsheetRowsFromText(text) {
        const parsedHtml = new DOMParser().parseFromString(text, "text/html");
        const tableRows = Array.from(parsedHtml.querySelectorAll("tr")).map((row) =>
          Array.from(row.querySelectorAll("th,td")).map((cell) => (cell.textContent || "").trim())
        );
        if (tableRows.length) return tableRows;

        const delimiter = text.includes("\t") ? "\t" : ",";
        return text
          .split(/\r?\n/)
          .map((row) => row.split(delimiter).map((cell) => cell.trim()))
          .filter((row) => row.some(Boolean));
      }

      function normalizeXlsHeader(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function parseImportedContacts(value) {
        if (!String(value || "").trim()) return [];
        try {
          const parsed = JSON.parse(value);
          if (!Array.isArray(parsed)) return [];
          return parsed.map((contact, index) => [
            contact.tipo || "otro",
            contact.fecha || new Date().toISOString(),
            contact.orden || index + 1,
            contact.nota || ""
          ]);
        } catch {
          return [];
        }
      }

      function importQuotesText(text) {
        const rows = spreadsheetRowsFromText(text);
        const [headers, ...body] = rows;
        if (!headers) return [];
        const normalized = headers.map(normalizeXlsHeader);
        const at = (name) => normalized.indexOf(name);

        return body
          .map((row, index) => {
            const archivoTipo = String(row[at("archivo tipo")] || "").trim().toLowerCase();
            return {
              id: `import-${Date.now()}-${index + 1}`,
              servicio: row[at("servicio")] || "Servicio sin nombre",
              cliente: row[at("cliente")] || "Cliente sin nombre",
              emailContacto: row[at("mail contacto")] || "",
              montoCotizado: parseMoneyCell(row[at("monto cotizado")]),
              fechaEnvio: row[at("fecha envio")] || `${row[at("mes")] || "2026-05"}-01`,
              archivoTipo: ["link", "file"].includes(archivoTipo) ? archivoTipo : null,
              archivoUrl: row[at("archivo url")] || null,
              contactos: parseImportedContacts(row[at("contactos json")])
            };
          })
          .filter((quote) => quote.servicio.trim());
      }

      function handleQuoteImport(file) {
        const reader = new FileReader();
        reader.onload = () => {
          const imported = importQuotesText(String(reader.result || ""));
          if (!imported.length) {
            window.alert("No se encontraron filas válidas en el archivo.");
            return;
          }
          quotes = imported;
          state.quoteMonth = quoteMonthKey(imported[0]);
          state.quoteDrawerId = null;
          quotesModule();
        };
        reader.readAsText(file, "utf-8");
      }

      function editQuoteEmail(quoteId) {
        const quote = quotes.find((item) => item.id === quoteId);
        if (!quote) return;
        const nextEmail = window.prompt("Editar mail de contacto", quote.emailContacto || "");
        if (nextEmail === null) return;
        quote.emailContacto = nextEmail.trim();
        quotesModule();
      }

      function quotesModule() {
        const search = state.quoteSearch.trim().toLowerCase();
        const monthQuotes = quotes.filter((quote) => quoteMonthKey(quote) === state.quoteMonth);
        const visible = monthQuotes.filter(
          (quote) =>
            !search ||

        );
        const totalQuoted = monthQuotes.reduce((sum, quote) => sum + quote.montoCotizado, 0);
        const totalWithTax = monthQuotes.reduce((sum, quote) => sum + quoteTotal(quote), 0);
        const contactCount = monthQuotes.reduce((sum, quote) => sum + quote.contactos.length, 0);
        const quoteFiles = monthQuotes.filter((quote) => quote.archivoUrl).length;
        const selectedQuote = quotes.find((quote) => quote.id === state.quoteDrawerId);

        shell(`
          <section class="module">
            ${header(
              "Seguimiento de Cotizaciones",
              "Control de propuestas enviadas, montos con IGV, contactos acumulados y archivos de cotización vinculados al bucket privado de BBDD.",
              "Finanzas",
              icons.dollar,
              `<div class="control month-period">${icons.calendar}<div><p class="small">Periodo activo</p><strong>${activeQuoteMonthLabel()}</strong></div></div>`
            )}
            ${quoteMonthTrack()}
            <div class="metrics">
              ${metric("Monto cotizado", fmtMoneyCents(totalQuoted), "Suma antes de IGV")}
              ${metric("Total con IGV", fmtMoneyCents(totalWithTax), "Base imponible más 18%")}
              ${metric("Contactos", contactCount, "Interacciones registradas")}
              ${metric("Cotizaciones", quoteFiles, "Links o archivos asociados")}
            </div>
            <div class="panel">
              <div class="toolbar">
                <div>
                  <strong>Tabla principal</strong>
                  <p class="small">${visible.length} registros visibles</p>
                </div>
                <div class="quote-actions">
                  <input id="quoteImportInput" class="quote-import-input" type="file" accept=".xls,.html,.csv,.tsv" />
                  <button class="btn" id="quoteImportButton" type="button">${icons.upload} Importar XLS</button>
                  <button class="btn" id="quoteExportButton" type="button">${icons.download} Exportar XLS</button>
                  <label class="control">Buscar <input id="quoteSearch" value="${escapeHtml(state.quoteSearch)}" placeholder="Servicio, cliente o mail" /></label>
                </div>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Servicio</th>
                      <th class="right">Monto cotizado</th>
                      <th class="right">IGV</th>
                      <th class="right">Total</th>
                      <th>Fecha envío</th>
                      <th class="right">Contactos</th>
                      <th class="right">Cotización</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${
                      visible.length
                        ? visible
                            .map(
                              (quote) => `
                                <tr>
                                  <td class="quote-service">
                                    ${escapeHtml(quote.servicio)}
                                    <div class="quote-client">${escapeHtml(quote.cliente || "Cliente sin nombre")}</div>
                                    <button class="quote-email" type="button" data-edit-quote-email="${quote.id}" title="Doble clic para editar mail">${escapeHtml(quote.emailContacto || "Agregar mail")}</button>
                                  </td>
                                  <td class="right"><strong>${fmtMoneyCents(quote.montoCotizado)}</strong></td>
                                  <td class="right muted">${fmtMoneyCents(quoteIgv(quote))}</td>
                                  <td class="right"><strong>${fmtMoneyCents(quoteTotal(quote))}</strong></td>
                                  <td class="muted">${fmtDate(quote.fechaEnvio)}</td>
                                  <td class="right">
                                    <button class="quote-pill" type="button" data-open-quote-contacts="${quote.id}" aria-label="Ver ${quote.contactos.length} contactos de ${escapeHtml(quote.servicio)}" title="Doble clic para ver contactos">${quote.contactos.length}</button>
                                  </td>
                                  <td class="right">${quoteDocumentCell(quote)}</td>

          </section>
        `);

        document.getElementById("quoteSearch").addEventListener("input", (event) => {
          state.quoteSearch = event.target.value;
          quotesModule();
        });

        document.querySelectorAll("[data-quote-month]").forEach((button) => {
          button.addEventListener("click", () => {
            state.quoteMonth = button.dataset.quoteMonth;
            state.quoteDrawerId = null;
            quotesModule();
          });

        document.getElementById("quoteExportButton")?.addEventListener("click", exportQuotesXls);
        document.getElementById("quoteImportButton")?.addEventListener("click", () => {
          document.getElementById("quoteImportInput")?.click();
        });
        document.getElementById("quoteImportInput")?.addEventListener("change", (event) => {
          const file = event.target.files?.[0];
          event.target.value = "";
          if (file) handleQuoteImport(file);

            }

        document.querySelectorAll("[data-open-quote-contacts]").forEach((button) => {

          });

          button.addEventListener("click", () => {
            state.quoteDrawerId = null;
            quotesModule();
          });

      }

      function taskId(task, index) {
        if (!task[6]) task[6] = `task-${String(index + 1).padStart(3, "0")}`;
        return task[6];
      }

      function taskCreatedAt(task) {
        if (!task[7]) task[7] = new Date().toISOString();
        return task[7];
      }

      function generatedTaskId(prefix = "task") {
        return prefix + "-" + Date.now().toString(36) + "-" + Math.random().toString(16).slice(2, 8);
      }

      function completedTaskKey(task, index) {
        if (!task.completedRecordId) {
          task.completedRecordId = `completed-${task.id || "task"}-${task.completedAt || "sin-fecha"}-${index}`;
        }
        return task.completedRecordId;
      }

      function ensureTaskIds() {
        tasks = tasks.map((task, index) => {
          taskId(task, index);
          taskCreatedAt(task);
          return task;
        });
      }

      function readStoredJson(key, fallback) {
        try {
          const value = localStorage.getItem(key);
          return value ? JSON.parse(value) : fallback;
        } catch {
          return fallback;
        }
      }

      function readPendingPresence() {
        const presence = readStoredJson(PRESENCE_STORAGE_KEY, {});
        const now = Date.now();
        return Object.values(presence || {}).filter((entry) => {
          return entry && now - Number(entry.updatedAt || 0) < 20000;
        });
      }

      function mergePendingPresence(nextPresence) {
        const presence = readStoredJson(PRESENCE_STORAGE_KEY, {});
        Object.values(nextPresence || {}).forEach((entry) => {
          if (!entry?.id) return;
          const currentEntry = presence[entry.id];
          if (Number(currentEntry?.updatedAt || 0) > Number(entry.updatedAt || 0)) return;
          presence[entry.id] = entry;
        });
        localStorage.setItem(PRESENCE_STORAGE_KEY, JSON.stringify(presence));
        return presence;
      }

      function currentPendingPresenceEntry(task = null) {
        return {
          id: pendingSessionId,
          name: currentSuiteUserName(),
          editingTaskId: task?.id || null,
          editingTaskTitle: task?.title || null,
          editingTaskAction: task?.action || (task?.id ? "Editando" : null),
          updatedAt: Date.now()
        };
      }

      function writePendingPresence(task = null) {
        if (applyingPresenceSync) return;
        const presence = readStoredJson(PRESENCE_STORAGE_KEY, {});
        const entry = currentPendingPresenceEntry(task);
        presence[pendingSessionId] = entry;
        localStorage.setItem(PRESENCE_STORAGE_KEY, JSON.stringify(presence));
        publishPresenceSync(entry);
      }

      function setEditingPresence(task = null) {
        editingState.taskId = task?.id || null;
        editingState.taskTitle = task?.title || null;
        editingState.taskAction = task?.action || (task?.id ? "Editando" : null);
        writePendingPresence(task);
      }

      function normalizeSuiteUser(user) {
        const key = String(user?.key || "").trim().toLowerCase();
        const savedRole = String(user?.role || user?.rol || "").trim().toLowerCase();
        const savedOrder = Number(user?.order || user?.orden);
        return {
          name: String(user?.name || "").trim(),
          key,
          password: String(user?.password || "").trim(),
          role: SUITE_SUPERADMIN_KEYS.includes(key) ? SUITE_SUPERADMIN_ROLE : savedRole || SUITE_SUPERADMIN_ROLE,
          order: Number.isFinite(savedOrder) && savedOrder > 0 ? savedOrder : defaultSuiteUserOrder(key)
        };
      }

      function defaultSuiteUserOrder(value) {
        const normalized = normalizeText(value);
        if (normalized.includes("diego")) return 1;
        if (normalized.includes("jorgeluis") || normalized.includes("jorge")) return 2;
        return 99;
      }

      function defaultSuiteUsers() {
        return mergeSuiteUsers(DEFAULT_SUITE_USERS);
      }

      function mergeSuiteUsers(...groups) {
        const byKey = new Map();
        groups.flat().forEach((user) => {
          const normalizedUser = normalizeSuiteUser(user);
          if (!normalizedUser.key || !normalizedUser.password) return;
          const existingUser = byKey.get(normalizedUser.key);
          byKey.set(normalizedUser.key, {
            ...existingUser,
            ...normalizedUser,
            role:
              existingUser?.role === SUITE_SUPERADMIN_ROLE || normalizedUser.role === SUITE_SUPERADMIN_ROLE
                ? SUITE_SUPERADMIN_ROLE
                : normalizedUser.role
          });
        });
        return Array.from(byKey.values());
      }

      function saveSuiteUsers() {
        localStorage.setItem(SUITE_USERS_STORAGE_KEY, JSON.stringify(suiteUsers));
      }

      function loadSuiteUsers() {
        const savedUsers = readStoredJson(SUITE_USERS_STORAGE_KEY, null);
        const normalizedUsers = Array.isArray(savedUsers)
          ? savedUsers.map(normalizeSuiteUser).filter((user) => user.key && user.password)
          : [];
        suiteUsers = mergeSuiteUsers(defaultSuiteUsers(), normalizedUsers);
        migrateDiegoCredentialsOnce();
        if (suiteUsers.length) saveSuiteUsers();
      }

      function migrateDiegoCredentialsOnce() {
        const previousKey = "diego@limaretail.com";
        const currentKey = "diegomachuca@limaretail.com";

        try {
          if (localStorage.getItem(SUITE_CREDENTIALS_MIGRATION_KEY) === "done") return;

          const previousDiego = suiteUsers.find((user) => user.key === previousKey);
          const currentDiego = suiteUsers.find((user) => user.key === currentKey);
          if (currentDiego) {
            currentDiego.name = previousDiego?.name || currentDiego.name || "Diego";
            currentDiego.password = "1234";
            currentDiego.role = SUITE_SUPERADMIN_ROLE;
            currentDiego.order = previousDiego?.order || currentDiego.order || 1;
          }
          suiteUsers = suiteUsers.filter((user) => user.key !== previousKey);
          localStorage.setItem(SUITE_CREDENTIALS_MIGRATION_KEY, "done");
        } catch {
          const diego = suiteUsers.find((user) => user.key === currentKey);
          if (diego) diego.password = "1234";
          suiteUsers = suiteUsers.filter((user) => user.key !== previousKey);
        }
      }

      function setPersistentCookie(name, value) {
        try {
          const encodedName = encodeURIComponent(name);
          const encodedValue = encodeURIComponent(value);
          const maxAge = SUITE_AUTH_DURATION_DAYS * 24 * 60 * 60;
          const cookie = `${encodedName}=${encodedValue}; max-age=${maxAge}; SameSite=Lax`;
          document.cookie = `${cookie}; path=/`;
          if (!getCookie(name)) document.cookie = cookie;
          return Boolean(getCookie(name));
        } catch {
          return false;
        }
      }

      function getCookie(name) {
        try {
          const target = `${encodeURIComponent(name)}=`;
          const cookie = document.cookie
            .split(";")
            .map((part) => part.trim())
            .find((part) => part.startsWith(target));
          return cookie ? decodeURIComponent(cookie.slice(target.length)) : "";
        } catch {
          return "";
        }
      }

      function authenticateSuiteUser(key, password) {
        const normalizedKey = String(key || "").trim().toLowerCase();
        const normalizedPassword = String(password || "").trim();
        return suiteUsers.find((user) => {
          const userKey = user.key.toLowerCase();
          const userAlias = userKey.split("@")[0];
          return [userKey, userAlias].includes(normalizedKey) && user.password === normalizedPassword;
        });
      }

      function saveSuiteAccessSession(userKey) {
        suiteAccessSession = userKey;
        try {
          sessionStorage.setItem(SUITE_AUTH_SESSION_KEY, userKey);
        } catch {
          // La cookie y localStorage quedan como respaldo si sessionStorage no existe.
        }
        setPersistentCookie(SUITE_AUTH_COOKIE, userKey);
        try {
          localStorage.setItem(SUITE_AUTH_FALLBACK_KEY, userKey);
        } catch {
          // En archivos locales algunos navegadores no guardan cookies.
        }
      }

      function getSuiteAccessSession() {
        try {
          return (
            suiteAccessSession ||
            sessionStorage.getItem(SUITE_AUTH_SESSION_KEY) ||
            getCookie(SUITE_AUTH_COOKIE) ||
            localStorage.getItem(SUITE_AUTH_FALLBACK_KEY) ||
            ""
          );
        } catch {
          return suiteAccessSession || getCookie(SUITE_AUTH_COOKIE);
        }
      }

      function currentSuiteUserName() {
        const sessionKey = getSuiteAccessSession();
        const currentUser = suiteUsers.find((user) => user.key === sessionKey);
        return suitePendingOwnerName(currentUser, sessionKey || "Jorge Luis");
      }

      function currentSuiteUserKey() {
        return String(getSuiteAccessSession() || "").trim().toLowerCase();
      }

      function suitePendingOwnerName(user, fallback = "Usuario") {
        const rawName = user?.name || user?.key || fallback;
        const normalized = normalizeText(rawName);
        if (normalized.includes("jorge")) return "Jorge Luis";
        if (normalized.includes("diego")) return "Diego";
        return rawName;
      }

      function suitePersonKey(value) {
        const normalized = normalizeText(value).trim();
        if (normalized.includes("jorge")) return "jorge";
        if (normalized.includes("diego")) return "diego";
        return normalized;
      }

      function isSameSuitePerson(left, right) {
        const leftKey = suitePersonKey(left);
        const rightKey = suitePersonKey(right);
        return Boolean(leftKey && rightKey && leftKey === rightKey);
      }

      function normalizeTaskTimer(timer) {
        const source = timer && typeof timer === "object" ? timer : {};
        const activeById = source.activeById && typeof source.activeById === "object" ? { ...source.activeById } : {};
        const activeByKey = source.activeByKey && typeof source.activeByKey === "object" ? { ...source.activeByKey } : {};
        if (source.activeTaskId && !activeById[source.activeTaskId]) {
          activeById[source.activeTaskId] = {
            userKey: source.activeUserKey || null,
            userName: source.activeUserName || null,
            startedAt: source.startedAt || null
          };
        }
        Object.entries(activeById).forEach(([id, entry]) => {
          const key = taskTimerKeyForId(id, entry);
          if (key && !activeByKey[key]) activeByKey[key] = entry;
        });
        return {
          activeTaskId: source.activeTaskId || null,
          activeUserKey: source.activeUserKey || null,
          activeUserName: source.activeUserName || null,
          activeById,
          activeByKey,
          dailyById: source.dailyById && typeof source.dailyById === "object" ? source.dailyById : {},
          dailyByUser: source.dailyByUser && typeof source.dailyByUser === "object" ? source.dailyByUser : {},
          elapsedById: source.elapsedById || {},
          startedAt: source.startedAt || null
        };
      }

      function applyTaskTimerSnapshot(timer) {
        const normalized = normalizeTaskTimer(timer);
        taskTimer.activeTaskId = normalized.activeTaskId;
        taskTimer.activeUserKey = normalized.activeUserKey;
        taskTimer.activeUserName = normalized.activeUserName;
        taskTimer.activeById = normalized.activeById;
        taskTimer.activeByKey = normalized.activeByKey;
        taskTimer.dailyById = normalized.dailyById;
        taskTimer.dailyByUser = normalized.dailyByUser;
        taskTimer.startedAt = normalized.startedAt;
        taskTimer.elapsedById = normalized.elapsedById;
        pruneActiveTimersByUser();
      }

      function timerEntryMatchesUser(id, entry, userName, userKey) {
        if (!entry) return false;
        const entryKey = String(entry.userKey || "").trim().toLowerCase();
        const normalizedKey = String(userKey || "").trim().toLowerCase();
        if (entryKey && normalizedKey && (entryKey === normalizedKey || isSameSuitePerson(entryKey, normalizedKey))) return true;
        if (userName && isSameSuitePerson(entry.userName, userName)) return true;
        if (userName && isSameSuitePerson(entry.taskOwner, userName)) return true;
        const task = taskByTimerId(id);
        return Boolean(userName && task?.[1] && isSameSuitePerson(task[1], userName));
      }

      function timerEntryPersonKey(id, entry) {
        const task = taskByTimerId(id);
        return (
          suitePersonKey(entry?.userKey) ||
          suitePersonKey(entry?.userName) ||
          suitePersonKey(entry?.taskOwner) ||
          suitePersonKey(task?.[1])
        );
      }

      function pruneActiveTimersByUser() {
        const candidates = [];
        Object.entries(taskTimer.activeById || {}).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer(id, entry);
          candidates.push({
            id: localId,
            key: taskTimerKeyForId(localId, entry),
            entry,
            user: timerEntryPersonKey(localId, entry) || `id:${id}`
          });
        });
        Object.entries(taskTimer.activeByKey || {}).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer("", entry);
          candidates.push({
            id: localId,
            key,
            entry,
            user: timerEntryPersonKey(localId, entry) || `key:${key}`
          });
        });

        const latestByUser = new Map();
        candidates.forEach((candidate) => {
          const current = latestByUser.get(candidate.user);
          if (!current || Number(candidate.entry.startedAt || 0) > Number(current.entry.startedAt || 0)) {
            latestByUser.set(candidate.user, candidate);
          }
        });

        const nextActiveById = {};
        const nextActiveByKey = {};
        latestByUser.forEach((candidate) => {
          const entry = candidate.entry;
          const localId = localTaskIdForTimer(candidate.id, entry);
          if (localId && taskByTimerId(localId)) nextActiveById[localId] = entry;
          const key = taskTimerKeyForId(localId, entry) || candidate.key || taskTimerFingerprintFromEntry(entry);
          if (key && localId && taskByTimerId(localId)) nextActiveByKey[key] = entry;
        });
        taskTimer.activeById = nextActiveById;
        taskTimer.activeByKey = nextActiveByKey;
      }

      function syncLegacyActiveTimerFields() {
        const ownedActiveId = currentUserActiveTaskId();
        const fallbackEntry = ownedActiveId ? null : activeTimerEntries()[0];
        const nextActiveId = ownedActiveId || fallbackEntry?.[0] || null;
        const nextEntry = nextActiveId ? activeTimerEntry(nextActiveId) : null;
        taskTimer.activeTaskId = nextActiveId;
        taskTimer.activeUserKey = nextEntry?.userKey || null;
        taskTimer.activeUserName = nextEntry?.userName || null;
        taskTimer.startedAt = nextEntry?.startedAt || null;
      }

      function mergeTaskTimerSnapshot(timer, options = {}) {
        const incoming = normalizeTaskTimer(timer);
        const incomingActiveById = incoming.activeById || {};
        const incomingActiveByKey = incoming.activeByKey || {};
        const nextActiveById = { ...(taskTimer.activeById || {}) };
        const nextActiveByKey = { ...(taskTimer.activeByKey || {}) };
        const sourceName = options.actorName || incoming.activeUserName || "";
        const sourceKey = incoming.activeUserKey || "";

        Object.entries(nextActiveById).forEach(([id, entry]) => {
          const missingFromIncoming = !incomingActiveById[id]?.startedAt;
          if (missingFromIncoming && timerEntryMatchesUser(id, entry, sourceName, sourceKey)) {
            delete nextActiveById[id];
          }
        });
        Object.entries(nextActiveByKey).forEach(([key, entry]) => {
          const missingFromIncoming = !incomingActiveByKey[key]?.startedAt;
          if (missingFromIncoming && timerEntryMatchesUser(null, entry, sourceName, sourceKey)) {
            delete nextActiveByKey[key];
          }
        });

        Object.entries(incomingActiveById).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer(id, entry);
          nextActiveById[localId] = entry;
          if (localId !== id) delete nextActiveById[id];
          const key = taskTimerKeyForId(localId, entry);
          if (key) nextActiveByKey[key] = entry;
        });
        Object.entries(incomingActiveByKey).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          nextActiveByKey[key] = entry;
          const localId = localTaskIdForTimer("", entry);
          if (localId) nextActiveById[localId] = entry;
        });

        taskTimer.activeById = nextActiveById;
        taskTimer.activeByKey = nextActiveByKey;
        taskTimer.dailyById = mergedTaskDailyTimerTotals(taskTimer.dailyById, incoming.dailyById);
        taskTimer.dailyByUser = mergedDailyTimerTotals(taskTimer.dailyByUser, incoming.dailyByUser);
        taskTimer.elapsedById = { ...(taskTimer.elapsedById || {}) };
        Object.entries(incoming.elapsedById || {}).forEach(([id, seconds]) => {
          taskTimer.elapsedById[id] = Math.max(Number(taskTimer.elapsedById[id] || 0), Number(seconds || 0));
        });
        pruneActiveTimersByUser();
        syncLegacyActiveTimerFields();
      }

      function taskTimerSnapshotFromParts(activeById, elapsedById) {
        const latestByUser = new Map();
        Object.entries(activeById || {}).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          const user = timerEntryPersonKey(id, entry) || `id:${id}`;
          const current = latestByUser.get(user);
          if (!current || Number(entry.startedAt || 0) > Number(current[1].startedAt || 0)) {
            latestByUser.set(user, [id, entry]);
          }
        });
        const activeEntries = [...latestByUser.values()];
        const activeByKey = {};
        activeEntries.forEach(([id, entry]) => {
          const key = taskTimerKeyForId(id, entry);
          if (key) activeByKey[key] = entry;
        });
        const currentName = currentSuiteUserName();
        const currentKey = currentSuiteUserKey();
        const preferredEntry =
          activeEntries.find(([id, entry]) => timerEntryMatchesUser(id, entry, currentName, currentKey)) ||
          activeEntries[0] ||
          null;
        const activeTaskId = preferredEntry?.[0] || null;
        const activeEntry = preferredEntry?.[1] || null;
        return {
          activeTaskId,
          activeUserKey: activeEntry?.userKey || null,
          activeUserName: activeEntry?.userName || null,
          activeById: Object.fromEntries(activeEntries),
          activeByKey,
          dailyById: taskTimer.dailyById || {},
          dailyByUser: taskTimer.dailyByUser || {},
          elapsedById: elapsedById || {},
          startedAt: activeEntry?.startedAt || null
        };
      }

      function mergedTaskTimerForSharedSave(remoteTimer) {
        const remote = normalizeTaskTimer(remoteTimer);
        const local = normalizeTaskTimer(taskTimer);
        const nextActiveById = { ...(remote.activeById || {}) };
        const nextActiveByKey = { ...(remote.activeByKey || {}) };
        const currentName = currentSuiteUserName();
        const currentKey = currentSuiteUserKey();

        Object.entries(nextActiveById).forEach(([id, entry]) => {
          const localStillActive = Boolean(local.activeById?.[id]?.startedAt);
          if (!localStillActive && timerEntryMatchesUser(id, entry, currentName, currentKey)) {
            delete nextActiveById[id];
          }
        });
        Object.entries(nextActiveByKey).forEach(([key, entry]) => {
          const localStillActive = Boolean(local.activeByKey?.[key]?.startedAt);
          if (!localStillActive && timerEntryMatchesUser(null, entry, currentName, currentKey)) {
            delete nextActiveByKey[key];
          }
        });

        Object.entries(local.activeById || {}).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer(id, entry);
          nextActiveById[localId] = entry;
          if (localId !== id) delete nextActiveById[id];
          const key = taskTimerKeyForId(localId, entry);
          if (key) nextActiveByKey[key] = entry;
        });
        Object.entries(local.activeByKey || {}).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          nextActiveByKey[key] = entry;
          const localId = localTaskIdForTimer("", entry);
          if (localId) nextActiveById[localId] = entry;
        });

        const nextElapsedById = { ...(remote.elapsedById || {}) };
        Object.entries(local.elapsedById || {}).forEach(([id, seconds]) => {
          nextElapsedById[id] = Math.max(Number(nextElapsedById[id] || 0), Number(seconds || 0));
        });

        const snapshot = taskTimerSnapshotFromParts(nextActiveById, nextElapsedById);
        snapshot.activeByKey = { ...nextActiveByKey, ...snapshot.activeByKey };
        snapshot.dailyById = mergedTaskDailyTimerTotals(remote.dailyById, local.dailyById);
        snapshot.dailyByUser = mergedDailyTimerTotals(remote.dailyByUser, local.dailyByUser);
        return snapshot;
      }

      function localDayKey(value = Date.now()) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function mergedDailyTimerTotals(left, right) {
        const merged = {};
        [left, right].forEach((source) => {
          if (!source || typeof source !== "object") return;
          Object.entries(source).forEach(([day, totals]) => {
            if (!totals || typeof totals !== "object") return;
            merged[day] = { ...(merged[day] || {}) };
            Object.entries(totals).forEach(([userKey, seconds]) => {
              merged[day][userKey] = Math.max(
                Number(merged[day][userKey] || 0),
                Number(seconds || 0)
              );
            });
          });
        });
        return merged;
      }

      function mergedTaskDailyTimerTotals(left, right) {
        const merged = {};
        [left, right].forEach((source) => {
          if (!source || typeof source !== "object") return;
          Object.entries(source).forEach(([taskIdValue, dailyTotals]) => {
            if (!dailyTotals || typeof dailyTotals !== "object") return;
            merged[taskIdValue] = mergedDailyTimerTotals(merged[taskIdValue], dailyTotals);
          });
        });
        return merged;
      }

      function timerDailySegments(startAt, endAt = Date.now()) {
        const start = Number(startAt || 0);
        const end = Number(endAt || 0);
        if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return {};

        const segments = {};
        let cursor = start;
        while (cursor < end) {
          const cursorDate = new Date(cursor);
          const nextDay = new Date(cursorDate);
          nextDay.setHours(24, 0, 0, 0);
          const segmentEnd = Math.min(end, nextDay.getTime());
          const dayKey = localDayKey(cursor);
          if (dayKey) {
            segments[dayKey] = (segments[dayKey] || 0) + Math.max(0, Math.floor((segmentEnd - cursor) / 1000));
          }
          cursor = segmentEnd;
        }
        return segments;
      }

      function addTimerDailySeconds(id, entry, endAt = Date.now()) {
        if (!entry?.startedAt) return;
        const userKey = timerEntryPersonKey(id, entry) || suitePersonKey(activeTimerWorkerName(id)) || "sin_usuario";
        if (!userKey) return;
        const segments = timerDailySegments(entry.startedAt, endAt);
        taskTimer.dailyByUser = taskTimer.dailyByUser && typeof taskTimer.dailyByUser === "object" ? taskTimer.dailyByUser : {};
        taskTimer.dailyById = taskTimer.dailyById && typeof taskTimer.dailyById === "object" ? taskTimer.dailyById : {};
        taskTimer.dailyById[id] = taskTimer.dailyById[id] && typeof taskTimer.dailyById[id] === "object" ? taskTimer.dailyById[id] : {};
        Object.entries(segments).forEach(([day, seconds]) => {
          taskTimer.dailyByUser[day] = { ...(taskTimer.dailyByUser[day] || {}) };
          taskTimer.dailyByUser[day][userKey] = Number(taskTimer.dailyByUser[day][userKey] || 0) + Number(seconds || 0);
          taskTimer.dailyById[id][day] = { ...(taskTimer.dailyById[id][day] || {}) };
          taskTimer.dailyById[id][day][userKey] = Number(taskTimer.dailyById[id][day][userKey] || 0) + Number(seconds || 0);
        });
      }

      function activeDailySecondsForUser(name, dayKey = localDayKey()) {
        return activeTimerEntries().reduce((sum, [id, entry]) => {
          if (!taskByTimerId(id)) return sum;
          if (!timerEntryMatchesUser(id, entry, name, "")) return sum;
          const segments = timerDailySegments(entry.startedAt, Date.now());
          return sum + Number(segments[dayKey] || 0);
        }, 0);
      }

      function completedDailySecondsForUser(name, dayKey = localDayKey()) {
        const userKey = suitePersonKey(name);
        return completedTasks.reduce((sum, task) => {
          if (!task || task.action === "eliminada") return sum;
          if (localDayKey(task.completedAt) !== dayKey) return sum;
          const dailySeconds = Number(task.dailySecondsByUser?.[dayKey]?.[userKey] || 0);
          return sum + dailySeconds;
        }, 0);
      }

      function dailyWorkedSecondsForUser(name, dayKey = localDayKey()) {
        return completedDailySecondsForUser(name, dayKey) + activeDailySecondsForUser(name, dayKey);
      }

      function formatWorkedMinutes(seconds) {
        const minutes = Math.floor(Number(seconds || 0) / 60);
        return `${minutes} min`;
      }

      function taskByTimerId(id) {
        return tasks.find((task, index) => taskId(task, index) === id) || null;
      }

      function taskTimerFingerprint(task) {
        if (!task) return "";
        const base = `${normalizeText(task[0]).trim()}|${suitePersonKey(task[1])}`;
        return task[7] ? `${base}|${task[7]}` : base;
      }

      function taskTimerFingerprintFromEntry(entry) {
        if (!entry) return "";
        const base = `${normalizeText(entry.taskTitle).trim()}|${suitePersonKey(entry.taskOwner)}`;
        return entry.taskCreatedAt ? `${base}|${entry.taskCreatedAt}` : base;
      }

      function taskTimerKeyForId(id, entry) {
        const task = taskByTimerId(id);
        return taskTimerFingerprint(task) || taskTimerFingerprintFromEntry(entry);
      }

      function localTaskIdForTimer(id, entry) {
        if (taskByTimerId(id)) return id;
        const fingerprint = taskTimerFingerprintFromEntry(entry);
        if (!fingerprint || fingerprint === "|") return id;
        const index = tasks.findIndex((task) => taskTimerFingerprint(task) === fingerprint);
        return index >= 0 ? taskId(tasks[index], index) : id;
      }

      function activeTimerEntry(id) {
        const activeEntry = taskTimer.activeById?.[id];
        if (activeEntry?.startedAt) return activeEntry;
        const key = taskTimerKeyForId(id, activeEntry);
        const keyedEntry = key ? taskTimer.activeByKey?.[key] : null;
        if (keyedEntry?.startedAt) return keyedEntry;
        if (taskTimer.activeTaskId === id && taskTimer.startedAt) {
          return {
            userKey: taskTimer.activeUserKey,
            userName: taskTimer.activeUserName,
            startedAt: taskTimer.startedAt
          };
        }
        return null;
      }

      function activeTimerEntries() {
        const entries = new Map();
        Object.entries(taskTimer.activeById || {}).forEach(([id, entry]) => {
          if (entry?.startedAt) entries.set(id, entry);
        });
        Object.entries(taskTimer.activeByKey || {}).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer("", entry);
          if (localId && taskByTimerId(localId)) entries.set(localId, entry);
        });
        return [...entries.entries()];
      }
