      // ── ManyChat Leads Module ────────────────────────────────
      let manychatClient = null;

      function ensureManychatClient() {
        if (manychatClient) return manychatClient;
        const config = window.LR_SUITE_SUPABASE || {};
        const supabaseUrl = config.url || "";
        const supabaseAnonKey = config.anonKey || config.anon_key || "";
        if (!window.supabase?.createClient || !supabaseUrl || !supabaseAnonKey) {
          return null;
        }
        manychatClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        return manychatClient;
      }

      function renderManychatStatus(content, message, detail = "") {
        content.innerHTML = `
          <section class="module">
            <div class="panel">
              <div class="panel-head">
                <strong>ManyChat Leads</strong>
                <p class="small">Leads recibidos desde el webhook de ManyChat y sincronizados con Supabase.</p>
              </div>
              <div class="empty">
                <strong>${escapeHtml(message)}</strong>
                ${detail ? `<p class="small">${escapeHtml(detail)}</p>` : ""}
              </div>
            </div>
          </section>
        `;
      }

      function manychatFullName(lead) {
        return [lead.first_name, lead.last_name].filter(Boolean).join(" ").trim() || "Sin nombre";
      }

      function manychatEstadoBadge(estado) {
        const value = estado || "Nuevo";
        if (value === "Nuevo") return '<span class="badge sky">Nuevo</span>';
        return `<span class="badge">${escapeHtml(value)}</span>`;
      }

      async function manychatModule() {
        document.getElementById("app").querySelector(".content").innerHTML = "";
        const content = document.getElementById("app").querySelector(".content");
        renderManychatStatus(content, "Cargando Leads...");

        const supabase = ensureManychatClient();
        if (!supabase) {
          renderManychatStatus(
            content,
            "No se pudo conectar con Supabase.",
            "Revisa la configuración window.LR_SUITE_SUPABASE antes de abrir este módulo."
          );
          return;
        }

        const { data, error } = await supabase
          .from('mc_leads')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          renderManychatStatus(content, "No se pudieron cargar los leads.", error.message || "Error desconocido.");
          return;
        }

        const leads = Array.isArray(data) ? data : [];
        const rows = leads
          .map((lead) => {
            const dateStr = lead.created_at || "";
            const tagAds = lead.tag_ads || "";
            const estado = lead.estado || lead.status || "Nuevo";
            return `
              <tr>
                <td>${dateStr ? fmtDateTime(dateStr) : "Sin fecha"}</td>
                <td>${escapeHtml(manychatFullName(lead))}</td>
                <td>${escapeHtml(lead.phone || "Sin WhatsApp")}</td>
                <td>${escapeHtml(lead.email || "Sin email")}</td>
                <td>${tagAds ? `<span class="badge green">${escapeHtml(tagAds)}</span>` : '<span class="muted">Sin origen</span>'}</td>
                <td>${manychatEstadoBadge(estado)}</td>
              </tr>
            `;
          })
          .join("");

        content.innerHTML = `
          <section class="module">
            <div class="panel">
              <div class="panel-head">
                <strong>ManyChat Leads</strong>
                <p class="small">Leads recibidos desde ManyChat y guardados en la tabla mc_leads de Supabase.</p>
              </div>
              ${
                leads.length
                  ? `<div class="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>Fecha</th>
                            <th>Nombre Completo</th>
                            <th>WhatsApp</th>
                            <th>Email</th>
                            <th>Origen</th>
                            <th>Estado</th>
                          </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                      </table>
                    </div>`
                  : `<div class="empty">No hay leads de ManyChat registrados todavía.</div>`
              }
            </div>
          </section>
        `;
      }

      function utmModule() {
        /* ── Constantes ── */
        const BLOCKS = [
          { id: "meta",   source: "meta",   defaultMedium: "paid_social", label: "Meta Ads"   },
          { id: "google", source: "google", defaultMedium: "cpc",         label: "Google Ads" },
          { id: "tiktok", source: "tiktok", defaultMedium: "paid_social", label: "TikTok Ads" }
        ];
        const MARCAS = [
          { value: "royal_baby", label: "Royal Baby" },
          { value: "marca_b",    label: "Marca B" },
          { value: "marca_c",    label: "Marca C" }
        ];

        /* ── Estado por bloque ── */
        const seqs = {};
        BLOCKS.forEach(b => { seqs[b.id] = { camp: 0, as: 0, ad: 0 }; });

        /* ── Utilidades ── */
        function sanitizeUtm(text) {
          const M = {á:"a",à:"a",ä:"a",â:"a",ã:"a",é:"e",è:"e",ë:"e",ê:"e",í:"i",ì:"i",ï:"i",î:"i",ó:"o",ò:"o",ö:"o",ô:"o",õ:"o",ú:"u",ù:"u",ü:"u",û:"u",ñ:"n",ç:"c"};
          return text.toLowerCase().split("").map(c => M[c] ?? c).join("").replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"").replace(/_+/g,"_").replace(/^_|_$/g,"");
        }
        function getVal(id) { return document.getElementById(id)?.value ?? ""; }
        function opts(items, p) {
          return `<option value="">${p}</option>` + items.map(i => `<option value="${escapeHtml(i.value)}">${escapeHtml(i.label)}</option>`).join("");
        }

        }

        /* ── HTML: conjunto de anuncios (Nivel 2) ── */

        /* ── HTML: contenedor de campaña (Nivel 1) ── */

                <div id="utm-${blockId}-${campId}-preview" class="utm-preview" style="display:none;margin-top:10px">
                  <span class="utm-preview-label">utm_campaign:</span>
                  <span class="utm-preview-value" id="utm-${blockId}-${campId}-pv"></span>
                </div>
              </div>
              <div style="padding:14px 18px 18px">
                <p style="margin:0 0 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle)">Niveles 2 y 3 · Conjuntos y Anuncios</p>
                <div id="utm-${blockId}-${campId}-tree" style="display:flex;flex-direction:column;gap:10px">
                  ${adSetHtml(blockId, campId, firstAsId)}
                </div>
                <button class="utm-add-adset-btn" style="margin-top:12px" data-action="add-adset" data-camp="${campId}" data-block="${blockId}">
                  ${icons.checks} Añadir Conjunto de Anuncios
                </button>
              </div>
            </div>`;
        }

        /* ── HTML: bloque de plataforma ── */
        function blockHtml(block) {
          const firstCampId = `camp${++seqs[block.id].camp}`;
          const pillStyle = `display:inline-flex;align-items:center;border:1px solid var(--green-line);border-radius:5px;background:var(--green-soft);overflow:hidden`;
          const lblStyle  = `padding:3px 6px 3px 9px;font-size:11px;font-weight:600;color:var(--green-700);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;white-space:nowrap;line-height:1`;
          const inpStyle  = `border:none;border-left:1px solid var(--green-line);background:transparent;color:var(--green-700);padding:0 6px;font-size:11px;font-weight:600;height:26px;outline:none;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;min-width:0`;
          return `
            <div class="panel" id="utm-${block.id}-block" style="overflow:hidden;padding:0">
              <div style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--surface-subtle);flex-wrap:wrap">
                <strong style="font-size:13px;font-weight:700;color:var(--ink)">${block.label}</strong>
                <div style="${pillStyle}">
                  <span style="${lblStyle}">utm_source =</span>
                  <input id="utm-${block.id}-source" value="${block.source}" style="${inpStyle};width:80px" />
                </div>
                <div style="${pillStyle}">
                  <span style="${lblStyle}">utm_medium =</span>
                  <input id="utm-${block.id}-medium" value="${block.defaultMedium}" style="${inpStyle};width:100px" />
                </div>
                <div style="display:flex;gap:6px;margin-left:auto">
                  <button class="btn" style="font-size:11px;height:28px;padding:0 10px;display:inline-flex;align-items:center;gap:5px" data-action="export-csv" data-block="${block.id}">${icons.download} Exportar CSV</button>
                  <button class="btn" style="font-size:11px;height:28px;padding:0 10px" data-action="clear-block" data-block="${block.id}">Limpiar</button>
                </div>
              </div>
              <div id="utm-${block.id}-campaigns">
                ${campaignHtml(block.id, firstCampId)}
              </div>
              <div style="padding:10px 18px 14px;border-top:1px solid var(--line-soft)">
                <button class="utm-add-adset-btn" data-action="add-campaign" data-block="${block.id}">
                  ${icons.checks} Añadir Campaña
                </button>
              </div>
            </div>`;
        }

        /* ── Render ── */
        shell(`
          <section class="module">
            ${header("UTM Builder", "Genera URLs con parámetros UTM para Meta, Google y TikTok Ads. Los resultados aparecen inline en cada anuncio.", "Analítica Digital · GA4", icons.link, "<span></span>")}
            ${BLOCKS.map(b => blockHtml(b)).join("")}
          </section>
        `);

        /* ── Actualizar URLs (itera campañas del bloque) ── */
        function updateBlockUrls(blockId) {
          const source = getVal(`utm-${blockId}-source`) || BLOCKS.find(b => b.id === blockId).source;
          const medium = getVal(`utm-${blockId}-medium`) || BLOCKS.find(b => b.id === blockId).defaultMedium;
          document.getElementById(`utm-${blockId}-campaigns`)
            ?.querySelectorAll(".utm-campaign-container")
            .forEach(campEl => updateCampaignUrls(blockId, campEl.dataset.camp, source, medium));
        }

        function updateCampaignUrls(blockId, campId, source, medium) {
          const baseUrl  = getVal(`utm-${blockId}-${campId}-base-url`).trim();
          const marca    = getVal(`utm-${blockId}-${campId}-marca`);
          const cname    = sanitizeUtm(getVal(`utm-${blockId}-${campId}-campaign-name`));
          const campaign = (marca && cname) ? `${marca}_${cname}` : "";
          const sep      = baseUrl.includes("?") ? "&" : "?";
          const prevEl   = document.getElementById(`utm-${blockId}-${campId}-preview`);
          const pvVal    = document.getElementById(`utm-${blockId}-${campId}-pv`);
          if (prevEl && pvVal) {
            if (campaign) { prevEl.style.display = ""; pvVal.textContent = campaign; }
            else prevEl.style.display = "none";
          }
          const treeEl = document.getElementById(`utm-${blockId}-${campId}-tree`);
          if (!treeEl) return;
          treeEl.querySelectorAll(".utm-adset-row").forEach(asEl => {
            const asId    = asEl.dataset.as;
            const term    = sanitizeUtm(getVal(`utm-${blockId}-${campId}-as-name-${asId}`));
            const asPrev  = document.getElementById(`utm-${blockId}-${campId}-as-preview-${asId}`);
            const asPvVal = document.getElementById(`utm-${blockId}-${campId}-as-pv-${asId}`);
            if (asPrev && asPvVal) {
              if (term) { asPrev.style.display = ""; asPvVal.textContent = term; }
              else asPrev.style.display = "none";
            }
            asEl.querySelectorAll(".utm-ad-row").forEach(adEl => {
              const adId    = adEl.dataset.ad;
              const content = sanitizeUtm(getVal(`utm-${blockId}-${campId}-ad-name-${adId}`));
              const urlEl   = document.getElementById(`utm-${blockId}-${campId}-ad-url-${adId}`);
              if (!urlEl) return;
              if (!baseUrl || !campaign) { urlEl.value = ""; urlEl.title = ""; urlEl.classList.remove("has-url"); return; }
              const parts = [`utm_source=${source}`,`utm_medium=${medium}`,`utm_campaign=${campaign}`,...(term?[`utm_term=${term}`]:[]),...(content?[`utm_content=${content}`]:[])];
              const url = `${baseUrl}${sep}${parts.join("&")}`;
              urlEl.value = url; urlEl.title = url; urlEl.classList.add("has-url");
            });
          });
        }

        /* ── Exportar CSV de un bloque ── */
        function exportBlockCsv(blockId) {
          const source = getVal(`utm-${blockId}-source`) || BLOCKS.find(b => b.id === blockId).source;
          const medium = getVal(`utm-${blockId}-medium`) || BLOCKS.find(b => b.id === blockId).defaultMedium;
          const rows = [];
          document.getElementById(`utm-${blockId}-campaigns`)
            ?.querySelectorAll(".utm-campaign-container")
            .forEach(campEl => {
              const campId   = campEl.dataset.camp;
              const campaign = document.getElementById(`utm-${blockId}-${campId}-pv`)?.textContent || "";
              campEl.querySelectorAll(".utm-adset-row").forEach(asEl => {
                const asId = asEl.dataset.as;
                asEl.querySelectorAll(".utm-ad-row").forEach(adEl => {
                  const adId  = adEl.dataset.ad;
                  const urlEl = document.getElementById(`utm-${blockId}-${campId}-ad-url-${adId}`);
                  if (!urlEl?.value) return;
                  rows.push({source,medium,campaign,term:sanitizeUtm(getVal(`utm-${blockId}-${campId}-as-name-${asId}`)),content:sanitizeUtm(getVal(`utm-${blockId}-${campId}-ad-name-${adId}`)),url:urlEl.value});
                });
              });
            });
          if (!rows.length) return;
          const BOM="﻿",HEADERS=["#","utm_source","utm_medium","utm_campaign","utm_term","utm_content","URL"].join(",");
          const body=rows.map((r,i)=>[i+1,`"${r.source}"`,`"${r.medium}"`,`"${r.campaign}"`,`"${r.term}"`,`"${r.content}"`,`"${r.url}"`].join(",")).join("\n");
          const blob=new Blob([BOM+HEADERS+"\n"+body],{type:"text/csv;charset=utf-8;"});
          const url=URL.createObjectURL(blob);
          const a=Object.assign(document.createElement("a"),{href:url,download:`utm_${blockId}_${new Date().toISOString().slice(0,10)}.csv`});
          document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
        }

        /* ── Event listeners por bloque ── */
        BLOCKS.forEach(block => {
          const blockEl = document.getElementById(`utm-${block.id}-block`);
          if (!blockEl) return;
          blockEl.addEventListener("input",  () => updateBlockUrls(block.id));
          blockEl.addEventListener("change", () => updateBlockUrls(block.id));
          blockEl.addEventListener("click", e => {
            const btn = e.target.closest("[data-action]");
            if (!btn) return;
            const action  = btn.dataset.action;
            const blockId = btn.dataset.block || block.id;
            const campId  = btn.dataset.camp;
            const asId    = btn.dataset.as;
            const adId    = btn.dataset.ad;

            if (action === "add-campaign") {
              const campsEl = document.getElementById(`utm-${blockId}-campaigns`);
              if (!campsEl) return;
              const newCampId = `camp${++seqs[blockId].camp}`;
              const div = document.createElement("div");
              div.innerHTML = campaignHtml(blockId, newCampId);
              campsEl.appendChild(div.firstElementChild);
              document.getElementById(`utm-${blockId}-${newCampId}-base-url`)?.focus();
            }
            if (action === "delete-campaign" && campId) {
              const campsEl = document.getElementById(`utm-${blockId}-campaigns`);
              if (!campsEl || campsEl.querySelectorAll(".utm-campaign-container").length <= 1) return;
              document.getElementById(`utm-${blockId}-${campId}`)?.remove();
            }
            if (action === "add-adset" && campId) {
              const treeEl = document.getElementById(`utm-${blockId}-${campId}-tree`);
              if (!treeEl) return;
              const newAsId = `as${++seqs[blockId].as}`;
              const div = document.createElement("div");
              div.innerHTML = adSetHtml(blockId, campId, newAsId);
              treeEl.appendChild(div.firstElementChild);
              document.getElementById(`utm-${blockId}-${campId}-as-name-${newAsId}`)?.focus();
              updateBlockUrls(blockId);
            }
            if (action === "add-ad" && campId && asId) {
              const adsEl = document.getElementById(`utm-${blockId}-${campId}-ads-${asId}`);
              if (!adsEl) return;
              const newAdId = `ad${++seqs[blockId].ad}`;
              const div = document.createElement("div");
              div.innerHTML = adRowHtml(blockId, campId, newAdId, asId);
              adsEl.appendChild(div.firstElementChild);
              document.getElementById(`utm-${blockId}-${campId}-ad-name-${newAdId}`)?.focus();
              updateBlockUrls(blockId);
            }
            if (action === "delete-adset" && campId && asId) {
              const treeEl = document.getElementById(`utm-${blockId}-${campId}-tree`);
              if (!treeEl || treeEl.querySelectorAll(".utm-adset-row").length <= 1) return;
              document.getElementById(`utm-${blockId}-${campId}-as-${asId}`)?.remove();
            }
            if (action === "delete-ad" && campId && asId && adId) {
              const adsEl = document.getElementById(`utm-${blockId}-${campId}-ads-${asId}`);
              if (!adsEl || adsEl.querySelectorAll(".utm-ad-row").length <= 1) return;
              document.getElementById(`utm-${blockId}-${campId}-ad-${adId}`)?.remove();
            }
            if (action === "copy-url") {
              const urlEl = document.getElementById(btn.dataset.urlId);
              if (!urlEl?.value) return;
              navigator.clipboard.writeText(urlEl.value).catch(() => {});
              const orig = btn.textContent; btn.textContent = "✓";
              setTimeout(() => { btn.textContent = orig; }, 1500);
            }
            if (action === "export-csv") exportBlockCsv(blockId);
            if (action === "clear-block") {
              const b = BLOCKS.find(x => x.id === blockId);
              const srcEl = document.getElementById(`utm-${blockId}-source`);
              const medEl = document.getElementById(`utm-${blockId}-medium`);
              if (srcEl) srcEl.value = b.source;
              if (medEl) medEl.value = b.defaultMedium;
              seqs[blockId].camp = 0; seqs[blockId].as = 0; seqs[blockId].ad = 0;
              const campsEl = document.getElementById(`utm-${blockId}-campaigns`);
              if (!campsEl) return;
              campsEl.innerHTML = "";
              const newCampId = `camp${++seqs[blockId].camp}`;
              const div = document.createElement("div");
              div.innerHTML = campaignHtml(blockId, newCampId);
              campsEl.appendChild(div.firstElementChild);
            }
          });
        });
      }

      function render() {
        if (!suiteUsers.length) {
          renderSuiteSetup();
          return;
        }

        if (!hasSuiteAccess()) {
          renderSuiteLock();
          return;
        }

        const visibleModules = currentSuiteUserModules();
        if (!visibleModules.length) {
          renderNoModuleAccess();
          return;
        }
        if (!currentSuiteUserCanAccessModule(state.active)) {
          state.active = visibleModules[0].id;
          saveActiveModule(state.active);
        }

        if (state.active === "quotes") quotesModule();
        else if (state.active === "tasks") tasksModule();
        else if (state.active === "metricool") metricoolModule();
        else if (state.active === "access") accessModule();
        else if (state.active === "manychat") manychatModule();
        else if (state.active === "utm") utmModule();
        else financialModule();
      }

      function bootSuite() {
        try {
          loadSuiteUsers();
          loadTaskState();
          render();
        } catch (error) {
          console.error("LR Suite no pudo restaurar el estado local.", error);
          suiteUsers = defaultSuiteUsers();
          suiteAccessSession = "";
          renderSuiteLock();
        }
      }

      bootSuite();
    </script>
  </body>
</html>
