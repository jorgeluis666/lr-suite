      function hasActiveTaskTimers() {
        return activeTimerEntries().length > 0 || Boolean(taskTimer.activeTaskId && taskTimer.startedAt && taskByTimerId(taskTimer.activeTaskId));
      }

      function activeTimerWorkerName(id = taskTimer.activeTaskId) {
        const entry = activeTimerEntry(id);
        const storedName = String(entry?.userName || "").trim();
        const normalizedStoredName = normalizeText(storedName);
        if (storedName && normalizedStoredName !== "otro usuario" && normalizedStoredName !== "usuario") return storedName;

        const storedKey = String(entry?.userKey || "").trim();
        if (storedKey) return suitePendingOwnerName({ key: storedKey }, storedKey);

        const task = taskByTimerId(id);
        if (task?.[1]) return task[1];

        return "Responsable";
      }

      function currentUserOwnsActiveTimer(id = taskTimer.activeTaskId) {
        const entry = activeTimerEntry(id);
        if (!entry) return false;
        const activeKey = String(entry.userKey || "").trim().toLowerCase();
        const currentKey = currentSuiteUserKey();
        if (activeKey && (activeKey === currentKey || isSameSuitePerson(activeKey, currentKey))) return true;

        const entryName = String(entry.userName || "").trim();
        const normalizedEntryName = normalizeText(entryName);
        if (
          entryName &&
          normalizedEntryName !== "otro usuario" &&
          normalizedEntryName !== "usuario" &&
          isSameSuitePerson(entryName, currentSuiteUserName())
        ) {
          return true;
        }
        return false;
      }

      function currentUserActiveTaskId() {
        const ownedEntry = activeTimerEntries().find(([id]) => currentUserOwnsActiveTimer(id));
        if (ownedEntry) return ownedEntry[0];
        if (taskTimer.activeTaskId && currentUserOwnsActiveTimer(taskTimer.activeTaskId)) return taskTimer.activeTaskId;
        return null;
      }

      function clearCurrentUserActiveTimers() {
        const currentName = currentSuiteUserName();
        const currentKey = currentSuiteUserKey();
        Object.entries(taskTimer.activeById || {}).forEach(([id, entry]) => {
          if (!timerEntryMatchesUser(id, entry, currentName, currentKey)) return;
          addTimerDailySeconds(id, entry);
          taskTimer.elapsedById[id] = elapsedSecondsForTask(id);
          delete taskTimer.activeById[id];
        });
        Object.entries(taskTimer.activeByKey || {}).forEach(([key, entry]) => {
          if (!timerEntryMatchesUser(null, entry, currentName, currentKey)) return;
          delete taskTimer.activeByKey[key];
        });
        if (taskTimer.activeTaskId && !taskTimer.activeById[taskTimer.activeTaskId]) {
          taskTimer.activeTaskId = null;
          taskTimer.activeUserKey = null;
          taskTimer.activeUserName = null;
          taskTimer.startedAt = null;
        }
        pruneActiveTimersByUser();
      }

      function isTaskLockedByOtherUser(id) {
        const entry = activeTimerEntry(id);
        return Boolean(entry && !currentUserOwnsActiveTimer(id));
      }

      function canCurrentUserControlTask(id) {
        return !isTaskLockedByOtherUser(id);
      }

      function normalizeText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function hasSuiteAccess() {
        const sessionKey = getSuiteAccessSession();
        return Boolean(sessionKey && suiteUsers.some((user) => user.key === sessionKey));
      }

      function addSuiteUser(name, key, password, confirmPassword) {
        const nextUser = normalizeSuiteUser({ name, key, password });
        nextUser.role = SUITE_SUPERADMIN_ROLE;
        const confirmation = String(confirmPassword || "").trim();

        if (!nextUser.name || !nextUser.key || !nextUser.password) {
          state.suiteUserMessage = "Completa nombre, usuario y contraseña.";
          return null;
        }
        if (nextUser.password !== confirmation) {
          state.suiteUserMessage = "Las contraseñas no coinciden.";
          return null;
        }
        if (suiteUsers.some((user) => user.key === nextUser.key)) {
          state.suiteUserMessage = "Ese usuario ya existe.";
          return null;
        }

        suiteUsers.push(nextUser);
        state.suiteUserMessage = `Usuario creado: ${nextUser.key}.`;
        saveSuiteUsers();
        return nextUser;
      }

      function updateSuiteUserName(userKey, name) {
        const normalizedKey = String(userKey || "").trim().toLowerCase();
        const nextName = String(name || "").trim();

        if (!nextName) {
          state.suiteUserMessage = "Ingresa un nombre de usuario.";
          return false;
        }

        const index = suiteUsers.findIndex((user) => user.key === normalizedKey);
        if (index < 0) {
          state.suiteUserMessage = "Usuario no encontrado.";
          return false;
        }

        suiteUsers[index].name = nextName;
        state.suiteUserMessage = `Nombre actualizado para ${suiteUsers[index].key}.`;
        saveSuiteUsers();
        return true;
      }

      function updateSuiteUserOrder(userKey, order) {
        const normalizedKey = String(userKey || "").trim().toLowerCase();
        const nextOrder = Math.max(1, Math.trunc(Number(order) || 1));
        const index = suiteUsers.findIndex((user) => user.key === normalizedKey);
        if (index < 0) {
          state.suiteUserMessage = "Usuario no encontrado.";
          return false;
        }

        suiteUsers[index].order = nextOrder;
        state.suiteUserMessage = `Orden actualizado para ${suiteUsers[index].key}.`;
        saveSuiteUsers();
        return true;
      }

      function updateSuitePassword(userKey, password, confirmPassword) {
        const normalizedKey = String(userKey || "").trim().toLowerCase();
        const nextPassword = String(password || "").trim();
        const confirmation = String(confirmPassword || "").trim();

        if (!nextPassword) {
          state.suiteUserMessage = "Ingresa una nueva contraseña.";
          return false;
        }
        if (nextPassword !== confirmation) {
          state.suiteUserMessage = "Las contraseñas no coinciden.";
          return false;
        }

        const index = suiteUsers.findIndex((user) => user.key === normalizedKey);
        if (index < 0) {
          state.suiteUserMessage = "Usuario no encontrado.";
          return false;
        }

        suiteUsers[index].password = nextPassword;
        state.suiteUserMessage = `Contraseña actualizada para ${suiteUsers[index].key}.`;
        saveSuiteUsers();
        return true;
      }

      function resetSuitePassword(userKey) {
        const normalizedKey = String(userKey || "").trim().toLowerCase();
        const index = suiteUsers.findIndex((user) => user.key === normalizedKey);
        if (index < 0) {
          state.suiteUserMessage = "Usuario no encontrado.";
          return false;
        }

        suiteUsers[index].password = "1234";
        state.suiteUserMessage = `Contraseña restablecida para ${suiteUsers[index].key}.`;
        saveSuiteUsers();
        return true;
      }

      function persistTaskStateVersion() {
        if (!pendingStateVersion) return;
        localStorage.setItem(TASK_STATE_VERSION_STORAGE_KEY, String(pendingStateVersion));
      }

      function touchTaskStateVersion(options = {}) {
        if (options.version === false || sharedPendingApplying) {
          persistTaskStateVersion();
          return;
        }
        pendingStateVersion = Date.now();
        persistTaskStateVersion();
      }

      function saveTaskState(options = {}) {
        touchTaskStateVersion(options);
        localStorage.setItem(TASKS_STORAGE_KEY, JSON.stringify(tasks));
        localStorage.setItem(COMPLETED_STORAGE_KEY, JSON.stringify(completedTasks));
        if (options.broadcast !== false) publishTaskSync();
        if (options.shared !== false) queueSharedPendingSave();
      }

      function saveTimerState(options = {}) {
        touchTaskStateVersion(options);
        localStorage.setItem(TIMER_STORAGE_KEY, JSON.stringify(taskTimer));
        if (options.broadcast !== false) publishTaskSync();
        if (options.shared !== false) queueSharedPendingSave();
      }

      function taskSyncPayload() {
        return {
          actorName: currentSuiteUserName(),
          completedTasks,
          sourceId: pendingSyncSourceId,
          stateVersion: pendingStateVersion || 0,
          taskTimer,
          tasks,
          updatedAt: Date.now()
        };
      }

      function captureNewTaskDraft() {
        const form = document.getElementById("newTaskForm");
        if (!form) return null;
        const activeElement = document.activeElement;
        return {
          activeName: form.contains(activeElement) ? activeElement.name : "",
          dueDate: form.elements.dueDate?.value || "",
          owner: form.elements.owner?.value || "",
          priority: form.elements.priority?.value || "",
          startDate: form.elements.startDate?.value || "",
          title: form.elements.title?.value || ""
        };
      }

      function restoreNewTaskDraft(draft) {
        if (!draft) return;
        const form = document.getElementById("newTaskForm");
        if (!form) return;
        if (form.elements.title) form.elements.title.value = draft.title;
        if (form.elements.owner && draft.owner) form.elements.owner.value = draft.owner;
        if (form.elements.startDate) form.elements.startDate.value = draft.startDate;
        if (form.elements.dueDate) form.elements.dueDate.value = draft.dueDate;
        if (form.elements.priority && draft.priority) form.elements.priority.value = draft.priority;
        if (draft.activeName && form.elements[draft.activeName]) {
          form.elements[draft.activeName].focus();
        }
      }

      function syncNewTaskTodayDates(event) {
        const input = event.currentTarget;
        const today = localDayKey();
        if (!input?.value || input.value !== today) return;

        const form = input.form || document.getElementById("newTaskForm");
        if (!form) return;
        if (form.elements.startDate) form.elements.startDate.value = today;
        if (form.elements.dueDate) form.elements.dueDate.value = today;
      }

      function wireNewTaskDateSync() {
        const form = document.getElementById("newTaskForm");
        if (!form) return;
        [form.elements.startDate, form.elements.dueDate].forEach((input) => {
          if (!input) return;
          input.addEventListener("input", syncNewTaskTodayDates);
          input.addEventListener("change", syncNewTaskTodayDates);
        });
      }

      function renderTasksIfActive() {
        if (state.active !== "tasks" || !hasSuiteAccess()) return;
        pruneActiveTimersByUser();
        syncLegacyActiveTimerFields();
        const draft = captureNewTaskDraft();
        tasksModule();
        restoreNewTaskDraft(draft);
      }

      function publishTaskSync() {
        const payload = taskSyncPayload();
        taskSyncChannel?.postMessage(payload);
        try {
          localStorage.setItem(TASK_SYNC_EVENT_KEY, JSON.stringify(payload));
        } catch {
          // La suite debe seguir funcionando aunque el navegador limite eventos de storage.
        }
      }

      function applyTaskSyncPayload(payload) {
        if (!payload || payload.sourceId === pendingSyncSourceId) return;
        if (!Array.isArray(payload.tasks) || !Array.isArray(payload.completedTasks)) return;
        const incomingVersion = Number(payload.stateVersion ?? payload.updatedAt ?? 0);
        if (pendingStateVersion && incomingVersion < pendingStateVersion) return;

        pendingStateVersion = incomingVersion || pendingStateVersion;
        persistTaskStateVersion();
        tasks = payload.tasks;
        completedTasks = payload.completedTasks;
        if (payload.taskTimer && typeof payload.taskTimer === "object") {
          mergeTaskTimerSnapshot(payload.taskTimer, { actorName: payload.actorName });
        }
        ensureTaskIds();
        if (hasActiveTaskTimers()) ensureTaskTimerInterval();
        else stopTaskTimerIntervalIfIdle();
        renderTasksIfActive();
      }

      function refreshTaskStateFromStorage() {
        applyTaskSyncPayload({
          completedTasks: readStoredJson(COMPLETED_STORAGE_KEY, completedTasks),
          sourceId: "storage",
          taskTimer: readStoredJson(TIMER_STORAGE_KEY, taskTimer),
          tasks: readStoredJson(TASKS_STORAGE_KEY, tasks),
          updatedAt: Date.now()
        });
      }

      function sharedPendingConfig() {
        const config = window.LR_SUITE_SUPABASE || {};
        return {
          anonKey: config.anonKey || config.anon_key || "",
          url: config.url || ""
        };
      }

      function canUseSharedPendingDb() {
        const config = sharedPendingConfig();
        return Boolean(window.supabase?.createClient && config.url && config.anonKey);
      }

      function ensureSharedPendingClient() {
        if (sharedPendingClient || !canUseSharedPendingDb()) return sharedPendingClient;
        const config = sharedPendingConfig();
        sharedPendingClient = window.supabase.createClient(config.url, config.anonKey, {
          realtime: {
            params: {
              eventsPerSecond: 8
            }
          }
        });
        return sharedPendingClient;
      }

      async function connectSharedPendingUser(userKey, password) {
        const client = ensureSharedPendingClient();
        if (!client || !userKey || !password) return false;
        const { error } = await client.auth.signInWithPassword({
          email: userKey,
          password
        });
        if (error) {
          sharedPendingStatus = "auth";
          console.warn("No se pudo iniciar sesión en la BBDD compartida:", error.message);
          return false;
        }
        sharedPendingAvailable = false;
        await initSharedPendingDb();
        return sharedPendingAvailable;
      }

      function sharedPendingPayload(overrides = {}) {
        return {
          app_id: SHARED_PENDING_APP_ID,
          actor_name: currentSuiteUserName(),
          completed_tasks: completedTasks,
          presence: readStoredJson(PRESENCE_STORAGE_KEY, {}),
          source_id: pendingSyncSourceId,
          state_version: pendingStateVersion || 0,
          task_timer: overrides.taskTimer || taskTimer,
          tasks,
          updated_at: new Date().toISOString()
        };
      }

      function sharedLivePayload() {
        return {
          actorName: currentSuiteUserName(),
          completedTasks,
          presence: readStoredJson(PRESENCE_STORAGE_KEY, {}),
          sourceId: pendingSyncSourceId,
          stateVersion: pendingStateVersion || 0,
          taskTimer,
          tasks,
          updatedAt: Date.now()
        };
      }

      function sharedTimerPayload() {
        return {
          actorName: currentSuiteUserName(),
          sourceId: pendingSyncSourceId,
          taskTimer,
          updatedAt: Date.now()
        };
      }

      function applySharedPendingRow(row) {
        if (!row || row.source_id === pendingSyncSourceId) return;
        const incomingVersion = Number(row.state_version ?? (row.updated_at ? new Date(row.updated_at).getTime() : 0));
        if (pendingStateVersion && incomingVersion < pendingStateVersion) return;
        sharedPendingApplying = true;
        tasks = Array.isArray(row.tasks) ? row.tasks : tasks;
        completedTasks = Array.isArray(row.completed_tasks) ? row.completed_tasks : completedTasks;
        if (row.task_timer && typeof row.task_timer === "object") {
          mergeTaskTimerSnapshot(row.task_timer, { actorName: row.actor_name });
        }
        if (row.presence && typeof row.presence === "object") {
          mergePendingPresence(row.presence);
        }
        ensureTaskIds();
        pendingStateVersion = incomingVersion || pendingStateVersion;
        persistTaskStateVersion();
        localStorage.setItem(TASKS_STORAGE_KEY, JSON.stringify(tasks));
        localStorage.setItem(COMPLETED_STORAGE_KEY, JSON.stringify(completedTasks));
        localStorage.setItem(TIMER_STORAGE_KEY, JSON.stringify(taskTimer));
        sharedPendingApplying = false;
        if (hasActiveTaskTimers()) ensureTaskTimerInterval();
        else stopTaskTimerIntervalIfIdle();
        publishTaskSync();
        renderTasksIfActive();
      }

      function applySharedLivePayload(payload) {
        if (!payload || payload.sourceId === pendingSyncSourceId) return;
        if (!Array.isArray(payload.tasks) || !Array.isArray(payload.completedTasks)) return;
        const incomingVersion = Number(payload.stateVersion ?? payload.updatedAt ?? 0);
        if (pendingStateVersion && incomingVersion < pendingStateVersion) return;
        if (incomingVersion && incomingVersion < lastSharedStateAt) return;
        lastSharedStateAt = incomingVersion || Number(payload.updatedAt || Date.now());
        const hasTaskChanges =
          JSON.stringify(payload.tasks) !== JSON.stringify(tasks) ||
          JSON.stringify(payload.completedTasks) !== JSON.stringify(completedTasks);
        const hasTimerChanges = JSON.stringify(payload.taskTimer || {}) !== JSON.stringify(taskTimer);
        sharedPendingApplying = true;
        tasks = payload.tasks;
        completedTasks = payload.completedTasks;
        if (payload.taskTimer && typeof payload.taskTimer === "object") {
          mergeTaskTimerSnapshot(payload.taskTimer, { actorName: payload.actorName });
        }
        if (payload.presence && typeof payload.presence === "object") {
          mergePendingPresence(payload.presence);
        }
        ensureTaskIds();
        pendingStateVersion = lastSharedStateAt || pendingStateVersion;
        persistTaskStateVersion();
        localStorage.setItem(TASKS_STORAGE_KEY, JSON.stringify(tasks));
        localStorage.setItem(COMPLETED_STORAGE_KEY, JSON.stringify(completedTasks));
        localStorage.setItem(TIMER_STORAGE_KEY, JSON.stringify(taskTimer));
        sharedPendingApplying = false;
        if (hasActiveTaskTimers()) ensureTaskTimerInterval();
        else stopTaskTimerIntervalIfIdle();
        if (hasTaskChanges || hasTimerChanges) {
          showLiveActivity(`${payload.actorName || "Otro usuario"} actualizó pendientes en vivo.`);
        }
        if (hasTaskChanges) renderTasksIfActive();
        else if (hasTimerChanges) renderTasksIfActive();
        else {
          renderPresenceFromSync();
          updateTaskTimerDom();
        }
      }

      function applySharedTimerPayload(payload) {
        if (!payload || payload.sourceId === pendingSyncSourceId) return;
        if (!payload.taskTimer || typeof payload.taskTimer !== "object") return;

        const incomingTimer = payload.taskTimer;
        const hasTimerChanges = JSON.stringify(incomingTimer) !== JSON.stringify(taskTimer);
        if (!hasTimerChanges) return;

        mergeTaskTimerSnapshot(incomingTimer, { actorName: payload.actorName });
        localStorage.setItem(TIMER_STORAGE_KEY, JSON.stringify(taskTimer));

        if (hasActiveTaskTimers()) ensureTaskTimerInterval();
        else stopTaskTimerIntervalIfIdle();

        renderTasksIfActive();
      }

      function publishSharedLiveState() {
        if (!sharedLiveChannel) return;
        sharedLiveChannel.send({
          event: "state",
          payload: sharedLivePayload(),
          type: "broadcast"
        });
      }

      function publishSharedTimerState() {
        if (!sharedLiveChannel || sharedPendingApplying) return;
        sharedLiveChannel.send({
          event: "timer",
          payload: sharedTimerPayload(),
          type: "broadcast"
        });
      }

      function publishSharedPresence(entry) {
        if (!sharedLiveChannel || !entry?.id) return;
        sharedLiveChannel.send({
          event: "presence",
          payload: {
            entry,
            sourceId: pendingSyncSourceId,
            updatedAt: Date.now()
          },
          type: "broadcast"
        });
      }

      function publishSharedAssignment(notice) {
        if (!sharedLiveChannel || !notice?.id) return;
        sharedLiveChannel.send({
          event: "assignment",
          payload: {
            notice,
            sourceId: pendingSyncSourceId,
            updatedAt: Date.now()
          },
          type: "broadcast"
        });
      }

      function queueSharedLiveBroadcast() {
        if (!sharedLiveChannel || sharedPendingApplying) return;
        window.clearTimeout(sharedLiveBroadcastTimer);
        sharedLiveBroadcastTimer = window.setTimeout(publishSharedLiveState, 150);
      }

      function initSharedPendingLive() {
        if (sharedLiveReady) return;
        const client = ensureSharedPendingClient();
        if (!client) return;
        sharedLiveReady = true;
        sharedLiveChannel = client.channel("lr-suite-pending-live", {
          config: {
            broadcast: {
              self: false
            }
          }
        });
        sharedLiveChannel
          .on("broadcast", { event: "state" }, (event) => applySharedLivePayload(event.payload))
          .on("broadcast", { event: "timer" }, (event) => applySharedTimerPayload(event.payload))
          .on("broadcast", { event: "presence" }, (event) => applyPresenceSyncPayload(event.payload))
          .on("broadcast", { event: "assignment" }, (event) => applyAssignmentNotificationPayload(event.payload))
          .on("broadcast", { event: "request-state" }, (event) => {
            if (event.payload?.sourceId === pendingSyncSourceId) return;
            queueSharedLiveBroadcast();
          })
          .subscribe((status) => {
            if (status === "SUBSCRIBED") {
              sharedPendingStatus = sharedPendingAvailable ? "shared" : "live";
              publishPresenceSync(currentPendingPresenceEntry());
              sharedLiveChannel.send({
                event: "request-state",
                payload: {
                  requestedAt: Date.now(),
                  sourceId: pendingSyncSourceId
                },
                type: "broadcast"
              });
            }
          });
      }

      async function saveSharedPendingState() {
        if (!sharedPendingAvailable || !sharedPendingClient || sharedPendingApplying) return;
        let nextTaskTimer = taskTimer;
        const { data } = await sharedPendingClient
          .from(SHARED_PENDING_TABLE)
          .select("task_timer")
          .eq("app_id", SHARED_PENDING_APP_ID)
          .maybeSingle();
        if (data?.task_timer && typeof data.task_timer === "object") {
          nextTaskTimer = mergedTaskTimerForSharedSave(data.task_timer);
          applyTaskTimerSnapshot(nextTaskTimer);
          localStorage.setItem(TIMER_STORAGE_KEY, JSON.stringify(taskTimer));
        }
        const { error } = await sharedPendingClient
          .from(SHARED_PENDING_TABLE)
          .upsert(sharedPendingPayload({ taskTimer: nextTaskTimer }), { onConflict: "app_id" });
        if (error) {
          sharedPendingStatus = error.code === "PGRST205" ? "missing" : "error";
          console.warn("No se pudo sincronizar pendientes compartidos:", error.message);
        }
      }

      function queueSharedPendingSave() {
        queueSharedLiveBroadcast();
        if (!sharedPendingAvailable || sharedPendingApplying) return;
        window.clearTimeout(sharedPendingSaveTimer);
        sharedPendingSaveTimer = window.setTimeout(saveSharedPendingState, 250);
      }

      async function initSharedPendingDb() {
        if (sharedPendingAvailable || sharedPendingInitializing) return;
        sharedPendingInitializing = true;
        const client = ensureSharedPendingClient();
        if (!client) {
          sharedPendingStatus = "local";
          sharedPendingInitializing = false;
          return;
        }

        const { data: sessionData } = await client.auth.getSession();
        if (!sessionData?.session) {
          sharedPendingStatus = "auth";
          sharedPendingInitializing = false;
          return;
        }

        const { data, error } = await client
          .from(SHARED_PENDING_TABLE)
          .select("app_id,tasks,completed_tasks,task_timer,presence,source_id,actor_name,state_version,updated_at")
          .eq("app_id", SHARED_PENDING_APP_ID)
          .maybeSingle();

        if (error) {
          sharedPendingStatus = error.code === "PGRST205" ? "missing" : "error";
          console.warn("BBDD compartida de pendientes no disponible:", error.message);
          sharedPendingInitializing = false;
          return;
        }

        sharedPendingAvailable = true;
        sharedPendingStatus = "shared";

        if (data) {
          applySharedPendingRow({ ...data, source_id: "shared-load" });
        } else {
          await saveSharedPendingState();
        }

        client
          .channel("lr-suite-pending-state")
          .on(
            "postgres_changes",
            {
              event: "*",
              filter: `app_id=eq.${SHARED_PENDING_APP_ID}`,
              schema: "public",
              table: SHARED_PENDING_TABLE
            },
            (payload) => applySharedPendingRow(payload.new)
          )
          .subscribe();
        sharedPendingInitializing = false;
      }

      function renderPresenceFromSync() {
        if (state.active !== "tasks" || !hasSuiteAccess()) return;
        updatePresenceCardsOnly();
        updateLiveTaskEditorsOnly();
      }

      function publishPresenceSync(entry) {
        const payload = {
          entry,
          sourceId: pendingSyncSourceId,
          updatedAt: Date.now()
        };
        presenceSyncChannel?.postMessage(payload);
        publishSharedPresence(entry);
        try {
          localStorage.setItem(PRESENCE_SYNC_EVENT_KEY, JSON.stringify(payload));
        } catch {
          // La presencia sigue usando el almacenamiento local como respaldo.
        }
      }

      function applyPresenceSyncPayload(payload) {
        if (!payload || payload.sourceId === pendingSyncSourceId || !payload.entry?.id) return;
        mergePendingPresence({ [payload.entry.id]: payload.entry });
        renderPresenceFromSync();
      }

      function publishAssignmentNotification(notice) {
        const payload = {
          notice,
          sourceId: pendingSyncSourceId,
          updatedAt: Date.now()
        };
        assignmentSyncChannel?.postMessage(payload);
        publishSharedAssignment(notice);
        try {
          localStorage.setItem(ASSIGNMENT_SYNC_EVENT_KEY, JSON.stringify(payload));
        } catch {
          // Las notificaciones usan storage como respaldo local.
        }
      }

      function applyAssignmentNotificationPayload(payload) {
        if (!payload || payload.sourceId === pendingSyncSourceId || !payload.notice?.id) return;
        receiveAssignmentNotification(payload.notice);
      }

      function pendingCollaboratorCards() {
        const presence = readPendingPresence();
        return ["Jorge Luis", "Diego"].map((name) => {
          const normalizedName = normalizeText(name).split(" ")[0];
          const activePresence = presence.find((entry) =>
            normalizeText(entry.name).includes(normalizedName)
          );
          return { name, activePresence };
        });
      }

      function presenceCardHtml({ name, activePresence }) {
        return `
          <article class="presence-card ${activePresence ? "online" : ""}" data-presence-name="${escapeHtml(name)}">
            <div class="presence-title">
              <span class="presence-dot" aria-hidden="true"></span>
              ${escapeHtml(name)}
            </div>
            <p class="presence-detail">
              ${
                activePresence?.editingTaskTitle
                  ? `${escapeHtml(activePresence.editingTaskAction || "Editando")}: ${escapeHtml(activePresence.editingTaskTitle)}`
                  : activePresence
                    ? "Conectado"
                    : "Sin conexión activa"
              }
            </p>
            <div class="presence-worked">
              <span>Hoy</span>
              <strong data-daily-minutes-user="${escapeHtml(name)}">${formatWorkedMinutes(dailyWorkedSecondsForUser(name))}</strong>
              <span>trabajados</span>
            </div>
          </article>
        `;
      }

      function pendingEditorsByTask() {
        const editors = new Map();
        readPendingPresence().forEach((entry) => {
          if (!entry?.editingTaskId || entry.id === pendingSessionId) return;
          const taskEditors = editors.get(entry.editingTaskId) || [];
          taskEditors.push(entry);
          editors.set(entry.editingTaskId, taskEditors);
        });
        return editors;
      }

      function taskLiveEditHtml(id, editorsByTask) {
        const editors = editorsByTask.get(id) || [];
        if (!editors.length) return "";
        const detail = editors
          .map((entry) => {
            const action = entry.editingTaskAction || "Editando";
            return `${entry.name || "Otro usuario"} ${action.toLowerCase()}`;
          })
          .join(", ");
        return `<span class="task-live-edit">${escapeHtml(detail)}</span>`;
      }

      function updateLiveTaskEditorsOnly() {
        const editorsByTask = pendingEditorsByTask();
        document.querySelectorAll("[data-live-edit-for]").forEach((element) => {
          const id = element.dataset.liveEditFor;
          element.innerHTML = taskLiveEditHtml(id, editorsByTask);
          element.closest(".task")?.classList.toggle("remote-editing", editorsByTask.has(id));
        });
      }

      function updateLiveActivityNotice() {
        const notice = document.getElementById("liveActivityNotice");
        if (!notice) return;
        notice.hidden = !liveActivityMessage;
        notice.textContent = liveActivityMessage;
      }

      function showLiveActivity(message) {
        liveActivityMessage = message;
        updateLiveActivityNotice();
        window.clearTimeout(liveActivityTimer);
        liveActivityTimer = window.setTimeout(() => {
          liveActivityMessage = "";
          updateLiveActivityNotice();
        }, 4500);
      }

      function readAssignmentNotifications() {
        const notices = readStoredJson(ASSIGNMENT_NOTICE_STORAGE_KEY, []);
        return Array.isArray(notices) ? notices : [];
      }

      function saveAssignmentNotifications(notices) {
        localStorage.setItem(
          ASSIGNMENT_NOTICE_STORAGE_KEY,
          JSON.stringify(notices.slice(0, 20))
        );
      }

      function visibleAssignmentNotifications() {
        return readAssignmentNotifications()
          .filter((notice) => !notice.dismissed)
          .slice(0, 3);
      }

      function assignmentNotificationsHtml() {
        return visibleAssignmentNotifications()
          .map(
            (notice) => `
              <article class="assignment-notice">
                <div>
                  <strong>${escapeHtml(notice.taskTitle || "Nuevo pendiente asignado")}</strong>
                  <p>${escapeHtml(notice.assignedBy || "Otro usuario")} te asignó esta tarea · ${notice.createdAt ? fmtDateTime(notice.createdAt) : "Ahora"}</p>
                </div>
                <button class="btn" type="button" data-dismiss-assignment-notice="${escapeHtml(notice.id)}">Entendido</button>
              </article>
            `
          )
          .join("");
      }

      function wireAssignmentNotificationButtons() {
        document.querySelectorAll("[data-dismiss-assignment-notice]").forEach((button) => {
          button.addEventListener("click", () => dismissAssignmentNotification(button.dataset.dismissAssignmentNotice));
        });
      }

      function updateAssignmentNotificationsOnly() {
        const container = document.getElementById("assignmentNotifications");
        if (!container) return false;
        const html = assignmentNotificationsHtml();
        container.hidden = !html;
        container.innerHTML = html;
        wireAssignmentNotificationButtons();
        return true;
      }

      function dismissAssignmentNotification(id) {
        const notices = readAssignmentNotifications().map((notice) =>
          notice.id === id ? { ...notice, dismissed: true } : notice
        );
        saveAssignmentNotifications(notices);
        updateAssignmentNotificationsOnly();
      }

      function receiveAssignmentNotification(notice) {
        if (!notice?.id || !isSameSuitePerson(notice.assignedTo, currentSuiteUserName())) return;
        const notices = readAssignmentNotifications();
        if (notices.some((entry) => entry.id === notice.id)) return;
        const nextNotice = {
          ...notice,
          dismissed: false,
          receivedAt: new Date().toISOString()
        };
        saveAssignmentNotifications([nextNotice, ...notices]);
        showLiveActivity(`${nextNotice.assignedBy || "Otro usuario"} te asignó: ${nextNotice.taskTitle}`);
        updateAssignmentNotificationsOnly();
      }

      function createAssignmentNotice(task, id, assignedTo) {
        return {
          assignedBy: currentSuiteUserName(),
          assignedTo,
          createdAt: new Date().toISOString(),
          id: `assignment-${Date.now().toString(36)}-${Math.random().toString(16).slice(2, 8)}`,
          taskId: id,
          taskTitle: task?.[0] || "Nuevo pendiente asignado"
        };
      }

      function notifyTaskAssignment(task, id, assignedTo) {
        if (!assignedTo || isSameSuitePerson(assignedTo, currentSuiteUserName())) return;
        const notice = createAssignmentNotice(task, id, assignedTo);
        publishAssignmentNotification(notice);
        showLiveActivity(`Asignaste "${notice.taskTitle}" a ${assignedTo}.`);
      }

      function updatePresenceCardsOnly() {
        const grid = document.querySelector(".presence-grid");
        if (!grid) return false;
        grid.innerHTML = pendingCollaboratorCards().map(presenceCardHtml).join("");
        return true;
      }

      function initTaskRealtimeSync() {
        if (taskSyncReady) return;
        taskSyncReady = true;

        if ("BroadcastChannel" in window) {
          taskSyncChannel = new BroadcastChannel(TASK_SYNC_CHANNEL);
          taskSyncChannel.addEventListener("message", (event) => {
            applyTaskSyncPayload(event.data);
          });
          presenceSyncChannel = new BroadcastChannel(PRESENCE_SYNC_CHANNEL);
          presenceSyncChannel.addEventListener("message", (event) => {
            applyPresenceSyncPayload(event.data);
          });
          assignmentSyncChannel = new BroadcastChannel(ASSIGNMENT_SYNC_CHANNEL);
          assignmentSyncChannel.addEventListener("message", (event) => {
            applyAssignmentNotificationPayload(event.data);
          });
        }

        window.addEventListener("storage", (event) => {
          if (event.key === TASK_SYNC_EVENT_KEY) {
            applyTaskSyncPayload(readStoredJson(TASK_SYNC_EVENT_KEY, null));
            return;
          }
          if ([TASKS_STORAGE_KEY, COMPLETED_STORAGE_KEY, TIMER_STORAGE_KEY].includes(event.key)) {
            refreshTaskStateFromStorage();
            return;
          }
          if (event.key === PRESENCE_SYNC_EVENT_KEY) {
            applyPresenceSyncPayload(readStoredJson(PRESENCE_SYNC_EVENT_KEY, null));
            return;
          }
          if (event.key === ASSIGNMENT_SYNC_EVENT_KEY) {
            applyAssignmentNotificationPayload(readStoredJson(ASSIGNMENT_SYNC_EVENT_KEY, null));
            return;
          }
          if (event.key === PRESENCE_STORAGE_KEY) {
            renderPresenceFromSync();
          }
        });
      }

      function migrateCompletedFromTasks() {
        const active = [];
        tasks.forEach((task, index) => {
          const id = taskId(task, index);
          if (task[3] === "Completado") {
            if (!completedTasks.some((completed) => completed.id === id)) {
              completedTasks.push({
                id,
                title: task[0],
                owner: task[1],
                createdAt: taskCreatedAt(task),
                startDate: task[5],
                dueDate: task[2],
                priority: task[4] || "Media",
                completedAt: new Date().toISOString(),
                completedBy: currentSuiteUserName(),
                action: "completada",
                totalSeconds: elapsedSecondsForTask(id)
              });
            }
          } else {
            active.push(task);
          }
        });
        tasks = active;
      }

      function loadTaskState() {
        const savedTasks = readStoredJson(TASKS_STORAGE_KEY, null);
        const savedCompleted = readStoredJson(COMPLETED_STORAGE_KEY, null);
        const savedTimer = readStoredJson(TIMER_STORAGE_KEY, null);
        pendingStateVersion = Number(localStorage.getItem(TASK_STATE_VERSION_STORAGE_KEY) || 0) || 0;

        if (Array.isArray(savedTasks)) tasks = savedTasks;
        if (Array.isArray(savedCompleted)) completedTasks = savedCompleted;
        if (savedTimer && typeof savedTimer === "object") {
          applyTaskTimerSnapshot(savedTimer);
        }

        ensureTaskIds();
        migrateCompletedFromTasks();
        initTaskRealtimeSync();
        initSharedPendingLive();
        initSharedPendingDb();
        saveTaskState({ broadcast: false, shared: false, version: false });
        saveTimerState({ broadcast: false, shared: false, version: false });
        if (hasActiveTaskTimers()) ensureTaskTimerInterval();
        writePendingPresence();
        window.setInterval(() => {
          writePendingPresence(
            editingState.taskId
              ? {
                  id: editingState.taskId,
                  title: editingState.taskTitle,
                  action: editingState.taskAction
                }
              : null
          );
        }, 10000);
        window.setInterval(renderPresenceFromSync, 5000);
      }

      function elapsedSecondsForTask(id) {
        const saved = taskTimer.elapsedById[id] || 0;
        const entry = activeTimerEntry(id);
        if (entry?.startedAt) {
          return saved + Math.floor((Date.now() - entry.startedAt) / 1000);
        }
        return saved;
      }

      function formatTimer(seconds) {
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        return [hrs, mins, secs].map((value) => String(value).padStart(2, "0")).join(":");
      }

      function ensureTaskTimerInterval() {
        if (taskTimerInterval) return;
        taskTimerInterval = window.setInterval(() => {
          updateTaskTimerDom();
          if (hasActiveTaskTimers()) publishSharedTimerState();
        }, 1000);
      }

      function stopTaskTimerIntervalIfIdle() {
        if (hasActiveTaskTimers() || !taskTimerInterval) return;
        window.clearInterval(taskTimerInterval);
        taskTimerInterval = null;
      }

      function updateTaskTimerDom() {
        document.querySelectorAll("[data-timer-value]").forEach((element) => {
          const id = element.dataset.timerValue;
          element.textContent = formatTimer(elapsedSecondsForTask(id));
        });
        document.querySelectorAll("[data-daily-minutes-user]").forEach((element) => {
          element.textContent = formatWorkedMinutes(dailyWorkedSecondsForUser(element.dataset.dailyMinutesUser));
        });
        document.querySelectorAll("[data-timer-toggle]").forEach((button) => {
          const id = button.dataset.timerToggle;
          const hasTime = elapsedSecondsForTask(id) > 0;
          const isActive = Boolean(activeTimerEntry(id));
          const isOwned = isActive && currentUserOwnsActiveTimer(id);
          button.textContent = isOwned ? "Finalizar Timer" : hasTime ? "Reanudar Timer" : "Iniciar Timer";
          button.classList.toggle("timer-active", isOwned);
        });
        document.querySelectorAll("[data-timer-box]").forEach((element) => {
          const id = element.dataset.timerBox;
          element.classList.toggle("active", Boolean(activeTimerEntry(id)));
        });
      }

      function finalizeTaskTimer(id) {
        const entry = activeTimerEntry(id);
        if (!entry?.startedAt) return;
        if (!currentUserOwnsActiveTimer(id)) return;
        addTimerDailySeconds(id, entry);
        taskTimer.elapsedById[id] = elapsedSecondsForTask(id);
        const key = taskTimerKeyForId(id, entry);
        delete taskTimer.activeById[id];
        if (key) delete taskTimer.activeByKey[key];
        if (taskTimer.activeTaskId === id) {
          taskTimer.activeTaskId = null;
          taskTimer.activeUserKey = null;
          taskTimer.activeUserName = null;
          taskTimer.startedAt = null;
        }
        syncLegacyActiveTimerFields();
        saveTimerState();
        publishSharedTimerState();
        stopTaskTimerIntervalIfIdle();
      }

      function finalizeActiveTaskTimer() {
        const activeId = currentUserActiveTaskId() || taskTimer.activeTaskId;
        if (activeId) finalizeTaskTimer(activeId);
      }

      function toggleTaskTimer(id) {
        const existingEntry = activeTimerEntry(id);
        if (existingEntry && !currentUserOwnsActiveTimer(id)) {
          window.alert(`${activeTimerWorkerName(id)} esta trabajando esta tarea. Espera a que finalice su timer.`);
          return;
        }
        if (existingEntry) {
          finalizeTaskTimer(id);
        } else {
          clearCurrentUserActiveTimers();
          syncLegacyActiveTimerFields();
          taskTimer.activeTaskId = id;
          taskTimer.activeUserKey = currentSuiteUserKey();
          taskTimer.activeUserName = currentSuiteUserName();
          taskTimer.startedAt = Date.now();
          const taskIndex = tasks.findIndex((task, index) => taskId(task, index) === id);
          taskTimer.activeById[id] = {
            taskCreatedAt: tasks[taskIndex] ? taskCreatedAt(tasks[taskIndex]) : "",
            taskOwner: tasks[taskIndex]?.[1] || "",
            taskTitle: tasks[taskIndex]?.[0] || "",
            userKey: taskTimer.activeUserKey,
            userName: taskTimer.activeUserName,
            startedAt: taskTimer.startedAt
          };
          const timerKey = taskTimerKeyForId(id, taskTimer.activeById[id]);
          if (timerKey) taskTimer.activeByKey[timerKey] = taskTimer.activeById[id];
          if (tasks[taskIndex]) tasks[taskIndex][3] = "En proceso";
          saveTaskState();
          saveTimerState();
          ensureTaskTimerInterval();
          publishSharedTimerState();
        }
        updateTaskTimerDom();
      }

      function selectEditableText(element) {
        const range = document.createRange();
        range.selectNodeContents(element);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function beginInlineTaskEdit(element) {
        const index = Number(element.dataset.index);
        const task = tasks[index];
        if (task && !canCurrentUserControlTask(taskId(task, index))) return;
        element.dataset.original = element.textContent.trim();
        element.dataset.cancelEdit = "false";
        element.contentEditable = "true";
        if (task) {
          setEditingPresence({
            id: taskId(task, index),
            title: task[0]
          });
        }
        element.focus();
        selectEditableText(element);
      }

      function openTaskBadgeSelect(element) {
        const index = Number(element.dataset.index);
        const field = Number(element.dataset.field);
        const task = tasks[index];
        if (!task) return;
        if (!canCurrentUserControlTask(taskId(task, index))) return;

        const options = String(element.dataset.options || "")
          .split("|")
          .filter(Boolean)
          .map((option) => decodeURIComponent(option));
        const select = document.createElement("select");
        select.className = "badge-select";
        select.dataset.index = String(index);
        select.dataset.field = String(field);
        options.forEach((option) => {
          const item = document.createElement("option");
          item.value = option;
          item.textContent = option;
          select.appendChild(item);
        });
        select.value = task[field] || element.textContent.trim();
        setEditingPresence({ id: taskId(task, index), title: task[0] });

        const closeWithoutChange = () => {
          setEditingPresence(null);
          tasksModule();
        };

        select.addEventListener("change", () => {
          if (!tasks[index]) return;
          tasks[index][field] = select.value;
          setEditingPresence(null);
          saveTaskState();
          tasksModule();
        });
        select.addEventListener("blur", closeWithoutChange);
        select.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            event.preventDefault();
            closeWithoutChange();
          }
          if (event.key === "Enter") {
            event.preventDefault();
            select.dispatchEvent(new Event("change"));
          }
        });

        element.replaceWith(select);
        select.focus();
      }

      function finishInlineTaskEdit(element) {
        if (element.contentEditable !== "true") return;
        const index = Number(element.dataset.index);
        const field = Number(element.dataset.field);
        const task = tasks[index];
        if (task && !canCurrentUserControlTask(taskId(task, index))) {
          element.contentEditable = "false";
          setEditingPresence(null);
          tasksModule();
          return;
        }
        const fallback = element.dataset.original || "";
        const previousValue = tasks[index]?.[field] || "";
        const canceled = element.dataset.cancelEdit === "true";
        const nextValue =
          canceled ? fallback : element.textContent.trim();

        if (tasks[index] && nextValue) {
          tasks[index][field] = nextValue;
        }

        element.contentEditable = "false";
        delete element.dataset.original;
        delete element.dataset.cancelEdit;
        setEditingPresence(null);
        saveTaskState();
        if (
          tasks[index] &&
          field === 1 &&
          nextValue &&
          !canceled &&
          !isSameSuitePerson(previousValue, nextValue)
        ) {
          notifyTaskAssignment(tasks[index], taskId(tasks[index], index), nextValue);
        }
        tasksModule();
      }

      function moveTaskToCompleted(id, action = "completada") {
        if (!canCurrentUserControlTask(id)) return;
        const index = tasks.findIndex((task, taskIndex) => taskId(task, taskIndex) === id);
        if (index < 0) return;
        const task = tasks[index];
        const entry = activeTimerEntry(id);
        const workedByName = entry ? activeTimerWorkerName(id) : currentSuiteUserName();
        const workedByKey = suitePersonKey(entry?.userKey || entry?.userName || workedByName);
        const totalSeconds = elapsedSecondsForTask(id);
        if (entry) finalizeTaskTimer(id);
        const dailySecondsByUser = taskTimer.dailyById?.[id] || {};
        completedTasks.unshift({
          completedRecordId: generatedTaskId("completed"),
          id,
          title: task[0],
          owner: task[1],
          createdAt: taskCreatedAt(task),
          startDate: task[5],
          dueDate: task[2],
          priority: task[4] || "Media",
          completedAt: new Date().toISOString(),
          completedBy: currentSuiteUserName(),
          dailySecondsByUser,
          action,
          totalSeconds,
          workedByKey,
          workedByName
        });
        delete taskTimer.elapsedById[id];
        delete taskTimer.dailyById?.[id];
        tasks.splice(index, 1);
        saveTimerState();
        saveTaskState();
        tasksModule();
      }

      function restoreCompletedTask(key) {
        const index = completedTasks.findIndex((task, taskIndex) => completedTaskKey(task, taskIndex) === key);
        if (index < 0) return;

        const task = completedTasks[index];
        const nextId = generatedTaskId();
        tasks.unshift([
          task.title,
          task.owner || currentSuiteUserName(),
          task.dueDate || "",
          "Pendiente",
          task.priority || "Media",
          task.startDate || "",
          nextId,
          task.createdAt || new Date().toISOString()
        ]);

        if (task.totalSeconds) {
          taskTimer.elapsedById[nextId] = task.totalSeconds;
        }
        if (task.dailySecondsByUser) {
          taskTimer.dailyById = taskTimer.dailyById && typeof taskTimer.dailyById === "object" ? taskTimer.dailyById : {};
          taskTimer.dailyById[nextId] = task.dailySecondsByUser;
        }
        completedTasks.splice(index, 1);
        saveTimerState({ broadcast: false, shared: false });
        saveTaskState();
        tasksModule();
      }

      function completeTask(id) {
        moveTaskToCompleted(id, "completada");
      }

      function deleteTask(id) {
        if (!window.confirm("¿Mover este pendiente al historial como eliminado?")) return;
        moveTaskToCompleted(id, "eliminada");
      }

      function taskDropDirection(target, event) {
        const rect = target.getBoundingClientRect();
        return event.clientY > rect.top + rect.height / 2 ? "after" : "before";
      }

      function clearTaskDropGuides() {
        document.querySelectorAll(".task.drop-before, .task.drop-after").forEach((element) => {
          element.classList.remove("drop-before", "drop-after");
        });
      }

      function clearTaskDropTargets() {
        document.querySelectorAll(".task.dragging").forEach((element) => {
          element.classList.remove("dragging");
        });
        clearTaskDropGuides();
      }

      function reorderTaskByDrop(sourceId, targetId, direction = "before") {
        if (!sourceId || !targetId || sourceId === targetId) {
          clearTaskDropTargets();
          draggedTaskId = null;
          return;
        }

        const previousOrder = tasks.map((task, index) => taskId(task, index)).join("|");
        const sourceIndex = tasks.findIndex((task, index) => taskId(task, index) === sourceId);
        if (sourceIndex < 0) {
          clearTaskDropTargets();
          draggedTaskId = null;
          return;
        }

        const [movedTask] = tasks.splice(sourceIndex, 1);
        const targetIndex = tasks.findIndex((task, index) => taskId(task, index) === targetId);
        if (targetIndex < 0) {
          tasks.splice(sourceIndex, 0, movedTask);
          clearTaskDropTargets();
          draggedTaskId = null;
          return;
        }

        tasks.splice(direction === "after" ? targetIndex + 1 : targetIndex, 0, movedTask);
        draggedTaskId = null;
        const nextOrder = tasks.map((task, index) => taskId(task, index)).join("|");
        if (nextOrder === previousOrder) {
          clearTaskDropTargets();
          return;
        }
        saveTaskState();
        tasksModule();
      }

      function beginTaskPointerDrag(handle, startEvent) {
        if (startEvent.button !== undefined && startEvent.button !== 0) return;
        const item = handle.closest("[data-task-draggable]");
        if (!item) return;
        if (!canCurrentUserControlTask(item.dataset.taskId)) return;

        draggedTaskId = handle.dataset.taskDragHandle;
        const draggedTaskIndex = tasks.findIndex((task, index) => taskId(task, index) === draggedTaskId);
        if (tasks[draggedTaskIndex]) {
          setEditingPresence({
            action: "Moviendo",
            id: draggedTaskId,
            title: tasks[draggedTaskIndex][0]
          });
        }
        item.classList.add("dragging");
        startEvent.preventDefault();

        const pointFromEvent = (event) => event.touches?.[0] || event.changedTouches?.[0] || event;
        const targetFromPoint = (event) => {
          const point = pointFromEvent(event);
          return document.elementFromPoint(point.clientX, point.clientY)?.closest("[data-task-draggable]");
        };

        const move = (event) => {
          const target = targetFromPoint(event);
          clearTaskDropGuides();
          if (!target || target.dataset.taskId === draggedTaskId) return;
          const direction = taskDropDirection(target, pointFromEvent(event));
          target.classList.toggle("drop-before", direction === "before");
          target.classList.toggle("drop-after", direction === "after");
        };

        const stop = (event) => {
          const target = targetFromPoint(event);
          const direction = target ? taskDropDirection(target, pointFromEvent(event)) : "before";
          const sourceId = draggedTaskId;
          document.removeEventListener("pointermove", move);
          document.removeEventListener("pointerup", stop);
          document.removeEventListener("pointercancel", cancel);
          setEditingPresence(null);
          if (target && target.dataset.taskId !== sourceId) {
            reorderTaskByDrop(sourceId, target.dataset.taskId, direction);
            return;
          }
          draggedTaskId = null;
          clearTaskDropTargets();
        };

        const cancel = () => {
          document.removeEventListener("pointermove", move);
          document.removeEventListener("pointerup", stop);
          document.removeEventListener("pointercancel", cancel);
          setEditingPresence(null);
          draggedTaskId = null;
          clearTaskDropTargets();
        };

        document.addEventListener("pointermove", move);
        document.addEventListener("pointerup", stop);
        document.addEventListener("pointercancel", cancel);
      }

          id,
          new Date().toISOString()
        ];

        saveTaskState();
        notifyTaskAssignment(nextTask, id, owner);
        return true;
      }

      function downloadCompletedTasksTable() {
        if (!completedTasks.length) {
          window.alert("Aún no hay tareas completadas para descargar.");
          return;
        }

        const headers = [
          "Pendiente",
          "Responsable",
          "Fecha de creación",
          "Fecha de finalización",
          "Usuario",
          "Acción",
          "Tiempo dedicado",
          "Fecha de inicio",
          "Fecha fin",
          "Prioridad"
        ];
        const rows = completedTasks.map((task) => [
          task.title,
          task.owner || "Sin asignar",
          task.createdAt ? fmtDateTime(task.createdAt) : "Sin fecha",
          task.completedAt ? fmtDateTime(task.completedAt) : "Sin fecha",
          task.completedBy || "Usuario local",
          task.action === "eliminada" ? "Borrado" : "Completado",
          formatTimer(task.totalSeconds || 0),
          task.startDate || "",
          task.dueDate || "",
          task.priority || ""
        ]);
        const csv = [headers, ...rows].map((row) => row.map(csvCell).join(";")).join("\r\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "tareas-completadas-" + new Date().toISOString().slice(0, 10) + ".csv";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function wireTaskInteractions() {

          handle.addEventListener("pointerdown", (event) => beginTaskPointerDrag(handle, event));
        });

              event.preventDefault();
              openTaskBadgeSelect(element);
            }
          });
        });

          element.addEventListener("dblclick", () => beginInlineTaskEdit(element));
          element.addEventListener("blur", () => finishInlineTaskEdit(element));

            if (event.key === "Enter") {
              event.preventDefault();
              element.blur();

            if (event.key === "Escape") {

      function tasksModule() {
        pruneActiveTimersByUser();
        syncLegacyActiveTimerFields();
        const statuses = ["Todos", "Pendiente", "En proceso", "Bloqueado"];
        const priorities = ["Todas", "Alta", "Media", "Baja"];
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const isOverdue = (task) => {
          if (!task[2]) return false;
          return task[3] !== "Completado" && new Date(`${task[2]}T00:00:00`) < today;
        };
        writePendingPresence(
          editingState.taskId
            ? {
                id: editingState.taskId,
                title: editingState.taskTitle,
                action: editingState.taskAction
              }
            : null
        );
        const collaboratorCards = pendingCollaboratorCards();
        const editorsByTask = pendingEditorsByTask();
        const owners = [
          ...new Set(
            [...suiteUsers]
              .sort((left, right) => (left.order || 99) - (right.order || 99) || (left.name || left.key).localeCompare(right.name || right.key, "es"))
              .map((user) => suitePendingOwnerName(user))
              .filter(Boolean)
          )
        ];
        if (state.taskOwner !== "Todos" && !owners.includes(state.taskOwner)) {
          state.taskOwner = "Todos";
        }
        const visible = tasks.filter((task) => {
          const statusMatch = state.taskStatus === "Todos" || task[3] === state.taskStatus;
          const priorityMatch = state.taskPriority === "Todas" || task[4] === state.taskPriority;
          const ownerMatch = state.taskOwner === "Todos" || task[1] === state.taskOwner;
          return statusMatch && priorityMatch && ownerMatch;
        });
        const taskGroups = [
          ...owners.map((owner) => ({
            owner,
            tasks: visible.filter((task) => task[1] === owner)
          })),
          ...[...new Set(visible.map((task) => task[1]).filter((owner) => owner && !owners.includes(owner)))]
            .sort((left, right) => left.localeCompare(right, "es"))
            .map((owner) => ({
              owner,
              tasks: visible.filter((task) => task[1] === owner)
            }))
        ].filter((group) => group.tasks.length);
        const completedByOwner = completedTasks.filter((task) => {
          return state.taskOwner === "Todos" || task.owner === state.taskOwner;
        });
        const completedVisible = completedByOwner.filter((task) => {
          if (state.completedHistoryView === "eliminadas") return task.action === "eliminada";
          if (state.completedHistoryView === "todas") return true;
          return task.action !== "eliminada";
        });
        const completedHistoryOptions = [
          ["completadas", "Completadas", completedByOwner.filter((task) => task.action !== "eliminada").length],
          ["eliminadas", "Eliminadas", completedByOwner.filter((task) => task.action === "eliminada").length],
          ["todas", "Todas", completedByOwner.length]
        ];
        const completedHistoryTitle =
          state.completedHistoryView === "eliminadas"
            ? "Tareas eliminadas"
            : state.completedHistoryView === "todas"
              ? "Historial de tareas"
              : "Tareas completadas";
        const completedEmptyMessage =
          state.completedHistoryView === "eliminadas"
            ? "Aún no hay tareas eliminadas para este filtro."
            : "Aún no hay tareas completadas para este filtro.";
        const assignmentNoticeHtml = assignmentNotificationsHtml();

        shell(`
          <section class="module">
            ${header(
              "Panel de Pendientes",
              "Seguimiento colaborativo editable por responsable, fecha de inicio, fecha fin y tiempo dedicado.",
              "Operaciones"
            )}
            <div class="presence-grid">
              ${collaboratorCards.map(presenceCardHtml).join("")}
            </div>
            <div class="live-activity" id="liveActivityNotice" ${liveActivityMessage ? "" : "hidden"}>${escapeHtml(liveActivityMessage)}</div>
            <div class="assignment-notices" id="assignmentNotifications" ${assignmentNoticeHtml ? "" : "hidden"}>${assignmentNoticeHtml}</div>
            <div class="metrics">
              ${metric("Pendientes abiertos", visible.length, "Tareas visibles todavía activas")}
              ${metric("Vencidos", tasks.filter(isOverdue).length, "Pendientes con fecha límite pasada")}
              ${metric("Completados", completedByOwner.filter((task) => task.action !== "eliminada").length, "Historial filtrado de tareas cerradas")}
              ${metric("Bloqueados", tasks.filter((task) => task[3] === "Bloqueado").length, "Requieren destrabe operativo")}
            </div>
            <div class="panel task-create-panel">
              <form class="task-form" id="newTaskForm">
                <label class="form-field task-title-field"><span>Pendiente</span><input name="title" placeholder="Nueva tarea pendiente" autocomplete="off" /></label>
                <label class="form-field"><span>Responsable</span><select name="owner">${owners.map((owner) => `<option value="${escapeHtml(owner)}" ${owner === currentSuiteUserName() ? "selected" : ""}>${escapeHtml(owner)}</option>`).join("")}</select></label>
                <label class="form-field"><span>Inicio</span><input name="startDate" type="date" /></label>
                <label class="form-field"><span>Fin</span><input name="dueDate" type="date" /></label>
                <label class="form-field"><span>Prioridad</span><select name="priority">${["Alta", "Media", "Baja"].map((priority) => `<option ${priority === "Media" ? "selected" : ""}>${priority}</option>`).join("")}</select></label>
                <button class="btn primary" type="submit">Agregar</button>
              </form>
            </div>
            <div class="panel">
              <div class="toolbar">
                <div>
                  <strong>Tablero de pendientes</strong>
                  <p class="small">${visible.length} tareas visibles</p>
                </div>
                <div class="filters">
                  <label class="control">Responsable <select id="taskOwner">${["Todos", ...owners].map((owner) => `<option ${owner === state.taskOwner ? "selected" : ""}>${owner}</option>`).join("")}</select></label>
                  <label class="control">Estado <select id="taskStatus">${statuses.map((status) => `<option ${status === state.taskStatus ? "selected" : ""}>${status}</option>`).join("")}</select></label>
                  <label class="control">Prioridad <select id="taskPriority">${priorities.map((priority) => `<option ${priority === state.taskPriority ? "selected" : ""}>${priority}</option>`).join("")}</select></label>
                </div>
              </div>
              <div class="tasks">
                ${
                  taskGroups.length
                    ? taskGroups
                        .map(
                          (group) => `
                            <div class="task-owner-group">
                              <h3 class="task-owner-heading">Pendientes de ${escapeHtml(group.owner)}</h3>
                              ${group.tasks
                                .map((task) => {
                                  const taskIndex = tasks.indexOf(task);
                                  const id = taskId(task, taskIndex);
                                  const timerActive = Boolean(activeTimerEntry(id));
                                  const timerOwnedByCurrentUser = timerActive && currentUserOwnsActiveTimer(id);
                                  const timerHighlighted = timerActive;
                                  const lockedByOther = isTaskLockedByOtherUser(id);
                                  const activeProcessBadge = timerOwnedByCurrentUser && normalizeText(task[3]) === "en proceso" ? "process-active" : "";
                                  const timerWorkerName = activeTimerWorkerName(id);
                                  const hasRemoteEditor = editorsByTask.has(id);

                                  return `
                            <article class="task ${hasRemoteEditor ? "remote-editing" : ""} ${timerOwnedByCurrentUser ? "timer-owned" : ""} ${lockedByOther ? "locked-by-other" : ""}" data-task-id="${id}" data-task-draggable>
                              <button class="drag-handle" type="button" data-task-drag-handle="${id}" aria-label="Mover tarea" title="Arrastrar para ordenar" ${lockedByOther ? "disabled" : ""}>${icons.grip}</button>
                              <div class="task-main">
                                <div class="task-title-row">
                                  <h2 class="editable-field" ${lockedByOther ? "" : `data-editable-task data-index="${taskIndex}" data-field="0" title="Doble clic para editar"`}>${escapeHtml(task[0])}</h2>
                                  <span class="task-live-slot" data-live-edit-for="${id}">${taskLiveEditHtml(id, editorsByTask)}</span>
                                </div>
                                <div class="task-meta">
                                  ${editableTaskBadgeHtml(taskIndex, 3, task[3], statuses.filter((status) => status !== "Todos"), lockedByOther, activeProcessBadge)}
                                  ${editableTaskBadgeHtml(taskIndex, 4, task[4], priorities.filter((priority) => priority !== "Todas"), lockedByOther)}
                                  ${isOverdue(task) ? badge("Vencido") : ""}
                                  <span class="muted editable-field" ${lockedByOther ? "" : `data-editable-task data-index="${taskIndex}" data-field="1" title="Doble clic para editar"`}>${escapeHtml(task[1])}</span>
                                  <label class="task-date">Inicio <input class="date-field" type="date" data-task-date data-index="${taskIndex}" data-field="5" value="${task[5] || ""}" ${lockedByOther ? "disabled" : ""} /></label>
                                  <label class="task-date">Fin <input class="date-field" type="date" data-task-date data-index="${taskIndex}" data-field="2" value="${task[2] || ""}" ${lockedByOther ? "disabled" : ""} /></label>
                                </div>
                              </div>
                              <div class="task-actions">
                                <span class="timer-box ${timerHighlighted ? "active" : ""}" data-timer-box="${id}">
                                  <span class="timer-value" data-timer-value="${id}">${formatTimer(elapsedSecondsForTask(id))}</span>
                                  <button class="btn ${timerOwnedByCurrentUser ? "timer-active" : ""}" data-timer-toggle="${id}" ${lockedByOther ? "disabled" : ""}>${timerOwnedByCurrentUser ? "Finalizar Timer" : elapsedSecondsForTask(id) ? "Reanudar Timer" : "Iniciar Timer"}</button>
                                </span>
                                <button class="btn complete" data-task-id="${id}" ${lockedByOther ? "disabled" : ""}>Terminar</button>
                                <button class="btn" data-delete-task="${id}" ${lockedByOther ? "disabled" : ""}>Borrar</button>
                              </div>
                              ${
                                lockedByOther
                                  ? `<div class="task-lock-overlay">
                                      <div class="task-lock-message">
                                        <div class="task-lock-title">${escapeHtml(timerWorkerName)} esta trabajando esta tarea</div>
                                        <div class="task-lock-detail">La tarea esta bloqueada hasta que finalice el timer.</div>
                                      </div>
                                      <div class="task-lock-timer">
                                        <strong data-timer-value="${id}">${formatTimer(elapsedSecondsForTask(id))}</strong>
                                        <span>${escapeHtml(timerWorkerName)}</span>
                                      </div>
                                    </div>`
                                  : ""
                              }
                            </article>
                          `;
                                })
                                .join("")}
                            </div>
                          `
                        )
                        .join("")
                    : '<div class="empty">Sin pendientes visibles.</div>'
                }
              </div>
            </div>
            <div class="panel">
              <div class="panel-head completed-head">
                <div>
                  <strong>${completedHistoryTitle}</strong>
                  <p class="small">${completedVisible.length} tareas visibles${state.taskOwner !== "Todos" ? ` de ${state.taskOwner}` : ""} · ${completedTasks.length} en historial total</p>
                </div>
                <div class="history-actions">
                  <div class="history-tabs" role="tablist" aria-label="Filtro de historial de pendientes">
                    ${completedHistoryOptions.map(([id, label, count]) => `<button class="btn history-tab ${state.completedHistoryView === id ? "active" : ""}" type="button" data-completed-history-view="${id}">${label} (${count})</button>`).join("")}
                  </div>
                  <button class="btn primary" id="downloadCompletedTasks" type="button" ${completedTasks.length ? "" : "disabled"}>Descargar tabla</button>
                </div>
              </div>
              <div class="completed-list">
                ${
                  completedVisible.length
                    ? completedVisible
                        .map(
                          (task) => {
                            const completedIndex = completedTasks.indexOf(task);
                            const key = completedTaskKey(task, completedIndex);

                            return `
                              <article class="completed-task">
                                <div>
                                  <strong>${escapeHtml(task.title)}</strong>
                                  <p class="small">${escapeHtml(task.owner || "Sin asignar")} · ${task.action === "eliminada" ? "Eliminada" : "Completada"} por ${escapeHtml(task.completedBy || "Usuario local")}</p>
                                </div>
                                <span class="completed-meta">Creación: ${task.createdAt ? fmtDateTime(task.createdAt) : "Sin fecha"}</span>
                                <span class="completed-meta">Finalización: ${fmtDateTime(task.completedAt)}</span>
                                <span class="completed-meta">Acción: ${task.action === "eliminada" ? "Borrado" : "Completado"} · Tiempo: ${formatTimer(task.totalSeconds || 0)}</span>
                                <button class="btn" type="button" data-restore-completed-task="${escapeHtml(key)}">Regresar</button>
                              </article>
                            `;
                          }
                        )
                        .join("")
                    : `<div class="empty">${completedEmptyMessage}</div>`
                }
              </div>
            </div>
          </section>
        `);

        document.getElementById("newTaskForm").addEventListener("submit", (event) => {
          event.preventDefault();
          if (addPendingTask(event.currentTarget)) {
            state.taskOwner = "Todos";
            state.taskStatus = "Todos";
            state.taskPriority = "Todas";
            tasksModule();
          }
        });
        wireNewTaskDateSync();

        document.getElementById("downloadCompletedTasks").addEventListener("click", downloadCompletedTasksTable);
        wireAssignmentNotificationButtons();
        document.querySelectorAll("[data-completed-history-view]").forEach((button) => {
          button.addEventListener("click", () => {
            state.completedHistoryView = button.dataset.completedHistoryView;
            tasksModule();
          });
        });

        document.querySelectorAll("[data-restore-completed-task]").forEach((button) => {
          button.addEventListener("click", () => restoreCompletedTask(button.dataset.restoreCompletedTask));
        });

        document.getElementById("taskOwner").addEventListener("change", (event) => {
          state.taskOwner = event.target.value;
          tasksModule();
        });
        document.getElementById("taskStatus").addEventListener("change", (event) => {
          state.taskStatus = event.target.value;
          tasksModule();
        });
        document.getElementById("taskPriority").addEventListener("change", (event) => {
          state.taskPriority = event.target.value;
          tasksModule();
        });
        wireTaskInteractions();
      }

        shell(`
          <section class="module">
            ${header(
              "Usuarios y Claves",
              "Gestión de claves de ingreso y restablecimiento de contraseñas de LR Suite.",
              "Seguridad",
              icons.lock,
              `<span aria-hidden="true"></span>`
            )}

            <div class="metrics">

              ${metric("Sesión actual", currentSession ? "Activa" : "Pendiente", currentSession || "Sin usuario activo")}

                  )

            </div>

            document.getElementById("suiteUserKey").value,

            document.getElementById("suiteUserConfirm").value
          );
          accessModule();
        });

      function metricoolModule() {
        const metricoolSnapshot = readMetricoolSnapshot();
        const activeMetricool = metricoolSnapshot?.report || metricool;
        const maxViews = Math.max(1, ...activeMetricool.topPosts.map((post) => post[3]));
        const period = `${fmtDate(activeMetricool.meta.from)} - ${fmtDate(activeMetricool.meta.to)}`;
        const uploadNotice = metricoolUploadNotice
          ? `

              <div class="toolbar">

                  <strong>${metricoolUploadNotice.title}</strong>

                  </div>
                </div>
              </article>
            `
          )
          .join("");

        shell(`
          <section class="module">
            ${header(

              icons.megaphone,
              `<div class="metricool-actions">

                ${metricoolSnapshot ? `<button class="btn" id="metricoolResetButton" type="button">${icons.trash} Restaurar base</button>` : ""}

                <button class="btn primary" id="metricoolUploadPanelButton" type="button">${icons.upload} Cargar documento</button>

              <div class="compare-left">
                <span class="compare-icon">${icons.trend}</span>

              <div class="compare-grid">
                <span>Canal fuerte<strong class="up">TikTok</strong></span>
                <span>Mayor alerta<strong class="negative">Instagram</strong></span>
                <span>Top alcance<strong>${fmtNumber(559)} vistas</strong></span>
                <span>Contenido core<strong>Ads + Shopify</strong></span>
              </div>
            </div>

            <div class="metrics">
              ${activeMetricool.summary
                .map((item) => metric(item[0], fmtNumber(item[1]), item[2], item[3]))
                .join("")}
            </div>

            <div class="panel">
              <div class="panel-head">
                <strong>Comparativo por canal</strong>
                <p class="small">Instagram y TikTok del periodo Metricool</p>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Canal</th>
                      <th class="right">Seguidores</th>
                      <th>Alcance</th>
                      <th class="right">Publicaciones</th>
                      <th class="right">Interacciones</th>

                    ${activeMetricool.channels
                      .map(

                          <tr>
                            <td>
                              <strong>${channel.name}</strong>

                  <p class="small">Ángulos priorizados para la siguiente semana</p>

                  ${activeMetricool.recommendations

                      (item) => `
                        <article class="recommendation">

                            ${badge(item[0])}
                            ${badge(item[3])}
                            <span class="muted">${item[1]}</span>

                          <strong>${item[2]}</strong>

                    )
                    .join("")}

              </div>

          const file = event.target.files?.[0];
          event.target.value = "";
          if (file) handleMetricoolPdfUpload(file);
        });
        document.getElementById("metricoolResetButton")?.addEventListener("click", () => {
          clearMetricoolReport();
          metricoolUploadNotice = {
            detail: "Se volvió a la base integrada del módulo Metricool.",
            status: "Cargado",
            title: "Reporte base restaurado"
          };
          metricoolModule();
        });
      }

      function render() {
        if (!suiteUsers.length) {
          renderSuiteSetup();
          return;
        }

        if (!hasSuiteAccess()) {
          renderSuiteLock();
          return;
        }

        if (state.active === "quotes") quotesModule();
        else if (state.active === "tasks") tasksModule();
        else if (state.active === "metricool") metricoolModule();
        else if (state.active === "access") accessModule();
        else financialModule();
      }

      loadSuiteUsers();
      loadTaskState();
      render();
    </script>
  </body>
</html>
