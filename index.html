      function taskId(task, index) {
        if (!task[6]) task[6] = `task-${String(index + 1).padStart(3, "0")}`;
        return task[6];
      }

      function taskCreatedAt(task) {
        if (!task[7]) task[7] = new Date().toISOString();
        return task[7];
      }

      function generatedTaskId(prefix = "task") {
        return prefix + "-" + Date.now().toString(36) + "-" + Math.random().toString(16).slice(2, 8);
      }

      function completedTaskKey(task, index) {
        if (!task.completedRecordId) {
          task.completedRecordId = `completed-${task.id || "task"}-${task.completedAt || "sin-fecha"}-${index}`;
        }
        return task.completedRecordId;
      }

      function completedTaskIdentity(task) {
        return (
          task?.completedRecordId ||
          [
            task?.id || "task",
            task?.completedAt || task?.fecha_finalizacion || "sin-fecha",
            task?.action || task?.accion || "completada",
            normalizeText(task?.title || task?.titulo || ""),
            suitePersonKey(task?.owner || task?.responsable || "")
          ].join("|")
        );
      }

      function isCompletedTaskForActiveSuiteUser(task) {
        const ownerKey = suitePersonKey(task?.owner || task?.responsable || "");
        if (!ownerKey) return false;
        return SUITE_SUPERADMIN_KEYS.some((userKey) => {
          return suitePersonKey(userKey) === ownerKey;
        });
      }

      function mergeCompletedTaskHistory(...sources) {
        const merged = new Map();
        sources.forEach((source) => {
          if (!Array.isArray(source)) return;
          source.forEach((task) => {
            if (!task || typeof task !== "object") return;
            if (!isCompletedTaskForActiveSuiteUser(task)) return;
            const identity = completedTaskIdentity(task);
            if (!merged.has(identity)) merged.set(identity, task);
          });
        });
        return [...merged.values()].sort((left, right) => {
          const leftDate = new Date(left.completedAt || left.fecha_finalizacion || 0).getTime() || 0;
          const rightDate = new Date(right.completedAt || right.fecha_finalizacion || 0).getTime() || 0;
          return rightDate - leftDate;
        });
      }

      function recoverLegacyCompletedTasks() {
        const recovered = LEGACY_COMPLETED_STORAGE_KEYS.flatMap((key) => {
          const value = readStoredJson(key, []);
          return Array.isArray(value) ? value : [];
        });
        completedTasks = mergeCompletedTaskHistory(completedTasks, recovered);
        return recovered.length > 0;
      }

      function ensureTaskIds() {
        tasks = tasks.map((task, index) => {
          taskId(task, index);
          taskCreatedAt(task);
          return task;
        });
      }

      function taskTombstones() {
        taskTimer.tombstonesById =
          taskTimer.tombstonesById && typeof taskTimer.tombstonesById === "object"
            ? taskTimer.tombstonesById
            : {};
        return taskTimer.tombstonesById;
      }

      function mergeTaskTombstones(...sources) {
        const merged = { ...taskTombstones() };
        sources.forEach((source) => {
          if (!source || typeof source !== "object") return;
          Object.entries(source).forEach(([id, tombstone]) => {
            if (!id || !tombstone) return;
            const currentAt = Number(merged[id]?.closedAt || 0);
            const incomingAt = Number(tombstone.closedAt || 0);
            if (!merged[id] || incomingAt >= currentAt) merged[id] = tombstone;
          });
        });
        taskTimer.tombstonesById = merged;
        return merged;
      }

      function mergeArchivedTaskTimer(timer) {
        const incoming = normalizeTaskTimer(timer);
        mergeTaskTombstones(incoming.tombstonesById);
        taskTimer.dailyById = mergedTaskDailyTimerTotals(taskTimer.dailyById, incoming.dailyById);
        taskTimer.dailyByUser = mergedDailyTimerTotals(taskTimer.dailyByUser, incoming.dailyByUser);
        taskTimer.elapsedById = { ...(taskTimer.elapsedById || {}) };
        taskTimer.elapsedEditedAt = { ...(taskTimer.elapsedEditedAt || {}) };
        Object.entries(incoming.elapsedById || {}).forEach(([id, seconds]) => {
          const localEditedAt = Number(taskTimer.elapsedEditedAt[id] || 0);
          const incomingEditedAt = Number(incoming.elapsedEditedAt?.[id] || 0);
          if (incomingEditedAt > localEditedAt) {
            taskTimer.elapsedById[id] = Number(seconds || 0);
            taskTimer.elapsedEditedAt[id] = incomingEditedAt;
          } else if (localEditedAt > 0) {
            // local explicit edit wins
          } else {
            taskTimer.elapsedById[id] = Math.max(Number(taskTimer.elapsedById[id] || 0), Number(seconds || 0));
          }
        });
        taskTimer.durationById = {
          ...(incoming.durationById || {}),
          ...(taskTimer.durationById || {})
        };
        taskTimer.presetById = {
          ...(incoming.presetById || {}),
          ...(taskTimer.presetById || {})
        };
      }

      function mergePendingTaskLists(...sources) {
        const merged = new Map();
        const tombstones = taskTombstones();
        sources.forEach((source) => {
          if (!Array.isArray(source)) return;
          source.forEach((task, index) => {
            if (!Array.isArray(task)) return;
            const id = taskId(task, index);
            if (tombstones[id]) return;
            if (!merged.has(id)) merged.set(id, task);
          });
        });
        return [...merged.values()];
      }

      function replacePendingTaskListFromShared(source) {
        return mergePendingTaskLists(Array.isArray(source) ? source : []);
      }

      function readStoredJson(key, fallback) {
        try {
          const value = localStorage.getItem(key);
          return value ? JSON.parse(value) : fallback;
        } catch {
          return fallback;
        }
      }

      function writeStoredValue(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch (error) {
          console.warn(`No se pudo guardar ${key} en este navegador.`, error);
          return false;
        }
      }

      function writeStoredJson(key, value) {
        return writeStoredValue(key, JSON.stringify(value));
      }

      function pendingBackupSignature(snapshot) {
        const value = JSON.stringify([
          snapshot.tasks || [],
          snapshot.completedTasks || [],
          snapshot.taskTimer || {},
          snapshot.tombstonesById || {}
        ]);
        let hash = 2166136261;
        for (let index = 0; index < value.length; index += 1) {
          hash ^= value.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }
        return (hash >>> 0).toString(36);
      }

      function currentPendingBackup(reason = "cambio") {
        return {
          actorName: currentSuiteUserName(),
          completedTasks,
          createdAt: new Date().toISOString(),
          reason,
          stateVersion: pendingStateVersion || Date.now(),
          tasks,
          taskTimer,
          tombstonesById: taskTombstones()
        };
      }

      function pendingTasksDigest() {
        return pendingBackupSignature({
          completedTasks: [],
          tasks,
          taskTimer: {},
          tombstonesById: taskTombstones()
        });
      }

      function saveLocalPendingBackup(reason = "cambio") {
        const snapshot = currentPendingBackup(reason);
        const signature = pendingBackupSignature(snapshot);
        const backups = readStoredJson(TASK_BACKUP_STORAGE_KEY, []);
        const list = Array.isArray(backups) ? backups : [];
        if (list[0]?.signature === signature) return;
        list.unshift({ ...snapshot, signature });
        writeStoredJson(TASK_BACKUP_STORAGE_KEY, list.slice(0, MAX_LOCAL_PENDING_BACKUPS));
      }

      function recoverLocalPendingBackups() {
        const backups = readStoredJson(TASK_BACKUP_STORAGE_KEY, []);
        if (!Array.isArray(backups) || !backups.length) return false;
        backups.forEach((backup) => {
          mergeTaskTombstones(
            backup?.tombstonesById,
            backup?.taskTimer?.tombstonesById
          );
          mergeArchivedTaskTimer(backup?.taskTimer);
        });
        const previousTasks = JSON.stringify(tasks);
        tasks = mergePendingTaskLists(
          tasks,
          ...backups.map((backup) => backup?.tasks)
        );
        completedTasks = mergeCompletedTaskHistory(
          completedTasks,
          ...backups.map((backup) => backup?.completedTasks)
        );
        return previousTasks !== JSON.stringify(tasks);
      }

      function readPendingPresence() {
        const presence = readStoredJson(PRESENCE_STORAGE_KEY, {});
        const now = Date.now();
        return Object.values(presence || {}).filter((entry) => {
          return entry && now - Number(entry.updatedAt || 0) < 20000;
        });
      }

      function mergePendingPresence(nextPresence) {
        const presence = readStoredJson(PRESENCE_STORAGE_KEY, {});
        Object.values(nextPresence || {}).forEach((entry) => {
          if (!entry?.id) return;
          const currentEntry = presence[entry.id];
          if (Number(currentEntry?.updatedAt || 0) > Number(entry.updatedAt || 0)) return;
          presence[entry.id] = entry;
        });
        localStorage.setItem(PRESENCE_STORAGE_KEY, JSON.stringify(presence));
        return presence;
      }

      function currentPendingPresenceEntry(task = null) {
        return {
          id: pendingSessionId,
          name: currentSuiteUserName(),
          editingTaskId: task?.id || null,
          editingTaskTitle: task?.title || null,
          editingTaskAction: task?.action || (task?.id ? "Editando" : null),
          updatedAt: Date.now()
        };
      }

      function writePendingPresence(task = null) {
        if (applyingPresenceSync) return;
        const presence = readStoredJson(PRESENCE_STORAGE_KEY, {});
        const entry = currentPendingPresenceEntry(task);
        presence[pendingSessionId] = entry;
        writeStoredJson(PRESENCE_STORAGE_KEY, presence);
        publishPresenceSync(entry);
      }

      function setEditingPresence(task = null) {
        editingState.taskId = task?.id || null;
        editingState.taskTitle = task?.title || null;
        editingState.taskAction = task?.action || (task?.id ? "Editando" : null);
        writePendingPresence(task);
      }

      function normalizeSuiteUser(user) {
        const key = String(user?.key || "").trim().toLowerCase();
        const savedRole = String(user?.role || user?.rol || "").trim().toLowerCase();
        const savedOrder = Number(user?.order || user?.orden);
        const savedModules = Array.isArray(user?.modules)
          ? user.modules
          : Array.isArray(user?.moduleAccess)
            ? user.moduleAccess
            : null;
        return {
          name: String(user?.name || "").trim(),
          key,
          password: String(user?.password || "").trim(),
          role: SUITE_SUPERADMIN_KEYS.includes(key) ? SUITE_SUPERADMIN_ROLE : savedRole || SUITE_SUPERADMIN_ROLE,
          order: Number.isFinite(savedOrder) && savedOrder > 0 ? savedOrder : defaultSuiteUserOrder(key),
          modules: normalizeSuiteModuleIds(savedModules)
        };
      }

      function normalizeSuiteModuleIds(moduleIds) {
        const availableIds = orderedSuiteModules().map((module) => module.id);
        if (!Array.isArray(moduleIds)) return availableIds;
        return [...new Set(moduleIds.map((moduleId) => String(moduleId || "").trim()).filter((moduleId) => availableIds.includes(moduleId)))];
      }

      function orderedSuiteModules() {
        return [...modules].sort((left, right) => {
          if (left.id === "access") return 1;
          if (right.id === "access") return -1;
          return 0;
        });
      }

      function defaultSuiteUserOrder(value) {
        const normalized = normalizeText(value);
        if (normalized.includes("diego")) return 1;
        if (normalized.includes("jorgeluis") || normalized.includes("jorge")) return 2;
        return 99;
      }

      function defaultSuiteUsers() {
        return mergeSuiteUsers(DEFAULT_SUITE_USERS);
      }

      function mergeSuiteUsers(...groups) {
        const byKey = new Map();
        groups.flat().forEach((user) => {
          const normalizedUser = normalizeSuiteUser(user);
          if (!normalizedUser.key || !normalizedUser.password) return;
          const existingUser = byKey.get(normalizedUser.key);
          byKey.set(normalizedUser.key, {
            ...existingUser,
            ...normalizedUser,
            role:
              existingUser?.role === SUITE_SUPERADMIN_ROLE || normalizedUser.role === SUITE_SUPERADMIN_ROLE
                ? SUITE_SUPERADMIN_ROLE
                : normalizedUser.role
          });
        });
        return Array.from(byKey.values());
      }

      function saveSuiteUsers() {
        writeStoredJson(SUITE_USERS_STORAGE_KEY, suiteUsers);
      }

      function loadSuiteUsers() {
        const savedUsers = readStoredJson(SUITE_USERS_STORAGE_KEY, null);
        const normalizedUsers = Array.isArray(savedUsers)
          ? savedUsers.map(normalizeSuiteUser).filter((user) => user.key && user.password)
          : [];
        suiteUsers = mergeSuiteUsers(defaultSuiteUsers(), normalizedUsers);
        migrateDiegoCredentialsOnce();
        migrateAddNewModules();
        if (suiteUsers.length) saveSuiteUsers();
      }

      function migrateAddNewModules() {
        const availableIds = orderedSuiteModules().map((m) => m.id);
        suiteUsers.forEach((user) => {
          if (!Array.isArray(user.modules)) return;
          const missing = availableIds.filter((id) => !user.modules.includes(id));
          if (missing.length) user.modules.push(...missing);
        });
      }

      function migrateDiegoCredentialsOnce() {
        const previousKey = "diego@limaretail.com";
        const currentKey = "diegomachuca@limaretail.com";

        try {
          if (localStorage.getItem(SUITE_CREDENTIALS_MIGRATION_KEY) === "done") return;

          const previousDiego = suiteUsers.find((user) => user.key === previousKey);
          const currentDiego = suiteUsers.find((user) => user.key === currentKey);
          if (currentDiego) {
            currentDiego.name = previousDiego?.name || currentDiego.name || "Diego";
            currentDiego.password = "1234";
            currentDiego.role = SUITE_SUPERADMIN_ROLE;
            currentDiego.order = previousDiego?.order || currentDiego.order || 1;
          }
          suiteUsers = suiteUsers.filter((user) => user.key !== previousKey);
          localStorage.setItem(SUITE_CREDENTIALS_MIGRATION_KEY, "done");
        } catch {
          const diego = suiteUsers.find((user) => user.key === currentKey);
          if (diego) diego.password = "1234";
          suiteUsers = suiteUsers.filter((user) => user.key !== previousKey);
        }
      }

      function setPersistentCookie(name, value) {
        try {
          const encodedName = encodeURIComponent(name);
          const encodedValue = encodeURIComponent(value);
          const maxAge = SUITE_AUTH_DURATION_DAYS * 24 * 60 * 60;
          const cookie = `${encodedName}=${encodedValue}; max-age=${maxAge}; SameSite=Lax`;
          document.cookie = `${cookie}; path=/`;
          if (!getCookie(name)) document.cookie = cookie;
          return Boolean(getCookie(name));
        } catch {
          return false;
        }
      }

      function getCookie(name) {
        try {
          const target = `${encodeURIComponent(name)}=`;
          const cookie = document.cookie
            .split(";")
            .map((part) => part.trim())
            .find((part) => part.startsWith(target));
          return cookie ? decodeURIComponent(cookie.slice(target.length)) : "";
        } catch {
          return "";
        }
      }

      function authenticateSuiteUser(key, password) {
        const normalizedKey = String(key || "").trim().toLowerCase();
        const normalizedPassword = String(password || "").trim();
        return suiteUsers.find((user) => {
          const userKey = user.key.toLowerCase();
          const userAlias = userKey.split("@")[0];
          return [userKey, userAlias].includes(normalizedKey) && user.password === normalizedPassword;
        });
      }

      function saveSuiteAccessSession(userKey) {
        suiteAccessSession = userKey;
        try {
          sessionStorage.setItem(SUITE_AUTH_SESSION_KEY, userKey);
        } catch {
          // La cookie y localStorage quedan como respaldo si sessionStorage no existe.
        }
        setPersistentCookie(SUITE_AUTH_COOKIE, userKey);
        try {
          localStorage.setItem(SUITE_AUTH_FALLBACK_KEY, userKey);
        } catch {
          // En archivos locales algunos navegadores no guardan cookies.
        }
      }

      function getSuiteAccessSession() {
        try {
          return (
            suiteAccessSession ||
            sessionStorage.getItem(SUITE_AUTH_SESSION_KEY) ||
            getCookie(SUITE_AUTH_COOKIE) ||
            localStorage.getItem(SUITE_AUTH_FALLBACK_KEY) ||
            ""
          );
        } catch {
          return suiteAccessSession || getCookie(SUITE_AUTH_COOKIE);
        }
      }

      function currentSuiteUserName() {
        const sessionKey = getSuiteAccessSession();
        const currentUser = suiteUsers.find((user) => user.key === sessionKey);
        return suitePendingOwnerName(currentUser, sessionKey || "Jorge Luis");
      }

      function currentSuiteUserKey() {
        return String(getSuiteAccessSession() || "").trim().toLowerCase();
      }

      function currentSuiteUserIsSuperadmin() {
        const sessionKey = currentSuiteUserKey();
        if (!sessionKey) return false;
        const currentUser = suiteUsers.find(
          (user) => String(user.key || "").trim().toLowerCase() === sessionKey
        );
        if (currentUser?.role === SUITE_SUPERADMIN_ROLE) return true;
        return SUITE_SUPERADMIN_KEYS.some((key) => suitePersonKey(key) === suitePersonKey(sessionKey));
      }

      function suitePendingOwnerName(user, fallback = "Usuario") {
        const rawName = user?.name || user?.key || fallback;
        const normalized = normalizeText(rawName);
        if (normalized.includes("jorge")) return "Jorge Luis";
        if (normalized.includes("diego")) return "Diego";
        return rawName;
      }

      function suitePersonKey(value) {
        const normalized = normalizeText(value).trim();
        if (normalized.includes("jorge")) return "jorge";
        if (normalized.includes("diego")) return "diego";
        return normalized;
      }

      function isSameSuitePerson(left, right) {
        const leftKey = suitePersonKey(left);
        const rightKey = suitePersonKey(right);
        return Boolean(leftKey && rightKey && leftKey === rightKey);
      }

      function normalizeTaskTimer(timer) {
        const source = timer && typeof timer === "object" ? timer : {};
        const activeById = source.activeById && typeof source.activeById === "object" ? { ...source.activeById } : {};
        const activeByKey = source.activeByKey && typeof source.activeByKey === "object" ? { ...source.activeByKey } : {};
        const legacyCountdownIds = new Set([
          ...Object.keys(source.durationById || {}),
          ...Object.keys(source.presetById || {})
        ]);
        const elapsedById = { ...(source.elapsedById || {}) };
        legacyCountdownIds.forEach((id) => delete elapsedById[id]);
        if (source.activeTaskId && !activeById[source.activeTaskId]) {
          activeById[source.activeTaskId] = {
            userKey: source.activeUserKey || null,
            userName: source.activeUserName || null,
            startedAt: source.startedAt || null
          };
        }
        Object.entries(activeById).forEach(([id, entry]) => {
          const key = taskTimerKeyForId(id, entry);
          if (key && !activeByKey[key]) activeByKey[key] = entry;
        });
        return {
          activeTaskId: source.activeTaskId || null,
          activeUserKey: source.activeUserKey || null,
          activeUserName: source.activeUserName || null,
          activeById,
          activeByKey,
          dailyById: source.dailyById && typeof source.dailyById === "object" ? source.dailyById : {},
          dailyByUser: source.dailyByUser && typeof source.dailyByUser === "object" ? source.dailyByUser : {},
          durationById: {},
          presetById: {},
          tombstonesById: source.tombstonesById && typeof source.tombstonesById === "object" ? source.tombstonesById : {},
          elapsedById,
          elapsedEditedAt: source.elapsedEditedAt && typeof source.elapsedEditedAt === "object" ? source.elapsedEditedAt : {},
          startedAt: source.startedAt || null
        };
      }

      function applyTaskTimerSnapshot(timer) {
        const normalized = normalizeTaskTimer(timer);
        taskTimer.activeTaskId = normalized.activeTaskId;
        taskTimer.activeUserKey = normalized.activeUserKey;
        taskTimer.activeUserName = normalized.activeUserName;
        taskTimer.activeById = normalized.activeById;
        taskTimer.activeByKey = normalized.activeByKey;
        taskTimer.dailyById = normalized.dailyById;
        taskTimer.dailyByUser = normalized.dailyByUser;
        taskTimer.durationById = normalized.durationById;
        taskTimer.presetById = normalized.presetById;
        taskTimer.tombstonesById = normalized.tombstonesById;
        taskTimer.startedAt = normalized.startedAt;
        taskTimer.elapsedById = normalized.elapsedById;
        taskTimer.elapsedEditedAt = normalized.elapsedEditedAt;
        pruneActiveTimersByUser();
      }

      function timerEntryMatchesUser(id, entry, userName, userKey) {
        if (!entry) return false;
        const entryKey = String(entry.userKey || "").trim().toLowerCase();
        const normalizedKey = String(userKey || "").trim().toLowerCase();
        if (entryKey && normalizedKey && (entryKey === normalizedKey || isSameSuitePerson(entryKey, normalizedKey))) return true;
        if (userName && isSameSuitePerson(entry.userName, userName)) return true;
        if (userName && isSameSuitePerson(entry.taskOwner, userName)) return true;
        const task = taskByTimerId(id);
        return Boolean(userName && task?.[1] && isSameSuitePerson(task[1], userName));
      }

      function timerEntryPersonKey(id, entry) {
        const task = taskByTimerId(id);
        return (
          suitePersonKey(entry?.userKey) ||
          suitePersonKey(entry?.userName) ||
          suitePersonKey(entry?.taskOwner) ||
          suitePersonKey(task?.[1])
        );
      }

      function pruneActiveTimersByUser() {
        const candidates = [];
        const now = Date.now();
        Object.entries(taskTimer.activeById || {}).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          if (now - Number(entry.startedAt) > TIMER_STALE_ACTIVE_MS) return;
          const localId = localTaskIdForTimer(id, entry);
          candidates.push({
            id: localId,
            key: taskTimerKeyForId(localId, entry),
            entry,
            user: timerEntryPersonKey(localId, entry) || `id:${id}`
          });
        });
        Object.entries(taskTimer.activeByKey || {}).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          if (now - Number(entry.startedAt) > TIMER_STALE_ACTIVE_MS) return;
          const localId = localTaskIdForTimer("", entry);
          candidates.push({
            id: localId,
            key,
            entry,
            user: timerEntryPersonKey(localId, entry) || `key:${key}`
          });
        });

        const latestByUser = new Map();
        candidates.forEach((candidate) => {
          const current = latestByUser.get(candidate.user);
          if (!current || Number(candidate.entry.startedAt || 0) > Number(current.entry.startedAt || 0)) {
            latestByUser.set(candidate.user, candidate);
          }
        });

        const nextActiveById = {};
        const nextActiveByKey = {};
        latestByUser.forEach((candidate) => {
          const entry = candidate.entry;
          const localId = localTaskIdForTimer(candidate.id, entry);
          if (localId && taskByTimerId(localId)) nextActiveById[localId] = entry;
          const key = taskTimerKeyForId(localId, entry) || candidate.key || taskTimerFingerprintFromEntry(entry);
          if (key && localId && taskByTimerId(localId)) nextActiveByKey[key] = entry;
        });
        taskTimer.activeById = nextActiveById;
        taskTimer.activeByKey = nextActiveByKey;
      }

      function syncLegacyActiveTimerFields() {
        const ownedActiveId = currentUserActiveTaskId();
        const fallbackEntry = ownedActiveId ? null : activeTimerEntries()[0];
        const nextActiveId = ownedActiveId || fallbackEntry?.[0] || null;
        const nextEntry = nextActiveId ? activeTimerEntry(nextActiveId) : null;
        taskTimer.activeTaskId = nextActiveId;
        taskTimer.activeUserKey = nextEntry?.userKey || null;
        taskTimer.activeUserName = nextEntry?.userName || null;
        taskTimer.startedAt = nextEntry?.startedAt || null;
      }

      function mergeTaskTimerSnapshot(timer, options = {}) {
        const incoming = normalizeTaskTimer(timer);
        const incomingActiveById = incoming.activeById || {};
        const incomingActiveByKey = incoming.activeByKey || {};
        const nextActiveById = { ...(taskTimer.activeById || {}) };
        const nextActiveByKey = { ...(taskTimer.activeByKey || {}) };
        const sourceName = options.actorName || incoming.activeUserName || "";
        const sourceKey = incoming.activeUserKey || "";
        const sourceUpdatedAt = Number(options.updatedAt || 0);

        Object.entries(nextActiveById).forEach(([id, entry]) => {
          const missingFromIncoming = !incomingActiveById[id]?.startedAt;
          const sourceCanReplaceEntry =
            !sourceUpdatedAt || sourceUpdatedAt >= Number(entry?.startedAt || 0);
          if (
            missingFromIncoming &&
            sourceCanReplaceEntry &&
            timerEntryMatchesUser(id, entry, sourceName, sourceKey)
          ) {
            delete nextActiveById[id];
          }
        });
        Object.entries(nextActiveByKey).forEach(([key, entry]) => {
          const missingFromIncoming = !incomingActiveByKey[key]?.startedAt;
          const sourceCanReplaceEntry =
            !sourceUpdatedAt || sourceUpdatedAt >= Number(entry?.startedAt || 0);
          if (
            missingFromIncoming &&
            sourceCanReplaceEntry &&
            timerEntryMatchesUser(null, entry, sourceName, sourceKey)
          ) {
            delete nextActiveByKey[key];
          }
        });

        Object.entries(incomingActiveById).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer(id, entry);
          nextActiveById[localId] = entry;
          if (localId !== id) delete nextActiveById[id];
          const key = taskTimerKeyForId(localId, entry);
          if (key) nextActiveByKey[key] = entry;
        });
        Object.entries(incomingActiveByKey).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          nextActiveByKey[key] = entry;
          const localId = localTaskIdForTimer("", entry);
          if (localId) nextActiveById[localId] = entry;
        });

        taskTimer.activeById = nextActiveById;
        taskTimer.activeByKey = nextActiveByKey;
        taskTimer.dailyById = mergedTaskDailyTimerTotals(taskTimer.dailyById, incoming.dailyById);
        taskTimer.dailyByUser = mergedDailyTimerTotals(taskTimer.dailyByUser, incoming.dailyByUser);
        taskTimer.durationById = {};
        taskTimer.presetById = {};
        mergeTaskTombstones(incoming.tombstonesById);
        taskTimer.elapsedById = { ...(taskTimer.elapsedById || {}) };
        taskTimer.elapsedEditedAt = { ...(taskTimer.elapsedEditedAt || {}) };
        Object.entries(incoming.elapsedById || {}).forEach(([id, seconds]) => {
          const localEditedAt = Number(taskTimer.elapsedEditedAt[id] || 0);
          const incomingEditedAt = Number(incoming.elapsedEditedAt?.[id] || 0);
          if (incomingEditedAt > localEditedAt) {
            taskTimer.elapsedById[id] = Number(seconds || 0);
            taskTimer.elapsedEditedAt[id] = incomingEditedAt;
          } else if (localEditedAt > 0) {
            // local explicit edit wins — do not overwrite
          } else {
            taskTimer.elapsedById[id] = Math.max(Number(taskTimer.elapsedById[id] || 0), Number(seconds || 0));
          }
        });
        pruneActiveTimersByUser();
        syncLegacyActiveTimerFields();
      }

      function taskTimerSnapshotFromParts(activeById, elapsedById) {
        const latestByUser = new Map();
        Object.entries(activeById || {}).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          const user = timerEntryPersonKey(id, entry) || `id:${id}`;
          const current = latestByUser.get(user);
          if (!current || Number(entry.startedAt || 0) > Number(current[1].startedAt || 0)) {
            latestByUser.set(user, [id, entry]);
          }
        });
        const activeEntries = [...latestByUser.values()];
        const activeByKey = {};
        activeEntries.forEach(([id, entry]) => {
          const key = taskTimerKeyForId(id, entry);
          if (key) activeByKey[key] = entry;
        });
        const currentName = currentSuiteUserName();
        const currentKey = currentSuiteUserKey();
        const preferredEntry =
          activeEntries.find(([id, entry]) => timerEntryMatchesUser(id, entry, currentName, currentKey)) ||
          activeEntries[0] ||
          null;
        const activeTaskId = preferredEntry?.[0] || null;
        const activeEntry = preferredEntry?.[1] || null;
        return {
          activeTaskId,
          activeUserKey: activeEntry?.userKey || null,
          activeUserName: activeEntry?.userName || null,
          activeById: Object.fromEntries(activeEntries),
          activeByKey,
          dailyById: taskTimer.dailyById || {},
          dailyByUser: taskTimer.dailyByUser || {},
          durationById: taskTimer.durationById || {},
          presetById: taskTimer.presetById || {},
          tombstonesById: taskTombstones(),
          elapsedById: elapsedById || {},
          startedAt: activeEntry?.startedAt || null
        };
      }

      function mergedTaskTimerForSharedSave(remoteTimer) {
        const remote = normalizeTaskTimer(remoteTimer);
        const local = normalizeTaskTimer(taskTimer);
        const nextActiveById = { ...(remote.activeById || {}) };
        const nextActiveByKey = { ...(remote.activeByKey || {}) };
        const currentName = currentSuiteUserName();
        const currentKey = currentSuiteUserKey();

        Object.entries(nextActiveById).forEach(([id, entry]) => {
          const localStillActive = Boolean(local.activeById?.[id]?.startedAt);
          if (!localStillActive && timerEntryMatchesUser(id, entry, currentName, currentKey)) {
            delete nextActiveById[id];
          }
        });
        Object.entries(nextActiveByKey).forEach(([key, entry]) => {
          const localStillActive = Boolean(local.activeByKey?.[key]?.startedAt);
          if (!localStillActive && timerEntryMatchesUser(null, entry, currentName, currentKey)) {
            delete nextActiveByKey[key];
          }
        });

        Object.entries(local.activeById || {}).forEach(([id, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer(id, entry);
          nextActiveById[localId] = entry;
          if (localId !== id) delete nextActiveById[id];
          const key = taskTimerKeyForId(localId, entry);
          if (key) nextActiveByKey[key] = entry;
        });
        Object.entries(local.activeByKey || {}).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          nextActiveByKey[key] = entry;
          const localId = localTaskIdForTimer("", entry);
          if (localId) nextActiveById[localId] = entry;
        });

        const nextElapsedById = { ...(remote.elapsedById || {}) };
        const nextElapsedEditedAt = { ...(remote.elapsedEditedAt || {}) };
        Object.entries(local.elapsedById || {}).forEach(([id, seconds]) => {
          const localEditedAt = Number(local.elapsedEditedAt?.[id] || 0);
          const remoteEditedAt = Number(remote.elapsedEditedAt?.[id] || 0);
          if (localEditedAt > remoteEditedAt) {
            nextElapsedById[id] = Number(seconds || 0);
            nextElapsedEditedAt[id] = localEditedAt;
          } else if (remoteEditedAt === 0) {
            nextElapsedById[id] = Math.max(Number(nextElapsedById[id] || 0), Number(seconds || 0));
          }
        });

        const snapshot = taskTimerSnapshotFromParts(nextActiveById, nextElapsedById);
        snapshot.elapsedEditedAt = nextElapsedEditedAt;
        snapshot.activeByKey = { ...nextActiveByKey, ...snapshot.activeByKey };
        snapshot.dailyById = mergedTaskDailyTimerTotals(remote.dailyById, local.dailyById);
        snapshot.dailyByUser = mergedDailyTimerTotals(remote.dailyByUser, local.dailyByUser);
        snapshot.durationById = {
          ...(remote.durationById || {}),
          ...(local.durationById || {})
        };
        snapshot.presetById = {
          ...(remote.presetById || {}),
          ...(local.presetById || {})
        };
        snapshot.tombstonesById = mergeTaskTombstones(
          remote.tombstonesById,
          local.tombstonesById
        );
        return snapshot;
      }

      function localDayKey(value = Date.now()) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function localMonthKey(value = Date.now()) {
        if (typeof value === "string") {
          const dateOnly = value.trim().match(/^(\d{4}-\d{2})-\d{2}$/);
          if (dateOnly) return dateOnly[1];
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        return `${year}-${month}`;
      }

      function taskMatchesMonth(task, monthId) {
        if (!monthId) return true;
        const startMonth = localMonthKey(taskDateInputValue(task[5]) || "");
        const endMonth = localMonthKey(taskDateInputValue(task[2]) || "");
        if (!startMonth && !endMonth) return true;
        if (startMonth && endMonth) return startMonth <= monthId && monthId <= endMonth;
        if (startMonth) return monthId >= startMonth;
        return monthId <= endMonth;
      }

      function mergedDailyTimerTotals(left, right) {
        const merged = {};
        [left, right].forEach((source) => {
          if (!source || typeof source !== "object") return;
          Object.entries(source).forEach(([day, totals]) => {
            if (!totals || typeof totals !== "object") return;
            merged[day] = { ...(merged[day] || {}) };
            Object.entries(totals).forEach(([userKey, seconds]) => {
              merged[day][userKey] = Math.max(
                Number(merged[day][userKey] || 0),
                Number(seconds || 0)
              );
            });
          });
        });
        return merged;
      }

      function mergedTaskDailyTimerTotals(left, right) {
        const merged = {};
        [left, right].forEach((source) => {
          if (!source || typeof source !== "object") return;
          Object.entries(source).forEach(([taskIdValue, dailyTotals]) => {
            if (!dailyTotals || typeof dailyTotals !== "object") return;
            merged[taskIdValue] = mergedDailyTimerTotals(merged[taskIdValue], dailyTotals);
          });
        });
        return merged;
      }

      function timerDailySegments(startAt, endAt = Date.now()) {
        const start = Number(startAt || 0);
        const end = Number(endAt || 0);
        if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return {};

        const segments = {};
        let cursor = start;
        while (cursor < end) {
          const cursorDate = new Date(cursor);
          const nextDay = new Date(cursorDate);
          nextDay.setHours(24, 0, 0, 0);
          const segmentEnd = Math.min(end, nextDay.getTime());
          const dayKey = localDayKey(cursor);
          if (dayKey) {
            segments[dayKey] = (segments[dayKey] || 0) + Math.max(0, Math.floor((segmentEnd - cursor) / 1000));
          }
          cursor = segmentEnd;
        }
        return segments;
      }

      function addTimerDailySeconds(id, entry, endAt = Date.now()) {
        if (!entry?.startedAt) return;
        const userKey = timerEntryPersonKey(id, entry) || suitePersonKey(activeTimerWorkerName(id)) || "sin_usuario";
        if (!userKey) return;
        const segments = timerDailySegments(entry.startedAt, endAt);
        taskTimer.dailyByUser = taskTimer.dailyByUser && typeof taskTimer.dailyByUser === "object" ? taskTimer.dailyByUser : {};
        taskTimer.dailyById = taskTimer.dailyById && typeof taskTimer.dailyById === "object" ? taskTimer.dailyById : {};
        taskTimer.dailyById[id] = taskTimer.dailyById[id] && typeof taskTimer.dailyById[id] === "object" ? taskTimer.dailyById[id] : {};
        Object.entries(segments).forEach(([day, seconds]) => {
          taskTimer.dailyByUser[day] = { ...(taskTimer.dailyByUser[day] || {}) };
          taskTimer.dailyByUser[day][userKey] = Number(taskTimer.dailyByUser[day][userKey] || 0) + Number(seconds || 0);
          taskTimer.dailyById[id][day] = { ...(taskTimer.dailyById[id][day] || {}) };
          taskTimer.dailyById[id][day][userKey] = Number(taskTimer.dailyById[id][day][userKey] || 0) + Number(seconds || 0);
        });
      }

      function activeDailySecondsForUser(name, dayKey = localDayKey()) {
        return activeTimerEntries().reduce((sum, [id, entry]) => {
          if (!taskByTimerId(id)) return sum;
          if (!timerEntryMatchesUser(id, entry, name, "")) return sum;
          const segments = timerDailySegments(entry.startedAt, Date.now());
          return sum + Number(segments[dayKey] || 0);
        }, 0);
      }

      function completedDailySecondsForUser(name, dayKey = localDayKey()) {
        const userKey = suitePersonKey(name);
        return completedTasks.reduce((sum, task) => {
          if (!task || task.action === "eliminada") return sum;
          if (localDayKey(task.completedAt) !== dayKey) return sum;
          const dailySeconds = Number(task.dailySecondsByUser?.[dayKey]?.[userKey] || 0);
          return sum + dailySeconds;
        }, 0);
      }

      function dailyWorkedSecondsForUser(name, dayKey = localDayKey()) {
        return completedDailySecondsForUser(name, dayKey) + activeDailySecondsForUser(name, dayKey);
      }

      function formatWorkedMinutes(seconds) {
        const minutes = Math.floor(Number(seconds || 0) / 60);
        return `${minutes} min`;
      }

      function taskByTimerId(id) {
        return tasks.find((task, index) => taskId(task, index) === id) || null;
      }

      function taskTimerFingerprint(task) {
        if (!task) return "";
        const base = `${normalizeText(task[0]).trim()}|${suitePersonKey(task[1])}`;
        return task[7] ? `${base}|${task[7]}` : base;
      }

      function taskTimerFingerprintFromEntry(entry) {
        if (!entry) return "";
        const base = `${normalizeText(entry.taskTitle).trim()}|${suitePersonKey(entry.taskOwner)}`;
        return entry.taskCreatedAt ? `${base}|${entry.taskCreatedAt}` : base;
      }

      function taskTimerKeyForId(id, entry) {
        const task = taskByTimerId(id);
        return taskTimerFingerprint(task) || taskTimerFingerprintFromEntry(entry);
      }

      function localTaskIdForTimer(id, entry) {
        if (taskByTimerId(id)) return id;
        const fingerprint = taskTimerFingerprintFromEntry(entry);
        if (!fingerprint || fingerprint === "|") return id;
        const index = tasks.findIndex((task) => taskTimerFingerprint(task) === fingerprint);
        return index >= 0 ? taskId(tasks[index], index) : id;
      }

      function activeTimerEntry(id) {
        const activeEntry = taskTimer.activeById?.[id];
        if (activeEntry?.startedAt) return activeEntry;
        const key = taskTimerKeyForId(id, activeEntry);
        const keyedEntry = key ? taskTimer.activeByKey?.[key] : null;
        if (keyedEntry?.startedAt) return keyedEntry;
        if (taskTimer.activeTaskId === id && taskTimer.startedAt) {
          return {
            userKey: taskTimer.activeUserKey,
            userName: taskTimer.activeUserName,
            startedAt: taskTimer.startedAt
          };
        }
        return null;
      }

      function activeTimerEntries() {
        const entries = new Map();
        Object.entries(taskTimer.activeById || {}).forEach(([id, entry]) => {
          if (entry?.startedAt) entries.set(id, entry);
        });
        Object.entries(taskTimer.activeByKey || {}).forEach(([key, entry]) => {
          if (!entry?.startedAt) return;
          const localId = localTaskIdForTimer("", entry);
          if (localId && taskByTimerId(localId)) entries.set(localId, entry);
        });
        return [...entries.entries()];
      }

      function hasActiveTaskTimers() {
        return activeTimerEntries().length > 0 || Boolean(taskTimer.activeTaskId && taskTimer.startedAt && taskByTimerId(taskTimer.activeTaskId));
      }

      function activeTimerWorkerName(id = taskTimer.activeTaskId) {
        const entry = activeTimerEntry(id);
        const storedName = String(entry?.userName || "").trim();
        const normalizedStoredName = normalizeText(storedName);
        if (storedName && normalizedStoredName !== "otro usuario" && normalizedStoredName !== "usuario") return storedName;

        const storedKey = String(entry?.userKey || "").trim();
        if (storedKey) return suitePendingOwnerName({ key: storedKey }, storedKey);

        const task = taskByTimerId(id);
        if (task?.[1]) return task[1];

        return "Responsable";
      }

      function currentUserOwnsActiveTimer(id = taskTimer.activeTaskId) {
        const entry = activeTimerEntry(id);
        if (!entry) return false;
        const activeKey = String(entry.userKey || "").trim().toLowerCase();
        const currentKey = currentSuiteUserKey();
        if (activeKey && (activeKey === currentKey || isSameSuitePerson(activeKey, currentKey))) return true;

        const entryName = String(entry.userName || "").trim();
        const normalizedEntryName = normalizeText(entryName);
        const entryHasIdentity =
          Boolean(activeKey) ||
          (entryName && normalizedEntryName !== "otro usuario" && normalizedEntryName !== "usuario");
        if (
          entryHasIdentity &&
          entryName &&
          normalizedEntryName !== "otro usuario" &&
          normalizedEntryName !== "usuario" &&
          isSameSuitePerson(entryName, currentSuiteUserName())
        ) {
          return true;
        }
        if (!entryHasIdentity) {
          const task = taskByTimerId(id);
          return Boolean(task?.[1] && isSameSuitePerson(task[1], currentSuiteUserName()));
        }
        return false;
      }

      function currentUserActiveTaskId() {
        const ownedEntry = activeTimerEntries().find(([id]) => currentUserOwnsActiveTimer(id));
        if (ownedEntry) return ownedEntry[0];
        if (taskTimer.activeTaskId && currentUserOwnsActiveTimer(taskTimer.activeTaskId)) return taskTimer.activeTaskId;
        return null;
      }

      function clearCurrentUserActiveTimers() {
        const currentName = currentSuiteUserName();
        const currentKey = currentSuiteUserKey();
        Object.entries(taskTimer.activeById || {}).forEach(([id, entry]) => {
          if (!timerEntryMatchesUser(id, entry, currentName, currentKey)) return;
          addTimerDailySeconds(id, entry);
          taskTimer.elapsedById[id] = elapsedSecondsForTask(id);
          delete taskTimer.activeById[id];
        });
        Object.entries(taskTimer.activeByKey || {}).forEach(([key, entry]) => {
          if (!timerEntryMatchesUser(null, entry, currentName, currentKey)) return;
          delete taskTimer.activeByKey[key];
        });
        if (taskTimer.activeTaskId && !taskTimer.activeById[taskTimer.activeTaskId]) {
          taskTimer.activeTaskId = null;
          taskTimer.activeUserKey = null;
          taskTimer.activeUserName = null;
          taskTimer.startedAt = null;
        }
        pruneActiveTimersByUser();
      }

      function isTaskLockedByOtherUser(id) {
        const entry = activeTimerEntry(id);
        return Boolean(entry && !currentUserOwnsActiveTimer(id));
      }

      function canCurrentUserControlTask(id) {
        return !isTaskLockedByOtherUser(id);
      }

      function explainTaskLock(id, action = "usar esta accion") {
        const workerName = activeTimerWorkerName(id);
        const canUnlock = currentSuiteUserIsSuperadmin();
        const message = `${workerName} esta trabajando esta tarea.`;
        if (!canUnlock) {
          window.alert(`${message} Espera a que finalice su timer para ${action}.`);
          return false;
        }
        if (
          window.confirm(
            `${message} Â¿Quieres destrabarla ahora para ${action}? El tiempo trabajado quedara guardado.`
          )
        ) {
          forceUnlockTaskTimer(id);
          return true;
        }
        return false;
      }

      function normalizeText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function taskDateInputValue(value) {
        const normalized = String(value || "").trim();
        const match = normalized.match(/^(\d{4}-\d{2}-\d{2})/);
        return match ? match[1] : "";
      }

      function hasSuiteAccess() {
        const sessionKey = getSuiteAccessSession();
        return Boolean(sessionKey && suiteUsers.some((user) => user.key === sessionKey));
      }

      function currentSuiteUser() {
        const sessionKey = currentSuiteUserKey();
        return suiteUsers.find((user) => user.key === sessionKey) || null;
      }

      function suiteUserCanAccessModule(user, moduleId) {
        return Boolean(user && normalizeSuiteModuleIds(user.modules).includes(moduleId));
      }

      function currentSuiteUserCanAccessModule(moduleId) {
        return suiteUserCanAccessModule(currentSuiteUser(), moduleId);
      }

      function currentSuiteUserModules() {
        const user = currentSuiteUser();
        return orderedSuiteModules().filter((module) => suiteUserCanAccessModule(user, module.id));
      }

      function updateSuiteModuleAccess(userKey, moduleId, enabled) {
        const normalizedKey = String(userKey || "").trim().toLowerCase();
        const index = suiteUsers.findIndex((user) => user.key === normalizedKey);
        if (index < 0 || !modules.some((module) => module.id === moduleId)) return false;

        const nextModules = new Set(normalizeSuiteModuleIds(suiteUsers[index].modules));
        if (enabled) nextModules.add(moduleId);
        else nextModules.delete(moduleId);
        suiteUsers[index].modules = orderedSuiteModules()
          .map((module) => module.id)
          .filter((availableModuleId) => nextModules.has(availableModuleId));
        saveSuiteUsers();
        state.suiteUserMessage = `Permisos actualizados para ${suiteUsers[index].key}.`;
        return true;
      }

      function renderNoModuleAccess() {
        document.getElementById("app").innerHTML = `
          <main class="suite-lock">
            <div class="suite-lock-inner">
              <div class="suite-lock-brand">
                <span class="logo">LR</span>
                <span>
                  <p class="brand-title">LR Suite</p>
                  <p class="small">Lima Retail</p>
                </span>
              </div>
              ${header(
                "Sin módulos asignados",
                "Tu usuario está activo, pero aún no tiene permisos para visualizar módulos.",
                "Acceso restringido",
