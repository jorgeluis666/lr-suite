<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LR Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./lr-suite-config.js"></script>
    <style>
      :root {
        --ink: #0f172a;
        --muted: #475569;
        --subtle: #64748b;
        --soft: #f8fafc;
        --surface-subtle: #f1f5f9;
        --line: #dce3ef;
        --line-soft: #e2e8f0;
        --green: #2563eb;
        --green-700: #1d4ed8;
        --green-soft: #eff6ff;
        --green-line: #bfdbfe;
        --sky: #0ea5e9;
        --sky-soft: #f0f9ff;
        --amber: #d97706;
        --amber-soft: #fffbeb;
        --rose: #e11d48;
        --rose-soft: #fff1f2;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--soft);
      }

      body {
        margin: 0;
        background: var(--soft);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 20;
        width: 288px;
        border-right: 1px solid var(--line);
        background: var(--white);
        padding: 24px 22px 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        overflow-y: auto;
        transition:
          transform 0.24s ease,
          box-shadow 0.24s ease;
      }

      .sidebar-toggle {
        position: fixed;
        top: 28px;
        left: 268px;
        z-index: 30;
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--white);
        color: var(--ink);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
        transition:
          left 0.24s ease,
          color 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .sidebar-toggle:hover {
        border-color: var(--green-line);
        background: var(--green-soft);
        color: var(--green-700);
      }

      .sidebar-toggle .svg-icon {
        transition: transform 0.24s ease;
      }

      .app.sidebar-collapsed .sidebar {
        transform: translateX(-100%);
        box-shadow: none;
      }

      .app.sidebar-collapsed .sidebar-toggle {
        left: 14px;
      }

      .app.sidebar-collapsed .sidebar-toggle .svg-icon {
        transform: rotate(180deg);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
      }

      .logo {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 8px;
        background: #172033;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
      }

      .brand-title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      .small {
        margin: 0;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.5;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--subtle);
        font-size: 13px;
        font-weight: 500;
      }

      .panel-title {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .nav {
        display: grid;
        gap: 9px;
      }

      .nav-button {
        width: 100%;
        min-height: 66px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        color: var(--ink);
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr) 14px;
        gap: 12px;
        align-items: center;
        padding: 10px;
        text-align: left;
        transition:
          background 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease;
      }

      .nav-button:hover,
      .nav-button.active {
        border-color: var(--green-line);
        background: var(--green-soft);
        box-shadow: 0 6px 16px rgba(16, 185, 129, 0.08);
      }

      .nav-icon {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--soft);
        color: var(--subtle);
      }

      .nav-button.active .nav-icon {
        border-color: var(--green-line);
        background: #fff;
        color: var(--green);
      }

      .nav-name,
      .nav-desc {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-name {
        color: var(--ink);
        font-size: 14px;
        font-weight: 500;
      }

      .nav-button.active .nav-name {
        color: var(--green-700);
      }

      .nav-desc {
        margin-top: 4px;
        color: var(--subtle);
        font-size: 12px;
      }

      .chevron {
        color: #94a3b8;
        font-size: 22px;
        line-height: 1;
      }

      .active-box {
        margin-top: auto;
        border: 1px solid var(--green-line);
        border-radius: 8px;
        background: var(--green-soft);
        padding: 14px;
      }

      .active-box .label {
        margin: 0 0 8px;
        color: var(--green-700);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .active-box strong {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        font-weight: 600;
      }

      .content {
        margin-left: 288px;
        min-height: 100vh;
        padding: 32px 56px;
        transition: margin-left 0.24s ease;
      }

      .app.sidebar-collapsed .content {
        margin-left: 0;
      }

      .module {
        max-width: 1480px;
        margin: 0 auto;
        display: grid;
        gap: 22px;
      }

      .task-module {
        gap: 12px;
        zoom: 0.9;
      }

      .header-card,
      .compare-card,
      .month-track,
      .metric-card,
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.04);
      }

      .header-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 22px 20px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: max-content;
        border: 1px solid var(--green-line);
        border-radius: 7px;
        background: var(--green-soft);
        color: var(--green-700);
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
      }

      h1 {
        margin: 12px 0 0;
        color: var(--ink);
        font-size: 30px;
        line-height: 1.1;
        letter-spacing: 0;
        font-weight: 600;
      }

      .lead {
        max-width: 900px;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .control {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 240px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        padding: 11px 12px;
        color: var(--subtle);
      }

      .control input,
      .control select {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--ink);
        font-weight: 500;
        outline: 0;
      }

      .month-period strong {
        display: block;
        color: var(--ink);
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .compare-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 16px;
        padding: 16px 18px;
      }

      .compare-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .compare-icon {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 8px;
        background: var(--amber-soft);
        color: var(--amber);
      }

      .compare-title {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }

      .compare-grid {
        display: grid;
        grid-template-columns: repeat(4, max-content);
        gap: 26px;
        color: var(--subtle);
        font-size: 12px;
      }

      .compare-grid strong {
        display: block;
        margin-top: 3px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .compare-grid .up {
        color: var(--green);
      }

      .compare-grid .negative {
        color: var(--rose);
      }

      .month-track {
        display: grid;
        gap: 14px;
        padding: 16px 18px;
      }

      .month-track-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .month-track-head strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }

      .month-chip {
        display: inline-flex;
        align-items: center;
        width: max-content;
        border: 1px solid var(--green-line);
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--green-700);
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 600;
      }

      .month-tabs {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 9px;
      }

      .month-tab {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        color: var(--ink);
        font-size: 13px;
        font-weight: 600;
        transition:
          background 0.18s ease,
          border-color 0.18s ease,
          color 0.18s ease;
      }

      .month-tab:hover:not(:disabled),
      .month-tab.active {
        border-color: var(--green-line);
        background: var(--green-soft);
        color: var(--green-700);
      }

      .month-tab:disabled {
        cursor: not-allowed;
        color: #94a3b8;
        background: #f8fafc;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .metric-card {
        min-height: 126px;
        padding: 18px;
        position: relative;
      }

      .metric-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .metric-label {
        margin: 0;
        color: var(--subtle);
        font-size: 13px;
        font-weight: 500;
        text-transform: uppercase;
      }

      .trend {
        display: inline-flex;
        align-items: center;
        border-radius: 6px;
        background: var(--green-soft);
        color: var(--green);
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .trend.bad {
        background: var(--rose-soft);
        color: var(--rose);
      }

      .metric-value {
        margin: 22px 0 0;
        color: var(--ink);
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
      }

      .metric-detail {
        margin: 9px 0 0;
        color: var(--subtle);
        font-size: 12px;
      }

      .split {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(420px, 0.85fr);
        gap: 22px;
        align-items: start;
      }

      .panel-head {
        border-bottom: 1px solid var(--line);
        padding: 17px 18px;
      }

      .panel-head strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line-soft);
        padding: 13px 18px;
        vertical-align: middle;
      }

      th {
        background: #f8fafc;
        color: var(--subtle);
        font-size: 12px;
        font-weight: 500;
        text-align: left;
        text-transform: uppercase;
      }

      .right {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .muted {
        color: var(--subtle);
      }

      .section-row td {
        background: #fff;
        color: var(--ink);
        font-weight: 600;
      }

      .section-row .negative {
        color: var(--rose);
      }

      .final-row td {
        background: #172033;
        color: #fff;
        font-weight: 600;
      }

      .chart-panel {
        padding: 18px;
      }

      .chart-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 12px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--subtle);
        font-size: 12px;
      }

      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        margin-right: 6px;
        border-radius: 3px;
        vertical-align: -1px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        border-bottom: 1px solid var(--line);
        padding: 17px 18px;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .quote-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .quote-import-input {
        display: none;
      }

      .badge {
        display: inline-flex;
        width: max-content;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f8fafc;
        color: #475569;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 500;
      }

      .badge.green {
        border-color: var(--green-line);
        background: var(--green-soft);
        color: var(--green-700);
      }

      .badge.sky {
        border-color: #bae6fd;
        background: var(--sky-soft);
        color: #0369a1;
      }

      .badge.amber {
        border-color: #fde68a;
        background: var(--amber-soft);
        color: #b45309;
      }

      .badge.rose {
        border-color: #fecdd3;
        background: var(--rose-soft);
        color: #be123c;
      }

      .badge.process-active {
        border-color: var(--rose);
        background: var(--rose);
        color: #fff;
        font-weight: 800;
        box-shadow: 0 6px 14px rgba(225, 29, 72, 0.18);
      }

      button.badge {
        cursor: pointer;
        font: inherit;
        line-height: 1;
      }

      button.badge:hover,
      button.badge:focus {
        border-color: var(--green-line);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        outline: 0;
      }

      .badge-select {
        height: 30px;
        min-width: 110px;
        border: 1px solid var(--green-line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 0 8px;
        font-size: 12px;
        font-weight: 600;
        outline: 0;
      }

      .badge-select:focus {
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .quote-service {
        min-width: 280px;
        font-weight: 600;
      }

      .quote-client {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      .quote-email {
        display: inline-flex;
        margin: 3px 0 0;
        border: 0;
        background: transparent;
        color: var(--green-700);
        padding: 0;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        text-align: left;
      }

      .quote-email:hover,
      .quote-email:focus {
        color: var(--green);
        text-decoration: underline;
        outline: 0;
      }

      .quote-pill {
        display: inline-flex;
        min-width: 38px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--green-line);
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--green-700);
        padding: 5px 11px;
        font-size: 12px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .quote-pill:hover,
      .quote-pill:focus {
        border-color: var(--green);
        background: #dbeafe;
        outline: 0;
      }

      .quote-link {
        display: inline-grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--green-700);
        font-size: 17px;
        text-decoration: none;
      }

      .quote-link:hover,
      .quote-link:focus {
        border-color: var(--green-line);
        background: var(--green-soft);
        outline: 0;
      }

      .drawer-backdrop {
        position: fixed;
        inset: 0;
        z-index: 80;
        border: 0;
        background: rgba(15, 23, 42, 0.36);
      }

      .quote-drawer {
        position: fixed;
        z-index: 81;
        inset: 0 0 0 auto;
        display: flex;
        width: min(460px, 100vw);
        flex-direction: column;
        border-left: 1px solid var(--line);
        background: #fff;
        box-shadow: -24px 0 60px rgba(15, 23, 42, 0.16);
      }

      .drawer-header {
        border-bottom: 1px solid var(--line);
        padding: 22px;
      }

      .drawer-title-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 40px;
        gap: 14px;
        align-items: start;
      }

      .drawer-title-row h2 {
        margin: 8px 0 0;
        font-size: 19px;
        line-height: 1.25;
      }

      .drawer-total {
        margin: 8px 0 0;
        color: var(--green-700);
        font-size: 15px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .drawer-close {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--subtle);
        font-size: 22px;
      }

      .drawer-close:hover,
      .drawer-close:focus {
        border-color: var(--green-line);
        background: var(--green-soft);
        color: var(--green-700);
        outline: 0;
      }

      .drawer-summary {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .drawer-summary div {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        padding: 10px 12px;
      }

      .drawer-summary strong {
        display: block;
        margin-top: 4px;
        font-size: 13px;
      }

      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 22px;
      }

      .contact-timeline {
        position: relative;
        display: grid;
        gap: 0;
      }

      .contact-item {
        position: relative;
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 12px;
        padding-bottom: 18px;
      }

      .contact-item:not(:last-child)::before {
        content: "";
        position: absolute;
        left: 18px;
        top: 38px;
        bottom: 0;
        width: 1px;
        background: var(--line-soft);
      }

      .contact-icon {
        position: relative;
        z-index: 1;
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        font-size: 17px;
      }

      .contact-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 13px 14px;
        box-shadow: 0 10px 32px rgba(15, 23, 42, 0.05);
      }

      .contact-card-head {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }

      .contact-note {
        margin: 11px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .tasks {
        display: block;
      }

      .task-owner-group {
        display: block;
      }

      .task-owner-heading {
        margin: 0;
        border-bottom: 1px solid var(--line-soft);
        background: #f8fafc;
        padding: 12px 18px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .task {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid var(--line-soft);
        padding: 0 18px;
        height: 50px;
        position: relative;
        transition:
          background 0.18s ease,
          opacity 0.18s ease,
          box-shadow 0.18s ease;
      }

      .task.locked-by-other {
        overflow: hidden;
      }

      .task.locked-by-other > :not(.task-lock-overlay) {
        pointer-events: none;
      }

      .task.locked-by-other .task-main,
      .task.locked-by-other .task-actions,
      .task.locked-by-other .timer-box,
      .task.locked-by-other .btn {
        pointer-events: auto;
      }

      .task.locked-by-other .drag-handle,
      .task.locked-by-other .task-main,
      .task.locked-by-other .task-actions {
        opacity: 0.62;
      }

      .task.locked-by-other .task-actions {
        opacity: 1;

      .task-lock-overlay {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 10px;

        font-weight: 800;

      .task-lock-detail {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      .task-lock-timer {
        display: inline-grid;
        grid-template-columns: auto auto;
        align-items: stretch;
        overflow: hidden;
        border: 1px solid var(--rose);
        border-radius: 8px;
        background: #fff;
        pointer-events: auto;

      .task-lock-timer strong {
        display: grid;
        min-width: 86px;
        place-items: center;
        background: var(--rose);
        color: #fff;
        font-variant-numeric: tabular-nums;
        padding: 10px 14px;

        display: grid;

        place-items: center;
        color: #be123c;
        font-size: 13px;
        font-weight: 800;

        box-shadow: inset 3px 0 0 var(--green);

      .task.drop-after::after {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        height: 3px;
        border-radius: 999px;
        background: var(--green);
      }

      .task.drop-before::before {
        top: 0;
      }

      .task.drop-after::after {
        bottom: 0;
      }

      .drag-handle {
        width: 20px;
        height: 32px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 6px;
        background: transparent;

        padding: 0;

        color: var(--green);

        height: 18px;

      .task h2 {

        margin: 0;

        font-size: 13px;
        font-weight: 700;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

        color: #991b1b;

      function normalizeMetricoolText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function parseMetricoolNumber(value) {
        const normalized = String(value || "")
          .trim()
          .replace(/\s/g, "")
          .replace(/,/g, "");
        const match = normalized.match(/^([+-]?\d+(?:\.\d+)?)([KM])?$/i);
        if (!match) return null;

        const base = Number(match[1]);
        if (!Number.isFinite(base)) return null;
        if (match[2]?.toUpperCase() === "K") return Math.round(base * 1000);
        if (match[2]?.toUpperCase() === "M") return Math.round(base * 1000000);
        return base;
      }

      function parseMetricoolPercent(value) {
        const match = String(value || "").trim().match(/^([+-]?\d+(?:\.\d+)?)%$/);
        return match ? Number(match[1]) : null;
      }

      function metricoolPairAfter(lines, label) {
        const startIndex = lines.findIndex((line) =>
          normalizeMetricoolText(line).includes(normalizeMetricoolText(label))
        );
        if (startIndex < 0) return null;

        let value = null;
        let change = null;
        for (let index = startIndex + 1; index < Math.min(lines.length, startIndex + 6); index += 1) {
          if (value === null) value = parseMetricoolNumber(lines[index]);
          if (change === null) change = parseMetricoolPercent(lines[index]);
          if (value !== null && change !== null) break;
        }

        return value === null ? null : { change, value };
      }

      function metricoolFirstPair(lines) {
        let value = null;
        let change = null;
        for (let index = 1; index < Math.min(lines.length, 8); index += 1) {
          if (value === null) value = parseMetricoolNumber(lines[index]);
          if (change === null) change = parseMetricoolPercent(lines[index]);
          if (value !== null && change !== null) break;
        }
        return value === null ? null : { change, value };
      }

      function metricoolAverage(values) {
        const valid = values.filter((value) => typeof value === "number" && Number.isFinite(value));
        return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : 0;
      }

      function parseMetricoolDate(value) {
        const months = {
          ene: "01",
          feb: "02",
          mar: "03",
          abr: "04",
          may: "05",
          jun: "06",
          jul: "07",
          ago: "08",
          sep: "09",
          oct: "10",
          nov: "11",
          dic: "12"
        };
        const match = normalizeMetricoolText(value).match(/(\d{1,2})\s+([a-z]+)\s+(\d{2,4})/);
        if (!match) return null;

        const year = match[3].length === 2 ? `20${match[3]}` : match[3];
        return `${year}-${months[match[2].slice(0, 3)] || "01"}-${match[1].padStart(2, "0")}`;
      }

      function parseMetricoolCover(lines) {
        const text = lines.join(" ");
        const range = text.match(/(\d{1,2}\s+\w+\s+\d{2,4})\s*-\s*(\d{1,2}\s+\w+\s+\d{2,4})/i);
        const handle = lines.find((line) => /^@?[a-z0-9_.]{3,40}$/i.test(String(line).trim()));
        const brand = lines.find((line) => {
          const clean = String(line || "").trim();
          return (
            clean.length > 3 &&
            clean.length < 80 &&
            !/^social media/i.test(clean) &&
            !/^@/.test(clean) &&
            /[a-z]/i.test(clean) &&
            clean.includes(" ")
          );
        });

        return {
          brand: brand || null,
          from: range ? parseMetricoolDate(range[1]) : null,
          handle: handle ? `@${String(handle).replace(/^@/, "")}` : null,
          to: range ? parseMetricoolDate(range[2]) : null
        };
      }

      function metricoolChannel(report, name) {
        return report.channels.find((channel) => channel.name === name);
      }

      function buildMetricoolReportFromPdf(pages, fileName) {
        const report = cloneMetricoolReport();
        const cover = parseMetricoolCover(pages[0] || []);
        const changes = {
          followers: [],
          impressions: [],
          interactions: [],
          posts: []
        };
        let foundMetrics = 0;
        let instagramReachFromPdf = false;

        if (cover.from) report.meta.from = cover.from;
        if (cover.to) report.meta.to = cover.to;
        if (cover.brand) report.meta.brand = cover.brand;
        if (cover.handle) report.meta.handle = cover.handle;
        if (report.meta.from && report.meta.to) {
          report.meta.days =
            Math.round((new Date(report.meta.to) - new Date(report.meta.from)) / 86400000) + 1;
        }
        report.meta.source = `PDF cargado: ${fileName.replace(/[<>]/g, "")}`;

        for (const lines of pages) {
          const text = normalizeMetricoolText(lines.join(" "));
          const instagram = metricoolChannel(report, "Instagram");
          const tiktok = metricoolChannel(report, "TikTok");
          const firstPair = metricoolFirstPair(lines);
          const isInstagram =
            text.includes("balance de seguidores") ||
            text.includes("contenido total") ||
            text.includes("reels") ||
            text.includes("historias");
          const isTikTok =
            text.includes("posts") ||
            text.includes("reprod") ||
            text.includes("visitas al perfil") ||
            text.includes("publicaciones vistas");

          if (text.includes("seguidores") && firstPair) {
            const channel = isTikTok && !isInstagram ? tiktok : instagram;
            channel.followers = firstPair.value;
            changes.followers.push(firstPair.change);
            foundMetrics += 1;

            const postsPair = metricoolPairAfter(lines, isTikTok && !isInstagram ? "Posts" : "Contenido total");
            if (postsPair) {
              channel.posts = postsPair.value;
              changes.posts.push(postsPair.change);
            }
          }

          if ((text.includes("visualizaciones") || text.includes("reprod")) && firstPair) {
            const channel = isTikTok ? tiktok : instagram;
            channel.reachLabel = `${fmtNumber(firstPair.value)} ${
              isTikTok ? "visualizaciones" : "visualizaciones"
            }`;
            channel.reach = firstPair.value;
            if (!isTikTok) instagramReachFromPdf = true;
            changes.impressions.push(firstPair.change);
            foundMetrics += 1;

            const postsPair = metricoolPairAfter(lines, isTikTok ? "Posts" : "Contenido total");
            if (postsPair && isTikTok) {
              channel.posts = postsPair.value;
              changes.posts.push(postsPair.change);
            }
          }

          if (text.includes("impresiones") && firstPair && !text.includes("historias ordenadas") && !instagramReachFromPdf) {
            instagram.reachLabel = `${fmtNumber(firstPair.value)} impresiones`;
            instagram.reach = firstPair.value;
            instagramReachFromPdf = true;
            changes.impressions.push(firstPair.change);
            foundMetrics += 1;
          }

          if (text.includes("interacciones")) {
            const interactionPair = metricoolPairAfter(lines, "Interacciones") || firstPair;
            if (interactionPair) {
              const channel = isTikTok ? tiktok : instagram;
              channel.interactions = interactionPair.value;
              changes.interactions.push(interactionPair.change);
              foundMetrics += 1;
            }
          }

          if (text.includes("engagement") && firstPair) {
            const channel = isTikTok ? tiktok : instagram;
            channel.engagement = firstPair.value;
          }
        }

        const instagram = metricoolChannel(report, "Instagram");
        const tiktok = metricoolChannel(report, "TikTok");
        const totalFollowers = (instagram.followers || 0) + (tiktok.followers || 0);
        const totalReach = (instagram.reach || 0) + (tiktok.reach || 0);
        const totalInteractions = (instagram.interactions || 0) + (tiktok.interactions || 0);
        const totalPosts = (instagram.posts || 0) + (tiktok.posts || 0);

        instagram.status = metricoolAverage(changes.impressions) < -10 ? "En caída" : "Estable";
        tiktok.status = metricoolAverage(changes.interactions) > 10 ? "Crece" : "Estable";
        report.summary = [
          ["Seguidores", totalFollowers, "IG + TikTok", metricoolAverage(changes.followers)],
          ["Impresiones", totalReach, "Visualizaciones/impr. del PDF", metricoolAverage(changes.impressions)],
          ["Interacciones", totalInteractions, "Reacciones, likes y respuestas", metricoolAverage(changes.interactions)],
          ["Publicaciones", totalPosts, "Piezas publicadas", metricoolAverage(changes.posts)]
        ];

        return { foundMetrics, report };
      }

      function loadMetricoolPdfJs() {
        if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
        if (metricoolPdfJsPromise) return metricoolPdfJsPromise;

        metricoolPdfJsPromise = new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js";
          script.onload = () => {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
              "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
            resolve(window.pdfjsLib);
          };
          script.onerror = () => reject(new Error("No se pudo cargar pdf.js para leer el PDF."));
          document.head.appendChild(script);
        });

        return metricoolPdfJsPromise;
      }

      async function extractMetricoolPdfPages(file) {
        const pdfjs = await loadMetricoolPdfJs();
        const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
        const pages = [];

        for (let index = 1; index <= pdf.numPages; index += 1) {
          const page = await pdf.getPage(index);
          const text = await page.getTextContent();
          pages.push(
            text.items
              .map((item) => String(item.str || "").trim())
              .filter(Boolean)
          );
        }

        return pages;
      }

          status: "Procesando",
          title: "Procesando PDF"
        };
        metricoolModule();

        try {
          const pages = await extractMetricoolPdfPages(file);
          const { foundMetrics, report } = buildMetricoolReportFromPdf(pages, file.name);
          if (!foundMetrics) throw new Error("No encontré KPIs reconocibles en el PDF.");

          saveMetricoolReport(report, file.name);

            detail: `${foundMetrics} bloques de KPI actualizados desde ${file.name}.`,
            status: "Cargado",

          metricoolUploadNotice = {
            detail: error instanceof Error ? error.message : "No se pudo procesar el PDF.",
            status: "Error",
            title: "No se pudo cargar el reporte"
          };

        metricoolModule();

      function financialRowsFor(monthIndex) {
        const period = financialMonths[monthIndex];
        const previousPeriod = monthIndex > 0 ? financialMonths[monthIndex - 1] : financialPreviousPeriod;
        return financialLineItems.map((row, index) => [row[0], row[1], period.values[index], previousPeriod.values[index]]);
      }

      function sectionTotal(section, index, rows) {
        return rows
          .filter((row) => row[0] === section)
          .reduce((sum, row) => sum + row[index], 0);
      }

      function summary(index, rows) {
        const ingresos = sectionTotal("Ingresos", index, rows);
        const costos = sectionTotal("Costos", index, rows);
        const gastos = sectionTotal("Gastos operativos", index, rows);
        const otros = sectionTotal("Otros ingresos/gastos", index, rows);
        const impuestos = sectionTotal("Impuestos", index, rows);
        const utilidadBruta = ingresos + costos;
        const utilidadOperativa = utilidadBruta + gastos;
        const utilidadNeta = utilidadOperativa + otros + impuestos;
        return {
          ingresos,
          costoVentas: Math.abs(costos),
          utilidadBruta,
          gastosOperativos: Math.abs(gastos),
          utilidadOperativa,
          utilidadNeta,
          margenBruto: ingresos ? utilidadBruta / ingresos : 0,
          margenNeto: ingresos ? utilidadNeta / ingresos : 0
        };
      }

      function variation(current, previous) {
        return previous ? ((current - previous) / Math.abs(previous)) * 100 : 0;

        const positive = value >= 0;
        const favorable = inverse ? !positive : positive;
        const symbol = positive ? "↗" : "↘";
        return `<span class="trend ${favorable ? "" : "bad"}">${symbol} ${Math.abs(value).toFixed(1)}%</span>`;

      function expenseSnapshot(period) {
        const rows = financialLineItems.map((line, index) => [line[0], period.values[index]]);
        const costoVentas = Math.abs(rows.filter((row) => row[0] === "Costos").reduce((sum, row) => sum + row[1], 0));
        const gastosOperativos = Math.abs(rows.filter((row) => row[0] === "Gastos operativos").reduce((sum, row) => sum + row[1], 0));
        const gastosTotales = period.values.filter((value) => value < 0).reduce((sum, value) => sum + Math.abs(value), 0);

        return {
          month: period.short,
          costoVentas,
          gastosOperativos,
          gastosTotales
        };
      }

      function chart(activeIndex) {
        const expenseMonths = financialMonths.slice(0, activeIndex + 1).map(expenseSnapshot);
        const max = Math.max(1, ...expenseMonths.flatMap((row) => [row.costoVentas, row.gastosOperativos, row.gastosTotales]));
        const chartStart = 54;
        const chartWidth = 650;
        const xStep = chartWidth / expenseMonths.length;
        const barWidth = Math.min(24, Math.max(14, xStep / 4));
        const y = (value) => 224 - (value / max) * 178;
        const points = expenseMonths
          .map((row, index) => {
            const x = chartStart + index * xStep + xStep / 2;
            return `${x},${y(row.gastosTotales)}`;
          })
          .join(" ");
        const groups = expenseMonths
          .map((row, index) => {
            const centerX = chartStart + index * xStep + xStep / 2;
            const costHeight = (row.costoVentas / max) * 178;
            const operatingHeight = (row.gastosOperativos / max) * 178;
            return `
              <g>
                <rect x="${centerX - barWidth - 4}" y="${224 - costHeight}" width="${barWidth}" height="${costHeight}" rx="4" fill="#2563eb"></rect>
                <rect x="${centerX + 4}" y="${224 - operatingHeight}" width="${barWidth}" height="${operatingHeight}" rx="4" fill="#0ea5e9"></rect>
                <text x="${centerX}" y="264" text-anchor="middle" fill="#7a8797" font-size="11">${row.month}</text>
              </g>
            `;
          })
          .join("");

        return `
          <div class="panel chart-panel">
            <div class="chart-head">
              <div>
                <strong>Evolución mensual de gastos</strong>
                <p class="small">Costo de ventas, gastos operativos y total de egresos</p>
              </div>
              <div class="legend">

              <line x1="38" x2="724" y1="178" y2="178" stroke="#dbe2ea" stroke-dasharray="4 7"></line>
              ${groups}
              <polyline points="${points}" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
              ${expenseMonths
                .map((row, index) => {
                  const x = chartStart + index * xStep + xStep / 2;
                  return `<circle cx="${x}" cy="${y(row.gastosTotales)}" r="4.5" fill="#f59e0b"></circle>`;
                })
                .join("")}
            </svg>
          </div>
        `;

      function financialModule() {
        const monthIndex = activeFinancialIndex();
        const period = financialMonths[monthIndex];
        const previousPeriod = monthIndex > 0 ? financialMonths[monthIndex - 1] : financialPreviousPeriod;
        const financialRows = financialRowsFor(monthIndex);
        const current = summary(2, financialRows);
        const previous = summary(3, financialRows);
        const sections = ["Ingresos", "Costos", "Gastos operativos", "Otros ingresos/gastos", "Impuestos"];
        const rows = sections
          .map((section) => {
            const total = sectionTotal(section, 2, financialRows);
            const prior = sectionTotal(section, 3, financialRows);
            const detailRows = financialRows
              .filter((row) => row[0] === section)
              .map(
                (row) => `
                  <tr>
                    <td class="muted">${row[1]}</td>

            return `

                <td>${section}</td>
                <td class="right ${total < 0 ? "negative" : ""}">${fmtMoney(total)}</td>
                <td class="right muted">${fmtMoney(prior)}</td>
                <td class="right ${variation(total, prior) < 0 ? "negative" : ""}">${variation(total, prior).toFixed(1)}%</td>

                <span>Margen bruto<strong>${fmtPercent(current.margenBruto)}</strong></span>
                <span>Margen neto<strong>${fmtPercent(current.margenNeto)}</strong></span>
              </div>
            </div>
            ${monthTrack(period)}
            <div class="metrics">
              ${metric("Ingresos", fmtMoney(current.ingresos), `${signedMoney(current.ingresos - previous.ingresos)} vs. ${previousPeriod.label}`, variation(current.ingresos, previous.ingresos))}
              ${metric("Costo de ventas", fmtMoney(current.costoVentas), `${signedMoney(current.costoVentas - previous.costoVentas)} vs. ${previousPeriod.label}`, variation(current.costoVentas, previous.costoVentas), true)}
              ${metric("Utilidad bruta", fmtMoney(current.utilidadBruta), `${fmtPercent(current.margenBruto)} de margen bruto`, variation(current.utilidadBruta, previous.utilidadBruta))}
              ${metric("Gastos operativos", fmtMoney(current.gastosOperativos), `${signedMoney(current.gastosOperativos - previous.gastosOperativos)} vs. ${previousPeriod.label}`, variation(current.gastosOperativos, previous.gastosOperativos), true)}
              ${metric("Utilidad operativa", fmtMoney(current.utilidadOperativa), "Antes de otros ingresos, gastos e impuestos", variation(current.utilidadOperativa, previous.utilidadOperativa))}
              ${metric("Utilidad neta", fmtMoney(current.utilidadNeta), `${signedMoney(current.utilidadNeta - previous.utilidadNeta)} vs. ${previousPeriod.label}`, variation(current.utilidadNeta, previous.utilidadNeta))}

            </div>

              </div>
              ${chart(monthIndex)}
            </div>
          </section>
        `);

        document.querySelectorAll("[data-financial-month]").forEach((button) => {

                      </div>

        return `

      function quoteDocumentCell(quote) {
        const href = quoteDocumentHref(quote);
        if (!href || !quote.archivoTipo) return "";
        const icon = quote.archivoTipo === "file" ? "📄" : "🔗";
        const label = quote.archivoTipo === "file" ? "Abrir archivo de cotización" : "Abrir link de cotización";
        return `<a class="quote-link" href="${escapeHtml(href)}" target="_blank" rel="noreferrer" aria-label="${label}" title="${label}">${icon}</a>`;
      }

      const quoteXlsColumns = [
        "Mes",
        "Servicio",
        "Cliente",
        "Mail contacto",
        "Monto cotizado",
        "Fecha envío",
        "Archivo tipo",
        "Archivo URL",
        "Contactos JSON"
      ];

      function quoteMonthKey(quote) {
        return quote.fechaEnvio.slice(0, 7);

      function activeQuoteMonthLabel() {

      function serializeQuoteContacts(quote) {
        return JSON.stringify(
          [...quote.contactos]
            .sort((left, right) => left[2] - right[2])
            .map((contact) => ({
              tipo: contact[0],
              fecha: contact[1],
              orden: contact[2],
              nota: contact[3] || ""
            }))

      function exportQuotesXls() {
        const rows = quotes
          .map((quote) => {
            const values = [

              quote.servicio,
              quote.cliente || "",
              quote.emailContacto || "",
              quote.montoCotizado,

              quote.archivoUrl || "",
              serializeQuoteContacts(quote)
            ];

          .join("");

                <thead><tr>${quoteXlsColumns.map((column) => `<th>${column}</th>`).join("")}</tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </body>
          </html>
        `;
        const blob = new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8" });

        link.href = url;

        link.click();

      function parseMoneyCell(value) {
        const parsed = Number(String(value || "").replace(/[^\d.,-]/g, "").replaceAll(",", ""));
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function spreadsheetRowsFromText(text) {
        const parsedHtml = new DOMParser().parseFromString(text, "text/html");
        const tableRows = Array.from(parsedHtml.querySelectorAll("tr")).map((row) =>
          Array.from(row.querySelectorAll("th,td")).map((cell) => (cell.textContent || "").trim())
        );
        if (tableRows.length) return tableRows;

        const delimiter = text.includes("\t") ? "\t" : ",";
        return text
          .split(/\r?\n/)
          .map((row) => row.split(delimiter).map((cell) => cell.trim()))
          .filter((row) => row.some(Boolean));
      }

      function normalizeXlsHeader(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function parseImportedContacts(value) {
        if (!String(value || "").trim()) return [];
        try {
          const parsed = JSON.parse(value);
          if (!Array.isArray(parsed)) return [];
          return parsed.map((contact, index) => [
            contact.tipo || "otro",
            contact.fecha || new Date().toISOString(),
            contact.orden || index + 1,
            contact.nota || ""
          ]);
        } catch {
          return [];
        }
      }

      function importQuotesText(text) {
        const rows = spreadsheetRowsFromText(text);
        const [headers, ...body] = rows;
        if (!headers) return [];
        const normalized = headers.map(normalizeXlsHeader);
        const at = (name) => normalized.indexOf(name);

        return body
          .map((row, index) => {
            const archivoTipo = String(row[at("archivo tipo")] || "").trim().toLowerCase();
            return {
              id: `import-${Date.now()}-${index + 1}`,
              servicio: row[at("servicio")] || "Servicio sin nombre",
              cliente: row[at("cliente")] || "Cliente sin nombre",
              emailContacto: row[at("mail contacto")] || "",
              montoCotizado: parseMoneyCell(row[at("monto cotizado")]),
              fechaEnvio: row[at("fecha envio")] || `${row[at("mes")] || "2026-05"}-01`,
              archivoTipo: ["link", "file"].includes(archivoTipo) ? archivoTipo : null,
              archivoUrl: row[at("archivo url")] || null,
              contactos: parseImportedContacts(row[at("contactos json")])
            };
          })
          .filter((quote) => quote.servicio.trim());
      }

      function handleQuoteImport(file) {
        const reader = new FileReader();
        reader.onload = () => {
          const imported = importQuotesText(String(reader.result || ""));
          if (!imported.length) {
            window.alert("No se encontraron filas válidas en el archivo.");
            return;
          }
          quotes = imported;
          state.quoteMonth = quoteMonthKey(imported[0]);
          state.quoteDrawerId = null;
          quotesModule();
        };
        reader.readAsText(file, "utf-8");
      }

      function editQuoteEmail(quoteId) {

        quotesModule();

        document.getElementById("quoteSearch").addEventListener("input", (event) => {
